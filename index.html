const { useState, useMemo, useEffect, useRef, useCallback } = React;

// ===== Firebase =====
const firebaseConfig = {

let firebaseReady = false;

try {

const AGENT_CONFIG = {
  '早班': ['蘇清源', '曾雪妮', '鄭宇嫻', '陳怡君', '李欣曄', '蔡家佳', '程馨慧'],
  '中班': ['黃婷鈺', '蔡筑琁', '呂建璋', '吳金韋', '許堯恩', '林廷坤'],
  '晚班': ['李珮君', '黃君為', '呂宜庭']
};

const AGENT_TO_SHIFT = Object.entries(AGENT_CONFIG).reduce((acc, [shift, names]) => {
  names.forEach(name => acc[name] = shift);
  return acc;
}, {});

const ALL_AGENTS = Object.keys(AGENT_TO_SHIFT);
const QUEUE_LIST = ['GT', '儲值專線', 'GT+儲值專線', '滿貫專線', '金好運專線'];

const RANK_METRICS = [
  { label: '人員滿意度(Q1)', key: 'q1SatRate' },
  { label: '人員調查率(Q1)', key: 'q1SurRate' },
  { label: '問題滿意度(Q2)', key: 'q2SatRate' },
  { label: '問題調查率(Q2)', key: 'q2SurRate' },
  { label: '整體滿意度平均', key: 'overallSatAvg' },
  { label: '整體調查率平均', key: 'overallSurAvg' }
];

const HISTORY_METRICS = [
  { label: '整體滿意度平均', key: 'overallSatAvg', format: 'percent' },
  { label: '整體調查率平均', key: 'overallSurAvg', format: 'percent' },
  { label: '人員滿意度(Q1)', key: 'q1SatRate', format: 'percent' },
  { label: '人員調查率(Q1)', key: 'q1SurRate', format: 'percent' },
  { label: '問題滿意度(Q2)', key: 'q2SatRate', format: 'percent' },
  { label: '問題調查率(Q2)', key: 'q2SurRate', format: 'percent' },
  { label: '總通話數', key: 'totalCalls', format: 'number' },
  { label: 'GT時數', key: 'GT', source: 'lines', format: 'hours' },
  { label: '儲值專線時數', key: '儲值專線', source: 'lines', format: 'hours' },
  { label: 'GT+儲值專線時數', key: 'GT+儲值專線', source: 'lines', format: 'hours' },
  { label: '滿貫專線時數', key: '滿貫專線', source: 'lines', format: 'hours' },
  { label: '金好運專線時數', key: '金好運專線', source: 'lines', format: 'hours' }
];

const CHART_COLORS = ['#2563eb','#16a34a','#dc2626','#ca8a04','#7c3aed','#0891b2','#ea580c','#4f46e5','#be123c','#0f766e','#9333ea','#65a30d'];

const Icon = ({ name, size = 18, className = "" }) => {
  useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  }, [name]);
  return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
};

function HistoryChart({ type = 'line', labels = [], datasets = [], title = '' }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    if (chartRef.current) chartRef.current.destroy();

    const safeType = labels.length <= 1 ? 'bar' : type;

    chartRef.current = new window.Chart(canvasRef.current, {
      type: safeType,
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: true, position: 'top' },
          title: { display: !!title, text: title },
          tooltip: {
            callbacks: {
              label: (context) => {
                const value = context.raw;
                return `${context.dataset.label}：${typeof value === 'number' ? value.toFixed(2) : value}`;
              }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              callback: (value) => Number(value).toFixed(2)
            }
          }
        }
      }
    });

    return () => {
      if (chartRef.current) chartRef.current.destroy();
    };
  }, [type, labels.join('|'), JSON.stringify(datasets), title]);

  return <div className="chart-wrap"><canvas ref={canvasRef}></canvas></div>;
}

const createBorder = () => ({
  top: { style: 'thin', color: { rgb: 'D9E2F3' } },
  bottom: { style: 'thin', color: { rgb: 'D9E2F3' } },
  left: { style: 'thin', color: { rgb: 'D9E2F3' } },
  right: { style: 'thin', color: { rgb: 'D9E2F3' } }
});

const ensureCellStyle = (cell) => {
  if (!cell.s) cell.s = {};
  return cell.s;
};

const formatPercent = (n) => `${Number(n || 0).toFixed(2)}%`;
const formatToHours = (seconds) => (Number(seconds || 0) / 3600).toFixed(2);

function App() {
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(!firebaseReady);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loginError, setLoginError] = useState('');
  const [syncStatus, setSyncStatus] = useState(firebaseReady ? '尚未登入' : '目前為本機模式');

  const [data, setData] = useState([]);
  const [activeTab, setActiveTab] = useState('analysis');
  const [loading, setLoading] = useState(false);
  const [isDragging, setIsDragging] = useState(false);
  const [historyData, setHistoryData] = useState({});
  const [selectedHistoryMonth, setSelectedHistoryMonth] = useState('');
  const [showUploadPanel, setShowUploadPanel] = useState(false);
  const [detailByMonth, setDetailByMonth] = useState({});
  const [masterViewMode, setMasterViewMode] = useState('current');
  const [masterSelectedMonth, setMasterSelectedMonth] = useState('');

  const [selectedYears, setSelectedYears] = useState([]);
  const [selectedMonths, setSelectedMonths] = useState([]);
  const [selectedAgents, setSelectedAgents] = useState([]);
  const [selectedMetric, setSelectedMetric] = useState('overallSatAvg');
  const [singleTrendAgent, setSingleTrendAgent] = useState('');
  const [compareMode, setCompareMode] = useState('multi');
  const [yearCompareAgent, setYearCompareAgent] = useState('');
  const [compareYearA, setCompareYearA] = useState('');
  const [compareYearB, setCompareYearB] = useState('');
  const [compareView, setCompareView] = useState('monthly');

  // 用來追蹤曾經自動勾選過的項目，避免覆蓋使用者的手動清除
  const prevAvailableYears = useRef([]);
  const prevAvailableMonths = useRef([]);
  const prevAvailableAgents = useRef([]);

  useEffect(() => {
    try {
      const saved = localStorage.getItem('cs_sat_history');
      if (saved) setHistoryData(JSON.parse(saved));
      const savedDetails = localStorage.getItem('cs_sat_detail_by_month');
      if (savedDetails) setDetailByMonth(JSON.parse(savedDetails));
    } catch (e) {}
  }, []);

  useEffect(() => {
    if (!firebaseReady || !auth) return;
    const unsubscribe = auth.onAuthStateChanged(async (u) => {
      setUser(u);
      setAuthReady(true);
      if (u) {
        await loadCloudHistory(u);
      } else {
        setSyncStatus('尚未登入');
      }
    });
    return () => unsubscribe();
  }, []);

  const loadCloudHistory = async (currentUser) => {
    try {
      setSyncStatus('載入雲端資料中...');
      const snap = await db.collection('team_data').doc('history').get();
      if (snap.exists) {
        const months = snap.data().months || {};
        setHistoryData(months);
        localStorage.setItem('cs_sat_history', JSON.stringify(months));
      }

      const detailSnap = await db.collection('team_data').doc('detail_by_month').get();
      if (detailSnap.exists) {
        const detailMonths = detailSnap.data().months || {};
        setDetailByMonth(detailMonths);
        localStorage.setItem('cs_sat_detail_by_month', JSON.stringify(detailMonths));
      }

      setSyncStatus(`☁️ 雲端已同步 ✓ ${currentUser.email}`);
    } catch (e) {
      console.error(e);
      try {
        const savedMonths = localStorage.getItem('cs_sat_history');
        if (savedMonths) setHistoryData(JSON.parse(savedMonths));
      } catch (err) {}
      try {
        const savedDetails = localStorage.getItem('cs_sat_detail_by_month');
        if (savedDetails) setDetailByMonth(JSON.parse(savedDetails));
      } catch (err) {}
      setSyncStatus('雲端讀取失敗，顯示本機資料');
    }
  };

  const saveHistory = async (newHistory, newDetailByMonth = null) => {
    setHistoryData(newHistory);
    localStorage.setItem('cs_sat_history', JSON.stringify(newHistory));

    if (newDetailByMonth) {
      setDetailByMonth(newDetailByMonth);
      localStorage.setItem('cs_sat_detail_by_month', JSON.stringify(newDetailByMonth));
    }

    if (firebaseReady && user && db) {
      try {
        setSyncStatus('同步中...');
        await db.collection('team_data').doc('history').set({ months: newHistory }, { merge: true });
        if (newDetailByMonth) {
          await db.collection('team_data').doc('detail_by_month').set({ months: newDetailByMonth }, { merge: true });
        }
        setSyncStatus('☁️ 雲端已同步 ✓');
      } catch (e) {
        console.error(e);
        setSyncStatus('同步失敗，已保留本機資料');
      }
    }
  };

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoginError('');
    try {
      await auth.signInWithEmailAndPassword(email, password);
      setPassword('');
    } catch (err) {
      setLoginError('登入失敗：帳號或密碼錯誤，或尚未建立使用者');
    }
  };

  const handleLogout = async () => {
    if (!auth) return;
    await auth.signOut();
  };

  const clearAllData = async () => {
    if (!window.confirm('⚠️ 警告：確定要刪除「所有」歷史資料嗎？\n此動作會同時清空雲端與本機資料，且無法復原！')) {
      return;
    }

    // 徹底清除所有狀態與記憶
    setHistoryData({});
    setDetailByMonth({});
    setData([]);
    setMasterSelectedMonth('');
    setSelectedYears([]);
    setSelectedMonths([]);
    setSelectedAgents([]);
    prevAvailableYears.current = [];
    prevAvailableMonths.current = [];
    prevAvailableAgents.current = [];
    
    localStorage.removeItem('cs_sat_history');
    localStorage.removeItem('cs_sat_detail_by_month');

    if (firebaseReady && user && db) {
      try {
        setSyncStatus('刪除雲端資料中...');
        await db.collection('team_data').doc('history').delete();
        await db.collection('team_data').doc('detail_by_month').delete();
        setSyncStatus('☁️ 雲端與本機資料已徹底清空');
      } catch (error) {
        console.error('刪除雲端資料失敗:', error);
        setSyncStatus('本機已清空，但雲端刪除失敗');
      }
    } else {
      setSyncStatus('本機資料已清空');
    }
  };

  const parseDuration = (val) => {
    if (val === null || val === undefined || val === '') return 0;
    if (typeof val === 'number') {
      if (val < 1) return Math.round(val * 86400);
      return Math.round(val);
    }
    const s = String(val).trim();
    if (/^\d+$/.test(s)) return parseInt(s, 10);
    const hhmmss = s.match(/^(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?$/);
    if (hhmmss) {
      const h = parseInt(hhmmss[1] || '0', 10);
      const m = parseInt(hhmmss[2] || '0', 10);
      const sec = parseInt(hhmmss[3] || '0', 10);
      return h * 3600 + m * 60 + sec;
    }
    const minMatch = s.match(/(\d+)分/);
    const secMatch = s.match(/(\d+)秒/);
    return (minMatch ? parseInt(minMatch[1], 10) : 0) * 60 + (secMatch ? parseInt(secMatch[1], 10) : 0);
  };

  const getSatResult = (label, qNum) => {
    if (!label) return '未回答';
    const s = String(label);
    const regex = new RegExp(`問題${qNum}(非常滿意|尚可|不滿意|非常不滿意)`);
    const match = s.match(regex);
    return match ? match[1] : '未回答';
  };

  const parseExcelDate = (serial) => {
    const unixMs = Math.round((serial - 25569) * 86400 * 1000);
    const d = new Date(unixMs);
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth() + 1).padStart(2, '0');
    const day = String(d.getUTCDate()).padStart(2, '0');
    const h = String(d.getUTCHours()).padStart(2, '0');
    const min = String(d.getUTCMinutes()).padStart(2, '0');
    const s = String(d.getUTCSeconds()).padStart(2, '0');
    return { date: `${y}-${m}-${day}`, time: `${h}:${min}:${s}` };
  };

  const availableAgents = useMemo(() => {
    const set = new Set(Object.keys(AGENT_TO_SHIFT));
    data.forEach(d => { if (d.agent) set.add(d.agent); });
    Object.values(historyData).forEach(h => {
      if (h && h.agents) {
        h.agents.forEach(a => set.add(a.name));
      }
    });
    return Array.from(set).sort((a, b) => {
      const shiftA = AGENT_TO_SHIFT[a] ? 0 : 1;
      const shiftB = AGENT_TO_SHIFT[b] ? 0 : 1;
      if (shiftA !== shiftB) return shiftA - shiftB;
      return a.localeCompare(b);
    });
  }, [data, historyData]);

  const parseRows = (rows) => {
    const headers = rows[0].map(h => String(h || '').trim());
    const idxDate = headers.findIndex(h => h.includes('日期'));
    const idxAgent = headers.indexOf('使用者 - 已互動');
    const idxQueue = headers.indexOf('第一佇列');
    const idxTalkTime = headers.indexOf('總發話時間');
    const idxLabels = headers.indexOf('外部標籤');
    const idxId = headers.indexOf('對話 ID');

    if (idxAgent === -1) throw new Error("找不到『使用者 - 已互動』欄位，請確認檔案格式是否正確。");

    return rows.slice(1)
      .filter(row => {
        const name = String(row[idxAgent] || '').trim();
        return name !== '';
      })
      .map(row => {
        const name = String(row[idxAgent]).trim();
        let rawDateVal = row[idxDate];
        let date = '';
        let time = '';

        if (typeof rawDateVal === 'number') {
            const dt = parseExcelDate(rawDateVal);
            date = dt.date;
            time = dt.time;
        } else {
            let rawDateStr = String(rawDateVal || '').replace(/["']/g, '').trim();
            if (rawDateStr.includes(' ')) {
                const parts = rawDateStr.split(/\s+/);
                date = parts[0];
                time = parts[1] || '';
            } else {
                date = rawDateStr;
            }
            date = date.replace(/\//g, '-');
        }

        return {
          agent: name,
          shift: AGENT_TO_SHIFT[name] || '',
          date: date,
          time: time,
          line: String(row[idxQueue] || '').replace(/["']/g, '').trim(),
          q1: getSatResult(row[idxLabels], 1),
          q2: getSatResult(row[idxLabels], 2),
          id: String(row[idxId] || '').replace(/["']/g, '').trim(),
          duration: parseDuration(row[idxTalkTime])
        };
      });
  };

  const importHistoryJson = (jsonText) => {
    const parsed = JSON.parse(jsonText);
    const merged = { ...historyData, ...parsed };
    saveHistory(merged);
  };

  const handleFilesUpload = useCallback(async (files) => {
    if (!files || files.length === 0) return;
    setLoading(true);
    try {
      let allData = [];
      let importedHistory = false;

      for (const file of files) {
        const name = file.name.toLowerCase();

        if (name.endsWith('.json')) {
          const text = await file.text();
          importHistoryJson(text);
          importedHistory = true;
          continue;
        }

        const rows = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const data = new Uint8Array(e.target.result);
              const wb = XLSX.read(data, { type: 'array' });
              const sheetRows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
              resolve(sheetRows);
            } catch (err) {
              reject(err);
            }
          };
          reader.readAsArrayBuffer(file);
        });

        if (rows && rows.length > 0) {
            allData = allData.concat(parseRows(rows));
        }
      }

      if (allData.length > 0) {
        setData(allData);
        setActiveTab('analysis');
      } else if (importedHistory) {
        setActiveTab('history');
      }
    } catch (err) {
      alert('檔案讀取失敗：' + err.message);
    } finally {
      setLoading(false);
    }
  }, [historyData]);

  const results = useMemo(() => {
    if (data.length === 0) return null;

    const agentStats = {};
    availableAgents.forEach(name => {
      agentStats[name] = {
        name,
        shift: AGENT_TO_SHIFT[name] || '',
        totalCalls: 0,
        q1VerySatisfied: 0,
        q1Okay: 0,
        q1VeryDissatisfied: 0,
        q1Answered: 0,
        q1Satisfied: 0,
        q2VerySatisfied: 0,
        q2Okay: 0,
        q2VeryDissatisfied: 0,
        q2Answered: 0,
        q2Satisfied: 0,
        lines: { 'GT': 0, '儲值專線': 0, 'GT+儲值專線': 0, '滿貫專線': 0, '金好運專線': 0 }
      };
    });

    data.forEach(d => {
      const a = agentStats[d.agent];
      if (!a) return;
      a.totalCalls++;

      const valid = ['非常滿意', '尚可', '不滿意', '非常不滿意'];
      const satisfied = ['非常滿意', '尚可'];

      if (d.q1 === '非常滿意') a.q1VerySatisfied++;
      if (d.q1 === '尚可') a.q1Okay++;
      if (d.q1 === '非常不滿意') a.q1VeryDissatisfied++;
      if (d.q2 === '非常滿意') a.q2VerySatisfied++;
      if (d.q2 === '尚可') a.q2Okay++;
      if (d.q2 === '非常不滿意') a.q2VeryDissatisfied++;

      if (valid.includes(d.q1)) {
        a.q1Answered++;
        if (satisfied.includes(d.q1)) a.q1Satisfied++;
      }
      if (valid.includes(d.q2)) {
        a.q2Answered++;
        if (satisfied.includes(d.q2)) a.q2Satisfied++;
      }

      if (d.line.includes('GT')) {
        a.lines['GT'] += d.duration;
        a.lines['GT+儲值專線'] += d.duration;
      }
      if (d.line.includes('儲值')) {
        a.lines['儲值專線'] += d.duration;
        a.lines['GT+儲值專線'] += d.duration;
      }
      if (d.line.includes('滿貫')) a.lines['滿貫專線'] += d.duration;
      if (d.line.includes('金好運')) a.lines['金好運專線'] += d.duration;
    });

    const analysisList = Object.values(agentStats).map(a => {
      const q1SatRate = a.q1Answered > 0 ? (a.q1Satisfied / a.q1Answered) * 100 : 0;
      const q1SurRate = a.totalCalls > 0 ? (a.q1Answered / a.totalCalls) * 100 : 0;
      const q2SatRate = a.q2Answered > 0 ? (a.q2Satisfied / a.q2Answered) * 100 : 0;
      const q2SurRate = a.totalCalls > 0 ? (a.q2Answered / a.totalCalls) * 100 : 0;
      return {
        ...a,
        q1SatRate,
        q1SurRate,
        q2SatRate,
        q2SurRate,
        overallSatAvg: (q1SatRate + q2SatRate) / 2,
        overallSurAvg: (q1SurRate + q2SurRate) / 2
      };
    });

    const lineTotals = { 'GT': 0, '儲值專線': 0, 'GT+儲值專線': 0, '滿貫專線': 0, '金好運專線': 0 };
    analysisList.forEach(a => {
      Object.keys(lineTotals).forEach(key => { lineTotals[key] += a.lines[key]; });
    });

    return { analysisList, lineTotals };
  }, [data, availableAgents]);

  useEffect(() => {
    if (!data.length || !results) return;

    const monthCounts = {};
    for (const d of data) {
      if (d.date) {
        const dateStr = String(d.date).replace(/["']/g, '').trim();
        let match = dateStr.match(/(20\d{2})[-\/](\d{1,2})/);
        if (!match) match = dateStr.match(/^(20\d{2})(\d{2})/);
        if (match) {
          const mStr = `${match[1]}-${String(match[2]).padStart(2, '0')}`;
          monthCounts[mStr] = (monthCounts[mStr] || 0) + 1;
        }
      }
    }

    let month = '未知';
    let maxCount = 0;
    for (const [m, count] of Object.entries(monthCounts)) {
        if (count > maxCount) {
            maxCount = count;
            month = m;
        }
    }

    if (month === '未知') return;

    let sumSat = 0;
    let sumSur = 0;
    let countSat = 0;
    let countSur = 0;
    let teamTotalCalls = 0;

    results.analysisList.forEach(a => {
      teamTotalCalls += a.totalCalls;
      if (a.q1Answered > 0 || a.q2Answered > 0) {
        sumSat += a.overallSatAvg;
        countSat++;
      }
      if (a.totalCalls > 0) {
        sumSur += a.overallSurAvg;
        countSur++;
      }
    });

    const monthSummary = {
      month,
      year: month.split('-')[0],
      monthOnly: month.split('-')[1],
      overallSatAvg: countSat ? sumSat / countSat : 0,
      overallSurAvg: countSur ? sumSur / countSur : 0,
      teamTotalCalls,
      teamLineTime: { ...results.lineTotals },
      agents: results.analysisList.map(a => ({
        name: a.name,
        shift: a.shift,
        totalCalls: a.totalCalls,
        q1SatRate: a.q1SatRate,
        q1SurRate: a.q1SurRate,
        q2SatRate: a.q2SatRate,
        q2SurRate: a.q2SurRate,
        overallSatAvg: a.overallSatAvg,
        overallSurAvg: a.overallSurAvg,
        lines: { ...a.lines }
      }))
    };

    const detailMonthPayload = {
      month,
      updatedAt: new Date().toISOString(),
      updatedBy: user?.email || 'local',
      rows: data.map(d => ({
        agent: d.agent,
        shift: d.shift,
        date: d.date,
        time: d.time,
        line: d.line,
        q1: d.q1,
        q2: d.q2,
        id: d.id,
        duration: d.duration
      }))
    };

    const mergedHistory = { ...historyData, [month]: monthSummary };
    const mergedDetailByMonth = { ...detailByMonth, [month]: detailMonthPayload };
    saveHistory(mergedHistory, mergedDetailByMonth);
  }, [data, results, user, detailByMonth, historyData]);

  const detailMonths = Object.keys(detailByMonth).sort();

  const historyMonths = Object.keys(historyData).sort();
  const availableYears = [...new Set(historyMonths.map(m => m.split('-')[0]))].sort();
  const availableMonthNumbers = [...new Set(historyMonths.map(m => m.split('-')[1]))].sort();

  // --- 自動勾選新加入的選項，解決沒打勾圖表亂跑的視覺錯亂 ---
  useEffect(() => {
      const newYears = availableYears.filter(y => !prevAvailableYears.current.includes(y));
      if (newYears.length > 0) {
          setSelectedYears(prev => [...prev, ...newYears]);
          prevAvailableYears.current = availableYears;
      }
  }, [availableYears]);

  useEffect(() => {
      const newMonths = availableMonthNumbers.filter(m => !prevAvailableMonths.current.includes(m));
      if (newMonths.length > 0) {
          setSelectedMonths(prev => [...prev, ...newMonths]);
          prevAvailableMonths.current = availableMonthNumbers;
      }
  }, [availableMonthNumbers]);

  useEffect(() => {
      const newAgents = availableAgents.filter(a => !prevAvailableAgents.current.includes(a));
      if (newAgents.length > 0) {
          setSelectedAgents(prev => [...prev, ...newAgents]);
          prevAvailableAgents.current = availableAgents;
      }
  }, [availableAgents]);

  useEffect(() => {
    if (!singleTrendAgent && availableAgents.length > 0) setSingleTrendAgent(availableAgents[0]);
    if (!yearCompareAgent && availableAgents.length > 0) setYearCompareAgent(availableAgents[0]);
  }, [availableAgents]);

  useEffect(() => {
    if (!compareYearA && availableYears.length > 0) setCompareYearA(availableYears[0]);
    if (!compareYearB && availableYears.length > 1) setCompareYearB(availableYears[availableYears.length - 1]);
    if (!compareYearB && availableYears.length === 1) setCompareYearB(availableYears[0]);
  }, [availableYears.join('|')]);


  // --- 明細表防脫鉤邏輯 ---
  const currentMasterRows = useMemo(() => {
    // 如果下拉選單空著，智慧判斷要顯示什麼
    if (!masterSelectedMonth) {
       // 如果雲端有歷史資料，就預設抓最新的一個月
       if (detailMonths.length > 0) {
           return detailByMonth[detailMonths[detailMonths.length - 1]]?.rows || [];
       }
       // 否則顯示剛匯入的資料
       return data;
    }
    // 嚴格對應下拉選單的選擇
    return (detailByMonth[masterSelectedMonth]?.rows || []);
  }, [masterSelectedMonth, detailByMonth, data, detailMonths]);

  const cumulativeMasterRows = useMemo(() => {
    return detailMonths
      .sort()
      .flatMap(month => (detailByMonth[month]?.rows || []).map(row => ({ ...row, sourceMonth: month })));
  }, [detailByMonth, detailMonths.join('|')]);

  const displayedMasterRows = masterViewMode === 'current' ? currentMasterRows : cumulativeMasterRows;

  // --- 嚴格篩選邏輯：沒勾 = 沒畫面 ---
  const filteredHistoryMonths = historyMonths.filter(m => {
    const [year, month] = m.split('-');
    return selectedYears.includes(year) && selectedMonths.includes(month);
  });

  const filteredAgents = selectedAgents;
  const selectedMetricConfig = HISTORY_METRICS.find(m => m.key === selectedMetric) || HISTORY_METRICS[0];

  const formatMetricValue = (value) => {
    if (value === null || value === undefined) return '-';
    if (selectedMetricConfig.format === 'percent') return `${Number(value).toFixed(2)}%`;
    if (selectedMetricConfig.format === 'hours') return (Number(value) / 3600).toFixed(2);
    return Number(value).toFixed(0);
  };

  const getComparableChartValue = (value) => {
    if (value === null || value === undefined) return null;
    if (selectedMetricConfig.format === 'hours') return Number(value) / 3600;
    return Number(value);
  };

  const toggleMultiSelect = (value, selected, setter) => {
    if (selected.includes(value)) setter(selected.filter(x => x !== value));
    else setter([...selected, value]);
  };

  const comparisonTable = filteredAgents.map(agentName => {
    const row = { name: agentName, shift: AGENT_TO_SHIFT[agentName] || '' };

    filteredHistoryMonths.forEach(month => {
      const monthData = historyData[month];
      const agentData = monthData?.agents?.find(a => a.name === agentName);
      if (!agentData) {
        row[month] = null;
      } else {
        row[month] = selectedMetricConfig.source === 'lines'
          ? (agentData.lines?.[selectedMetricConfig.key] || 0)
          : (agentData[selectedMetricConfig.key] ?? 0);
      }
    });

    const values = filteredHistoryMonths.map(month => row[month]).filter(v => v !== null && v !== undefined);
    row.avg = values.length ? values.reduce((a, b) => a + b, 0) / values.length : 0;
    row.sum = values.length ? values.reduce((a, b) => a + b, 0) : 0;
    return row;
  });

  const singleTrendData = useMemo(() => {
    if (!singleTrendAgent || filteredHistoryMonths.length === 0) return null;
    return {
      labels: filteredHistoryMonths,
      datasets: [{
        label: `${singleTrendAgent}｜${selectedMetricConfig.label}`,
        data: filteredHistoryMonths.map(month => {
          const monthData = historyData[month];
          const agentData = monthData?.agents?.find(a => a.name === singleTrendAgent);
          if (!agentData) return null;
          return selectedMetricConfig.source === 'lines'
            ? getComparableChartValue(agentData.lines?.[selectedMetricConfig.key] || 0)
            : getComparableChartValue(agentData[selectedMetricConfig.key] ?? 0);
        }),
        borderColor: '#2563eb',
        backgroundColor: 'rgba(37,99,235,0.55)',
        tension: 0.25,
        fill: filteredHistoryMonths.length > 1,
        spanGaps: true,
        borderWidth: 2
      }]
    };
  }, [singleTrendAgent, filteredHistoryMonths, historyData, selectedMetric]);

  const multiCompareChartData = useMemo(() => {
    if (filteredHistoryMonths.length === 0 || filteredAgents.length === 0) return null;
    return {
      labels: filteredHistoryMonths,
      datasets: filteredAgents.map((agentName, idx) => ({
        label: agentName,
        data: filteredHistoryMonths.map(month => {
          const monthData = historyData[month];
          const agentData = monthData?.agents?.find(a => a.name === agentName);
          if (!agentData) return null;
          return selectedMetricConfig.source === 'lines'
            ? getComparableChartValue(agentData.lines?.[selectedMetricConfig.key] || 0)
            : getComparableChartValue(agentData[selectedMetricConfig.key] ?? 0);
        }),
        borderColor: CHART_COLORS[idx % CHART_COLORS.length],
        backgroundColor: CHART_COLORS[idx % CHART_COLORS.length] + 'CC',
        tension: 0.25,
        fill: false,
        spanGaps: true,
        borderWidth: 2
      }))
    };
  }, [filteredHistoryMonths, filteredAgents, historyData, selectedMetric]);

  const buildYearAgentMetricMap = (agentName, year) => {
    const months = Array.from({ length: 12 }, (_, i) => String(i + 1).padStart(2, '0'));
    return months.map(monthNo => {
      const monthKey = `${year}-${monthNo}`;
      const monthData = historyData[monthKey];
      const agentData = monthData?.agents?.find(a => a.name === agentName);
      if (!agentData) return { month: monthNo, value: null };
      const value = selectedMetricConfig.source === 'lines'
        ? (agentData.lines?.[selectedMetricConfig.key] || 0)
        : (agentData[selectedMetricConfig.key] ?? 0);
      return { month: monthNo, value: getComparableChartValue(value) };
    });
  };

  const yearlySelfCompare = useMemo(() => {
    if (!yearCompareAgent || !compareYearA || !compareYearB) return null;

    const yearAData = buildYearAgentMetricMap(yearCompareAgent, compareYearA);
    const yearBData = buildYearAgentMetricMap(yearCompareAgent, compareYearB);
    const valA = yearAData.map(x => x.value).filter(v => v !== null && v !== undefined);
    const valB = yearBData.map(x => x.value).filter(v => v !== null && v !== undefined);
    const isAvgMetric = selectedMetricConfig.format === 'percent';
    const summaryA = valA.length ? (isAvgMetric ? valA.reduce((a,b)=>a+b,0)/valA.length : valA.reduce((a,b)=>a+b,0)) : 0;
    const summaryB = valB.length ? (isAvgMetric ? valB.reduce((a,b)=>a+b,0)/valB.length : valB.reduce((a,b)=>a+b,0)) : 0;
    const diff = summaryB - summaryA;
    const monthlyLabels = yearAData.map(x => `${x.month}月`);

    const cumulativeValues = (arr) => {
      let total = 0;
      let count = 0;
      return arr.map(item => {
        if (item.value !== null && item.value !== undefined) {
          total += item.value;
          count += 1;
        }
        return count === 0 ? null : (isAvgMetric ? total / count : total);
      });
    };

    return {
      summaryA,
      summaryB,
      diff,
      monthlyChart: {
        labels: monthlyLabels,
        datasets: [
          { label: compareYearA, data: yearAData.map(x => x.value), borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.35)', tension: 0.25, fill: false, spanGaps: true, borderWidth: 2 },
          { label: compareYearB, data: yearBData.map(x => x.value), borderColor: '#16a34a', backgroundColor: 'rgba(22,163,74,0.35)', tension: 0.25, fill: false, spanGaps: true, borderWidth: 2 }
        ]
      },
      cumulativeChart: {
        labels: monthlyLabels,
        datasets: [
          { label: `${compareYearA}累積`, data: cumulativeValues(yearAData), borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.2)', tension: 0.25, fill: false, spanGaps: true, borderWidth: 2 },
          { label: `${compareYearB}累積`, data: cumulativeValues(yearBData), borderColor: '#16a34a', backgroundColor: 'rgba(22,163,74,0.2)', tension: 0.25, fill: false, spanGaps: true, borderWidth: 2 }
        ]
      },
      annualBar: {
        labels: [compareYearA, compareYearB],
        datasets: [{
          label: selectedMetricConfig.label,
          data: [summaryA, summaryB],
          backgroundColor: ['rgba(37,99,235,0.8)', 'rgba(22,163,74,0.8)'],
          borderColor: ['#2563eb', '#16a34a'],
          borderWidth: 2
        }]
      },
      monthlyTable: yearAData.map((row, idx) => ({
        month: row.month,
        yearA: row.value,
        yearB: yearBData[idx]?.value ?? null,
        diff: (yearBData[idx]?.value ?? 0) - (row.value ?? 0),
        hasData: row.value !== null || yearBData[idx]?.value !== null
      })).filter(r => r.hasData)
    };
  }, [yearCompareAgent, compareYearA, compareYearB, historyData, selectedMetric]);

  const formatCompareDisplay = (value) => {
    if (value === null || value === undefined) return '-';
    if (selectedMetricConfig.format === 'percent') return `${Number(value).toFixed(2)}%`;
    if (selectedMetricConfig.format === 'hours') return `${Number(value).toFixed(2)} 小時`;
    return Number(value).toFixed(0);
  };

  const formatCompareDiff = (value) => {
    if (value === null || value === undefined) return '-';
    const sign = value > 0 ? '+' : '';
    if (selectedMetricConfig.format === 'percent') return `${sign}${Number(value).toFixed(2)}%`;
    if (selectedMetricConfig.format === 'hours') return `${sign}${Number(value).toFixed(2)} 小時`;
    return `${sign}${Number(value).toFixed(0)}`;
  };

  const getEvenRowClass = (rowIndex) => ((rowIndex + 1) % 2 === 0 ? 'bg-sky-50' : '');

  const styleHeaderRow = (ws, totalCols, rowIndex = 0, fillColor = '1F4E78', fontColor = 'FFFFFF') => {
    for (let c = 0; c < totalCols; c++) {
      const ref = XLSX.utils.encode_cell({ r: rowIndex, c });
      if (!ws[ref]) continue;
      ws[ref].s = {
        font: { bold: true, color: { rgb: fontColor } },
        fill: { patternType: 'solid', fgColor: { rgb: fillColor }, bgColor: { rgb: fillColor } },
        alignment: { horizontal: 'center', vertical: 'center' },
        border: createBorder()
      };
    }
  };

  const applyBorders = (ws) => {
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let r = range.s.r; r <= range.e.r; r++) {
      for (let c = range.s.c; c <= range.e.c; c++) {
        const ref = XLSX.utils.encode_cell({ r, c });
        if (!ws[ref]) continue;
        ensureCellStyle(ws[ref]).border = createBorder();
      }
    }
  };

  const colorEvenRows = (ws, headerRows = 1) => {
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let r = headerRows; r <= range.e.r; r++) {
      for (let c = 0; c <= range.e.c; c++) {
        const ref = XLSX.utils.encode_cell({ r, c });
        if (!ws[ref]) continue;
        const style = ensureCellStyle(ws[ref]);
        if (((r - headerRows + 1) % 2) === 0) {
          style.fill = { patternType: 'solid', fgColor: { rgb: 'DDEBF7' }, bgColor: { rgb: 'DDEBF7' } };
        }
        style.alignment = { horizontal: c === 0 ? 'left' : 'center', vertical: 'center' };
        style.border = createBorder();
      }
    }
  };

  const buildRankingAOA = (analysisList) => {
    const sortedMap = RANK_METRICS.map(metric => ({
      ...metric,
      items: [...analysisList].sort((a, b) => b[metric.key] - a[metric.key])
    }));
    const aoa = [];
    aoa.push(sortedMap.flatMap(metric => [metric.label, '', '']));
    aoa.push(sortedMap.flatMap(() => ['排名', '客服名稱', '數值']));
    for (let i = 0; i < analysisList.length; i++) {
      aoa.push(sortedMap.flatMap(metric => {
        const item = metric.items[i];
        return [i + 1, item ? item.name : '', item ? `${item[metric.key].toFixed(2)}%` : ''];
      }));
    }
    return aoa;
  };

  const styleRankingSheet = (ws, totalRows, totalCols) => {
    for (let r = 0; r < totalRows; r++) {
      for (let c = 0; c < totalCols; c++) {
        const ref = XLSX.utils.encode_cell({ r, c });
        if (!ws[ref]) continue;
        const style = ensureCellStyle(ws[ref]);
        style.border = createBorder();
        style.alignment = { horizontal: 'center', vertical: 'center' };
        if (r === 0) {
          style.font = { bold: true, color: { rgb: 'FFFFFF' } };
          style.fill = { patternType: 'solid', fgColor: { rgb: '1F4E78' }, bgColor: { rgb: '1F4E78' } };
        } else if (r === 1) {
          style.font = { bold: true, color: { rgb: '000000' } };
          style.fill = { patternType: 'solid', fgColor: { rgb: 'DDEBF7' }, bgColor: { rgb: 'DDEBF7' } };
        } else if (((c + 1) % 3) === 0) {
          style.fill = { patternType: 'solid', fgColor: { rgb: 'F8FBFF' }, bgColor: { rgb: 'F8FBFF' } };
        }
      }
    }
  };

  const handleExport = () => {
    if (!results) return;
    const wb = XLSX.utils.book_new();

    const detailData = data.map(d => ({
      '客服名稱': d.agent,
      '班別': d.shift,
      '日期': d.date,
      '時間': d.time,
      '遊戲專線': d.line,
      '滿意度Q1': d.q1,
      '滿意度Q2': d.q2,
      '對話 ID': d.id
    }));
    const wsDetail = XLSX.utils.json_to_sheet(detailData);
    wsDetail['!cols'] = [{ wch: 12 }, { wch: 10 }, { wch: 14 }, { wch: 12 }, { wch: 18 }, { wch: 12 }, { wch: 12 }, { wch: 36 }];
    styleHeaderRow(wsDetail, 8);
    colorEvenRows(wsDetail, 1);
    applyBorders(wsDetail);
    XLSX.utils.book_append_sheet(wb, wsDetail, '通話明細總表');

    const summaryData = results.analysisList.map(a => ({
      '客服名稱': a.name,
      '班別': a.shift,
      'GT': formatToHours(a.lines['GT']),
      '儲值專線': formatToHours(a.lines['儲值專線']),
      'GT+儲值專線': formatToHours(a.lines['GT+儲值專線']),
      '滿貫專線': formatToHours(a.lines['滿貫專線']),
      '金好運專線': formatToHours(a.lines['金好運專線'])
    }));
    const wsSummary = XLSX.utils.json_to_sheet(summaryData);
    wsSummary['!cols'] = [{ wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 14 }, { wch: 12 }, { wch: 12 }];
    styleHeaderRow(wsSummary, 7);
    colorEvenRows(wsSummary, 1);
    applyBorders(wsSummary);
    XLSX.utils.book_append_sheet(wb, wsSummary, '專線接聽彙總');

    const analysisData = results.analysisList.map(a => ({
      '客服名稱': a.name,
      '班別': a.shift,
      '總通話數': a.totalCalls,
      'Q1非常滿意': a.q1VerySatisfied,
      'Q1尚可': a.q1Okay,
      'Q1非常不滿意': a.q1VeryDissatisfied,
      '人員滿意度(Q1)': a.q1SatRate.toFixed(2) + '%',
      '人員調查率(Q1)': a.q1SurRate.toFixed(2) + '%',
      'Q2非常滿意': a.q2VerySatisfied,
      'Q2尚可': a.q2Okay,
      'Q2非常不滿意': a.q2VeryDissatisfied,
      '問題滿意度(Q2)': a.q2SatRate.toFixed(2) + '%',
      '問題調查率(Q2)': a.q2SurRate.toFixed(2) + '%',
      '整體滿意度平均': a.overallSatAvg.toFixed(2) + '%',
      '整體調查率平均': a.overallSurAvg.toFixed(2) + '%',
      '已回答(Q1)': a.q1Answered,
      '已回答(Q2)': a.q2Answered
    }));
    const wsAnalysis = XLSX.utils.json_to_sheet(analysisData);
    wsAnalysis['!cols'] = [{ wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 10 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 12 }, { wch: 10 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 16 }, { wch: 16 }, { wch: 10 }, { wch: 10 }];
    styleHeaderRow(wsAnalysis, 17);
    colorEvenRows(wsAnalysis, 1);
    applyBorders(wsAnalysis);
    XLSX.utils.book_append_sheet(wb, wsAnalysis, '滿意度分析表');

    const rankingAOA = buildRankingAOA(results.analysisList);
    const wsRanking = XLSX.utils.aoa_to_sheet(rankingAOA);
    wsRanking['!cols'] = RANK_METRICS.flatMap(() => ([{ wch: 8 }, { wch: 12 }, { wch: 12 }]));
    wsRanking['!merges'] = [];
    RANK_METRICS.forEach((metric, idx) => {
      wsRanking['!merges'].push({ s: { r: 0, c: idx * 3 }, e: { r: 0, c: idx * 3 + 2 } });
    });
    styleRankingSheet(wsRanking, rankingAOA.length, RANK_METRICS.length * 3);
    XLSX.utils.book_append_sheet(wb, wsRanking, '滿意度排名表');

    XLSX.writeFile(wb, `客服滿意度完整報告_${new Date().toLocaleDateString().replaceAll('/', '-')}.xlsx`);
  };

  const exportHistoryBackup = () => {
    const backupData = { ...historyData };
    const json = JSON.stringify(backupData, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `客服滿意度歷史備份_${new Date().toLocaleDateString().replaceAll('/', '-')}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  if (!authReady) {
    return <div className="min-h-screen flex items-center justify-center"><div className="bg-white p-10 rounded-3xl shadow-xl">載入中...</div></div>;
  }

  if (firebaseReady && !user) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
        <form onSubmit={handleLogin} className="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-slate-200">
          <h2 className="text-3xl font-black mb-2 text-center text-slate-800">客服系統安全登入</h2>
          <p className="text-slate-400 text-sm font-bold text-center mb-6">登入後才能使用雲端歷史資料同步</p>
          {loginError && <div className="text-red-500 text-sm mb-4 text-center font-bold">{loginError}</div>}
          <input type="email" placeholder="信箱" value={email} onChange={e => setEmail(e.target.value)} required className="w-full mb-4 p-3 rounded-xl border border-slate-300" />
          <input type="password" placeholder="密碼" value={password} onChange={e => setPassword(e.target.value)} required className="w-full mb-6 p-3 rounded-xl border border-slate-300" />
          <button type="submit" className="w-full bg-blue-600 text-white font-bold p-3 rounded-xl hover:bg-blue-700">登入</button>
        </form>
      </div>
    );
  }

  return (
    <div
      className={`min-h-screen p-4 md:p-8 transition-colors ${isDragging ? 'bg-blue-50' : 'bg-slate-100'}`}
      onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
      onDragLeave={() => setIsDragging(false)}
      onDrop={(e) => {
        e.preventDefault();
        setIsDragging(false);
        if (showUploadPanel) {
          handleFilesUpload(Array.from(e.dataTransfer.files));
        }

                        </div>

                        <div className="overflow-x-auto custom-scrollbar rounded-3xl border">
                          <table className="w-full text-center text-sm whitespace-nowrap">
                            <thead className="bg-slate-900 text-white font-black">
                              <tr>
                                <th className="px-6 py-4 sticky-col bg-slate-900">客服名稱</th>
                                <th className="px-4 py-4">班別</th>
                                {filteredHistoryMonths.map(month => <th key={month} className="px-6 py-4">{month}</th>)}
                                <th className="px-6 py-4 text-emerald-300">平均</th>
                                <th className="px-6 py-4 text-blue-300">加總</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100 font-bold text-slate-700">
                              {comparisonTable.map(row => (
                                <tr key={row.name} className="hover:bg-purple-50">
                                  <td className="px-6 py-4 sticky-col bg-white text-left font-black border-r">{row.name}</td>
                                  <td className="px-4 py-4 text-slate-500">{row.shift}</td>
                                  {filteredHistoryMonths.map(month => <td key={month} className="px-6 py-4 font-mono">{formatMetricValue(row[month])}</td>)}
                                  <td className="px-6 py-4 font-mono text-emerald-600">{formatMetricValue(row.avg)}</td>
                                  <td className="px-6 py-4 font-mono text-blue-600">{formatMetricValue(row.sum)}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}
                  </>
                ) : (
                  <div className="space-y-6">
                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                      <div className="bg-slate-50 rounded-3xl p-5 border">
                        <div className="font-black text-slate-700 mb-3">客服人員</div>
                        <select value={yearCompareAgent} onChange={(e) => setYearCompareAgent(e.target.value)} className="w-full border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-600 bg-white">
                          {availableAgents.map(agent => <option key={agent} value={agent}>{agent}</option>)}
                        </select>
                      </div>
                      <div className="bg-slate-50 rounded-3xl p-5 border">
                        <div className="font-black text-slate-700 mb-3">比對指標</div>
                        <select value={selectedMetric} onChange={(e) => setSelectedMetric(e.target.value)} className="w-full border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-600 bg-white">
                          {HISTORY_METRICS.map(metric => <option key={metric.key} value={metric.key}>{metric.label}</option>)}
                        </select>
                      </div>
                      <div className="bg-slate-50 rounded-3xl p-5 border">
                        <div className="font-black text-slate-700 mb-3">比較年度</div>
                        <div className="grid grid-cols-2 gap-3">
                          <select value={compareYearA} onChange={(e) => setCompareYearA(e.target.value)} className="w-full border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-600 bg-white">
                            {availableYears.map(year => <option key={year} value={year}>{year}</option>)}
                          </select>
                          <select value={compareYearB} onChange={(e) => setCompareYearB(e.target.value)} className="w-full border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-600 bg-white">
                            {availableYears.map(year => <option key={year} value={year}>{year}</option>)}
                          </select>
                        </div>
                      </div>
                      <div className="bg-slate-50 rounded-3xl p-5 border">
                        <div className="font-black text-slate-700 mb-3">比較方式</div>
                        <div className="grid grid-cols-1 gap-2">
                          <button onClick={() => setCompareView('annual')} className={`px-4 py-2 rounded-2xl font-black ${compareView === 'annual' ? 'bg-purple-600 text-white' : 'bg-white border text-slate-600'}`}>年度平均</button>
                          <button onClick={() => setCompareView('monthly')} className={`px-4 py-2 rounded-2xl font-black ${compareView === 'monthly' ? 'bg-purple-600 text-white' : 'bg-white border text-slate-600'}`}>同月份比較</button>
                          <button onClick={() => setCompareView('cumulative')} className={`px-4 py-2 rounded-2xl font-black ${compareView === 'cumulative' ? 'bg-purple-600 text-white' : 'bg-white border text-slate-600'}`}>累積比較</button>
                        </div>
                      </div>
                    </div>

                    {yearlySelfCompare ? (
                      <>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                          <div className="bg-blue-50 rounded-3xl border border-blue-100 p-5">
                            <div className="text-sm font-black text-slate-500 mb-2">{compareYearA}</div>
                            <div className="text-2xl font-black text-blue-700">{formatCompareDisplay(yearlySelfCompare.summaryA)}</div>
                          </div>
                          <div className="bg-green-50 rounded-3xl border border-green-100 p-5">
                            <div className="text-sm font-black text-slate-500 mb-2">{compareYearB}</div>
                            <div className="text-2xl font-black text-green-700">{formatCompareDisplay(yearlySelfCompare.summaryB)}</div>
                          </div>
                          <div className="bg-purple-50 rounded-3xl border border-purple-100 p-5">
                            <div className="text-sm font-black text-slate-500 mb-2">差異</div>
                            <div className={`text-2xl font-black ${yearlySelfCompare.diff >= 0 ? 'text-purple-700' : 'text-rose-600'}`}>{formatCompareDiff(yearlySelfCompare.diff)}</div>
                          </div>
                          <div className="bg-slate-50 rounded-3xl border p-5">
                            <div className="text-sm font-black text-slate-500 mb-2">結果</div>
                            <div className={`text-2xl font-black ${yearlySelfCompare.diff >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{yearlySelfCompare.diff >= 0 ? '較前一年進步' : '較前一年下降'}</div>
                          </div>
                        </div>

                        <div className="bg-slate-50 rounded-[28px] border p-6">
                          <div className="text-lg font-black text-slate-800 mb-4">
                            {compareView === 'annual' ? '年度總平均比較' : compareView === 'monthly' ? '同月份跨年度比較' : '年度累積比較'}
                          </div>
                          {compareView === 'annual' && <HistoryChart type="bar" labels={yearlySelfCompare.annualBar.labels} datasets={yearlySelfCompare.annualBar.datasets} title={`${yearCompareAgent}｜年度平均比較`} />}
                          {compareView === 'monthly' && <HistoryChart type="line" labels={yearlySelfCompare.monthlyChart.labels} datasets={yearlySelfCompare.monthlyChart.datasets} title={`${yearCompareAgent}｜${compareYearA} vs ${compareYearB}`} />}
                          {compareView === 'cumulative' && <HistoryChart type="line" labels={yearlySelfCompare.cumulativeChart.labels} datasets={yearlySelfCompare.cumulativeChart.datasets} title={`${yearCompareAgent}｜累積比較`} />}
                        </div>

                        <div className="overflow-x-auto custom-scrollbar rounded-3xl border">
                          <table className="w-full text-center text-sm whitespace-nowrap">
                            <thead className="bg-slate-900 text-white font-black">
                              <tr>
                                <th className="px-6 py-4">月份</th>
                                <th className="px-6 py-4">{compareYearA}</th>
                                <th className="px-6 py-4">{compareYearB}</th>
                                <th className="px-6 py-4">差異</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100 font-bold text-slate-700">
                              {yearlySelfCompare.monthlyTable.map(row => (
                                <tr key={row.month} className="hover:bg-purple-50">
                                  <td className="px-6 py-4 font-black text-slate-700">{row.month}月</td>
                                  <td className="px-6 py-4 font-mono">{formatCompareDisplay(row.yearA)}</td>
                                  <td className="px-6 py-4 font-mono">{formatCompareDisplay(row.yearB)}</td>
                                  <td className={`px-6 py-4 font-mono ${row.diff >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{formatCompareDiff(row.diff)}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </>
                    ) : (
                      <div className="text-center py-16 text-slate-400 font-bold">目前沒有足夠的跨年資料可比較</div>
                    )}
                  </div>
                )}
              </div>
            )}

            {activeTab === 'master' && (
              <div className="bg-white rounded-[40px] shadow-sm border overflow-hidden p-8">
                <div className="flex flex-wrap gap-4 items-center justify-between mb-6">
                  <div className="flex flex-wrap gap-3">
                    <button onClick={() => setMasterViewMode('current')} className={`px-4 py-2 rounded-2xl font-black ${masterViewMode === 'current' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'}`}>當月明細</button>
                    <button onClick={() => setMasterViewMode('cumulative')} className={`px-4 py-2 rounded-2xl font-black ${masterViewMode === 'cumulative' ? 'bg-purple-600 text-white' : 'bg-slate-100 text-slate-600'}`}>累積明細</button>
                  </div>
                  <div className="flex flex-wrap gap-3 items-center">
                    <span className="text-sm font-bold text-slate-400">雲端月份：{detailMonths.length} 個</span>
                    {masterViewMode === 'current' && (
                      <select value={masterSelectedMonth || ''} onChange={(e) => setMasterSelectedMonth(e.target.value)} className="border border-slate-300 rounded-xl px-4 py-2 font-bold text-slate-600 bg-white">
                        {!masterSelectedMonth && <option value="" disabled>請選擇月份...</option>}
                        {detailMonths.map(month => <option key={month} value={month}>{month}</option>)}
                      </select>
                    )}
                  </div>
                </div>

                <div className="mb-4 text-sm font-bold text-slate-500">
                  {masterViewMode === 'current'
                    ? `目前顯示：${masterSelectedMonth || '尚未選擇月份'}（${displayedMasterRows.length} 筆）`
                    : `目前顯示：累積明細（共 ${displayedMasterRows.length} 筆）`}
                </div>

                <div className="overflow-x-auto max-h-[800px] custom-scrollbar rounded-3xl border">
                  <table className="w-full text-left text-[11px] border-collapse font-bold">
                    <thead className="bg-slate-900 text-white sticky top-0 z-20 shadow-lg font-black uppercase">
                      <tr>
                        {masterViewMode === 'cumulative' && <th className="px-4 py-5">來源月份</th>}
                        <th className="px-6 py-5">客服名稱</th>
                        <th className="px-4 py-5">班別</th>
                        <th className="px-4 py-5">日期</th>
                        <th className="px-4 py-5">時間</th>
                        <th className="px-4 py-5">遊戲專線</th>
                        <th className="px-4 py-5 text-center">Q1 滿意度</th>
                        <th className="px-4 py-5 text-center">Q2 滿意度</th>
                        <th className="px-4 py-5 text-center">通話秒數</th>
                        <th className="px-8 py-5">對話 ID</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 font-medium">
                      {displayedMasterRows.length === 0 ? (
                        <tr>
                          <td colSpan={masterViewMode === 'cumulative' ? 10 : 9} className="px-6 py-12 text-center text-slate-400 font-bold">目前沒有可顯示的明細資料</td>
                        </tr>
                      ) : (
                        displayedMasterRows.map((d, i) => (
                          <tr key={(d.id || 'row') + '-' + i} className={`group ${getEvenRowClass(i)} hover:bg-sky-100`}>
                            {masterViewMode === 'cumulative' && <td className="px-4 py-4 text-slate-500 font-mono">{d.sourceMonth || '-'}</td>}
                            <td className="px-6 py-4 text-slate-800 font-black">{d.agent}</td>
                            <td className="px-4 py-4 text-slate-500">{d.shift}</td>
                            <td className="px-4 py-4 text-slate-500 font-mono">{d.date}</td>
                            <td className="px-4 py-4 text-slate-500 font-mono">{d.time}</td>
                            <td className="px-4 py-4 text-slate-700">{d.line}</td>
                            <td className="px-4 py-4 text-center">{d.q1}</td>
                            <td className="px-4 py-4 text-center">{d.q2}</td>
                            <td className="px-4 py-4 text-center font-mono">{Number(d.duration || 0)}</td>
                            <td className="px-8 py-4 font-mono text-[10px] text-slate-400 id-column group-hover:text-blue-600 transition-colors">{d.id}</td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
