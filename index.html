const formatPercent = (n) => `${Number(n || 0).toFixed(2)}%`;

const normalizeMonthKey = (value) => {
  if (!value) return "";
  const m = String(value).trim().match(/^(\d{4})[-\/](\d{1,2})$/);
  if (!m) return "";

const formatDateKey = (d) => {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};

const formatCustomDate = (dateStr) => {
  if (!dateStr) return "";
  const parts = String(dateStr).split(/[-/]/);
  if (parts.length >= 3) {
    return `${parts[0]}/${parseInt(parts[1], 10)}/${parseInt(parts[2], 10)}`;
  }
  return dateStr;
};

const formatWeekKeyZh = (weekKey) => {
  const m = String(weekKey || "").match(/^(\d{4})-W(\d{2})$/);
  if (!m) return weekKey || "";
  return `${m[1]}年第${parseInt(m[2], 10)}週`;
};

const formatWeekDisplay = (weekKey, weekLabel = "") => {
  const zh = formatWeekKeyZh(weekKey);
  if (!weekLabel) return zh;
  return `${zh}（${String(weekLabel).replace(/\s*~\s*/g, "～")}）`;
};

const formatMonthDisplay = (monthKey = "") => {
  const m = String(monthKey || "").match(/^(\d{4})-(\d{2})$/);
  if (!m) return monthKey || "";
  return `${m[1]}年${m[2]}月`;
};

const formatYearDisplay = (yearKey = "") => {
  return yearKey ? `${yearKey}年` : "";
};

const getLoginLockState = () => {
  try {
    const raw = localStorage.getItem(LOGIN_LOCK_KEY);
    if (!raw) return { failures: 0, lockedUntil: 0 };

    const state = JSON.parse(raw);
    if (Number(state.lockedUntil || 0) && Date.now() < Number(state.lockedUntil)) {
      return state;
    }

    if (Number(state.lockedUntil || 0) && Date.now() >= Number(state.lockedUntil)) {
      localStorage.removeItem(LOGIN_LOCK_KEY);
      return { failures: 0, lockedUntil: 0 };
    }

    return {
      failures: Number(state.failures || 0),
      lockedUntil: 0
    };
  } catch (e) {
    return { failures: 0, lockedUntil: 0 };
  }
};

const recordLoginFailure = () => {
  const current = getLoginLockState();
  const failures = Number(current.failures || 0) + 1;
  const lockedUntil =
    failures >= SECURITY_CONFIG.maxLoginFailures
      ? Date.now() + SECURITY_CONFIG.lockoutMinutes * 60 * 1000
      : 0;

  const next = { failures, lockedUntil };
  localStorage.setItem(LOGIN_LOCK_KEY, JSON.stringify(next));
  return next;
};

const clearLoginFailures = () => {
  try {
    localStorage.removeItem(LOGIN_LOCK_KEY);
  } catch (e) {}
};

const formatLockoutText = (lockedUntil) => {
  const remainMs = Math.max(0, Number(lockedUntil || 0) - Date.now());
  const remainMin = Math.ceil(remainMs / 60000);
  return remainMin > 0 ? `登入失敗次數過多，請 ${remainMin} 分鐘後再試。` : "";
};

const toDate = (dateStr, timeStr = "00:00:00") => {
  if (!dateStr) return null;
  const safeDate = String(dateStr).replace(/\//g, "-");
  const safeTime = timeStr || "00:00:00";
  const dt = new Date(`${safeDate}T${safeTime.length === 5 ? safeTime + ":00" : safeTime}`);
  return Number.isNaN(dt.getTime()) ? null : dt;
};

const getWeekInfo = (dateStr, timeStr = "00:00:00") => {
  const dt = toDate(dateStr, timeStr);
  if (!dt) return null;

  const clone = new Date(dt);
  clone.setHours(0, 0, 0, 0);

  const day = clone.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;

  const monday = new Date(clone);
  monday.setDate(clone.getDate() + diffToMonday);

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  const firstThursday = new Date(monday);
  firstThursday.setDate(monday.getDate() + 3);

  const weekYear = firstThursday.getFullYear();

  const jan4 = new Date(weekYear, 0, 4);
  const jan4Day = jan4.getDay() || 7;

  const firstWeekMonday = new Date(jan4);
  firstWeekMonday.setDate(jan4.getDate() - jan4Day + 1);

  const weekNo = Math.floor((monday - firstWeekMonday) / 604800000) + 1;

  return {
    weekKey: `${weekYear}-W${String(weekNo).padStart(2, "0")}`,
    weekLabel: `${monday.getFullYear()}/${monday.getMonth() + 1}/${monday.getDate()} ~ ${sunday.getFullYear()}/${sunday.getMonth() + 1}/${sunday.getDate()}`,
    monday: formatDateKey(monday),
    sunday: formatDateKey(sunday)
  };
};

const getCalendarMonthKey = (dateStr) => {
  if (!dateStr) return "";
  const safe = String(dateStr).replace(/\//g, "-");
  const m = safe.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  return m ? `${m[1]}-${String(m[2]).padStart(2, "0")}` : "";
};

const getCalendarYearKey = (dateStr) => {
  if (!dateStr) return "";
  const safe = String(dateStr).replace(/\//g, "-");
  const m = safe.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  return m ? m[1] : "";
};

const weekKeyToNumber = (weekKey) => {
  const m = String(weekKey || "").match(/^(\d{4})-W(\d{2})$/);
  if (!m) return null;
  return Number(m[1]) * 100 + Number(m[2]);
};

const monthKeyToNumber = (monthKey) => {
  const m = String(monthKey || "").match(/^(\d{4})-(\d{2})$/);
  if (!m) return null;
  return Number(m[1]) * 100 + Number(m[2]);
};

const yearKeyToNumber = (yearKey) => {
  const m = String(yearKey || "").match(/^(\d{4})$/);
  if (!m) return null;
  return Number(m[1]);
};

const effectiveKeyToNumber = (value, fallbackType = "weeks") => {
  const v = String(value || "").trim();
  if (!v) return null;
  if (/^\d{4}-W\d{2}$/.test(v)) return weekKeyToNumber(v);
  if (/^\d{4}-\d{2}$/.test(v)) return monthKeyToNumber(v);
  if (/^\d{4}$/.test(v)) return yearKeyToNumber(v);

  if (fallbackType === "months") return monthKeyToNumber(v);
  if (fallbackType === "years") return yearKeyToNumber(v);
  return weekKeyToNumber(v);
};

const periodKeyToNumber = (periodKey, periodType = "weeks") => {
  if (periodType === "weeks") return weekKeyToNumber(periodKey);
  if (periodType === "months") return monthKeyToNumber(periodKey);
  if (periodType === "years") return yearKeyToNumber(periodKey);
  return null;
};

const isAgentEffectiveForPeriod = (agentName, periodKey, periodType, effectiveRules) => {
  const name = String(agentName || "").trim();
  if (!name) return false;

  const rule = (effectiveRules || {})[name];
  if (!rule) return true;

  const current = periodKeyToNumber(periodKey, periodType);
  if (current == null) return true;

  if (rule.start) {
    const start = effectiveKeyToNumber(rule.start, periodType);
    if (start != null && current < start) return false;
  }

  if (rule.end) {
    const end = effectiveKeyToNumber(rule.end, periodType);
    if (end != null && current > end) return false;
  }

  return true;
};

const isAgentEffectiveForRow = (agentName, row, effectiveRules) => {
  if (!row) return false;

  if (row.weekKey) return isAgentEffectiveForPeriod(agentName, row.weekKey, "weeks", effectiveRules);
  if (row.monthKey) return isAgentEffectiveForPeriod(agentName, row.monthKey, "months", effectiveRules);
  if (row.yearKey) return isAgentEffectiveForPeriod(agentName, row.yearKey, "years", effectiveRules);

  return true;
};

const parseDuration = (val) => {
  if (val == null || val === "") return 0;

  const s = String(val).trim();

  if (/^\d+(\.\d+)?$/.test(s)) return Math.round(Number(s));

  const hms = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (hms) return Number(hms[1]) * 3600 + Number(hms[2]) * 60 + Number(hms[3] || 0);

  const zh = s.match(/(?:(\d+)\s*小時)?\s*(?:(\d+)\s*分)?\s*(?:(\d+)\s*秒)?/);
  if (zh && (zh[1] || zh[2] || zh[3])) {
    return Number(zh[1] || 0) * 3600 + Number(zh[2] || 0) * 60 + Number(zh[3] || 0);
  }

  return 0;
};

const normalizeHeaderText = (s) => {
  return String(s || "")
    .trim()
    .replace(/\s+/g, "")
    .replace(/[：:]/g, "");
};

const getRowValueByAliases = (rawRow) => {
  const headers = Object.keys(rawRow || {});
  const indexMap = {};

  headers.forEach((h) => {
    indexMap[normalizeHeaderText(h)] = h;
  });

  const pick = (names) => {
    for (const n of names) {
      const hit = indexMap[normalizeHeaderText(n)];
      if (hit != null) return rawRow[hit];
    }
    return "";
  };

  return {
    direction: pick(["初始方向", "方向", "Initial direction"]),
    datetime: pick(["日期", "日期時間", "Date"]),
    agent: pick(["使用者 - 已互動", "使用者-已互動", "使用者", "客服名稱"]),
    line: pick(["第一佇列", "遊戲專線", "第一字句"]),
    handleTime: pick(["總處理時間", "處理時間"]),
    speakTime: pick(["總發話時間", "通話時長"]),
    tags: pick(["外部標籤", "滿意度"]),
    dialogId: pick(["對話 ID", "對話ID"])
  };
};

const parseDateTimeValue = (value) => {
  if (value == null || value === "") return { date: "", time: "" };

  if (value instanceof Date && !Number.isNaN(value.getTime())) {
    return {
      date: formatDateKey(value),
      time: `${String(value.getHours()).padStart(2, "0")}:${String(value.getMinutes()).padStart(2, "0")}:${String(value.getSeconds()).padStart(2, "0")}`
    };
  }

  if (typeof value === "number" && window.XLSX && window.XLSX.SSF) {
    try {
      const parsed = window.XLSX.SSF.parse_date_code(value);
      if (parsed) {
        return {
          date: `${parsed.y}-${String(parsed.m).padStart(2, "0")}-${String(parsed.d).padStart(2, "0")}`,
          time: `${String(parsed.H || 0).padStart(2, "0")}:${String(parsed.M || 0).padStart(2, "0")}:${String(Math.floor(parsed.S || 0)).padStart(2, "0")}`
        };
      }
    } catch (e) {}
  }

  const raw = String(value || "").trim();
  if (!raw) return { date: "", time: "" };

  const normalized = raw.replace(/-/g, "/");
  const parts = normalized.split(/\s+/);

  let dateStr = parts[0];
  let timeStr = parts.length >= 2 ? parts[1].slice(0, 8) : "";

  const dParts = dateStr.split("/");
  if (dParts.length === 3) {
    dateStr = `${dParts[0]}-${String(dParts[1]).padStart(2, "0")}-${String(dParts[2]).padStart(2, "0")}`;
  } else {
    dateStr = dateStr.replace(/\//g, "-");
  }

  if (timeStr && timeStr.length === 5) timeStr += ":00";

  return { date: dateStr, time: timeStr };
};

const normalizeLineName = (value) => {
  const raw = String(value || "").trim();
  if (!raw) return "";

  const v = raw.replace(/^\d+[_-]?/, "");

  if (v.includes("GT")) return "GT專線";
  if (v.includes("儲值")) return "儲值專線";
  if (v.includes("滿貫")) return "滿貫專線";
  if (v.includes("金好運")) return "金好運專線";

  return v.endsWith("專線") ? v : `${v}專線`;
};

const normalizeSurveyAnswer = (value) => {
  const t = String(value || "").trim();
  return VALID_SURVEY.includes(t) ? t : "未回答";
};

const extractSatisfaction = (tagText) => {
  const text = String(tagText || "").trim();
  let q1 = "";
  let q2 = "";

  if (text) {
    const parts = text
      .split(/[;,，]/)
      .map((v) => v.trim())
      .filter(Boolean);

    for (const p of parts) {
      const m1 = p.match(/^問題?1(.+)$/);
      const m2 = p.match(/^問題?2(.+)$/);

      if (m1) q1 = m1[1].trim();
      if (m2) q2 = m2[1].trim();
    }
  }

  return {
    q1: normalizeSurveyAnswer(q1),

};

const makeRowUniqueKey = (row) => {
  return [
    String(row.id || "").trim(),
    String(row.agent || "").trim(),
    String(row.date || "").trim(),
    String(row.time || "").trim(),
    String(row.line || "").trim(),
    String(row.q1 || "").trim(),
    String(row.q2 || "").trim(),
    String(row.handleDuration || "").trim(),
    String(row.speakDuration || row.duration || "").trim()
  ].join("||");
};

const dedupeRows = (rows = []) => {
  const map = new Map();

  rows.forEach((row) => {
    const key = makeRowUniqueKey(row);
    if (!map.has(key)) map.set(key, row);
  });

  return Array.from(map.values());
};

const parseSimpleCsvLine = (line) => {
  const result = [];
  let cur = "";
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const ch = line[i];

    if (ch === '"') {
      if (inQuotes && line[i + 1] === '"') {
        cur += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === "," && !inQuotes) {
      result.push(cur);
      cur = "";
    } else {
      cur += ch;
    }
  }

  result.push(cur);
  return result;
};

const parseSimpleCsv = (text) => {
  const lines = String(text || "")
    .replace(/^\uFEFF/, "")
    .split(/\r?\n/)
    .filter(Boolean);

  if (!lines.length) return [];

  const headers = parseSimpleCsvLine(lines[0]);

  return lines.slice(1).map((line) => {
    const cols = parseSimpleCsvLine(line);
    const obj = {};

    headers.forEach((h, i) => {
      obj[h] = cols[i] ?? "";
    });

    return obj;
  });
};

const readSpreadsheetRows = async (file) => {
  const ext = (file.name.split(".").pop() || "").toLowerCase();

  if (ext === "csv") return parseSimpleCsv(await file.text());

  if (ext === "xlsx" || ext === "xls") {
    const arrayBuffer = await file.arrayBuffer();
    const workbook = window.XLSX.read(arrayBuffer, {
      type: "array",
      cellDates: true
    });

    const firstSheetName = workbook.SheetNames[0];
    if (!firstSheetName) return [];

    const sheet = workbook.Sheets[firstSheetName];
    return window.XLSX.utils.sheet_to_json(sheet, {
      defval: "",
      raw: true
    });
  }

  throw new Error("不支援的檔案格式");
};

const normalizeStoredRow = (row = {}) => {
  const date = row.date || row["來電日期"] || "";
  const time = row.time || row["來電時間"] || "";
  const info = getWeekInfo(date, time || "00:00:00");

  const monthKey = getCalendarMonthKey(date) || normalizeMonthKey(row.monthKey || "");
  const yearKey = getCalendarYearKey(date) || String(row.yearKey || "");

  const handleDuration = Number(row.handleDuration || row["總處理秒數"] || 0);
  const speakDuration = Number(row.speakDuration || row["總發話秒數"] || row.duration || 0);

  return {
    agent: row.agent || row["客服名稱"] || "",
    shift: row.shift || row["班別"] || "",
    shiftSource: row.shiftSource || row["班別來源"] || "",
    date,
    time,
    monthKey,
    yearKey,
    weekKey: info?.weekKey || row.weekKey || "",
    weekLabel: info?.weekLabel || row.weekLabel || "",
    weekStart: info?.monday || row.weekStart || "",
    weekEnd: info?.sunday || row.weekEnd || "",
    line: row.line || row["遊戲專線"] || "",
    q1: normalizeSurveyAnswer(row.q1 || row["滿意度問題1"]),
    q2: normalizeSurveyAnswer(row.q2 || row["滿意度問題2"]),
    id: row.id || row["對話ID"] || "",
    handleDuration,
    speakDuration,
    duration: speakDuration
  };
};

const buildSummaryRowsFromSource = (rows = [], type = "speak") => {
  const map = new Map();
  const durationKey = type === "handle" ? "handleDuration" : "speakDuration";

  rows.forEach((row) => {
    const agent = row.agent || "";
    if (!agent) return;

    if (!map.has(agent)) {
      map.set(agent, {
        "客服名稱": agent,
        "班別": row.shift || "",
        "GT專線": 0,
        "儲值專線": 0,
        "GT+儲值專線": 0,
        "滿貫專線": 0,
        "金好運專線": 0,
        "總計": 0
      });
    }

    const target = map.get(agent);
    target["班別"] = target["班別"] || row.shift || "";

    const sec = Number(row[durationKey] || 0);

    if ((row.line || "").includes("GT")) {
      target["GT專線"] += sec;
      target["GT+儲值專線"] += sec;
    }

    if ((row.line || "").includes("儲值")) {
      target["儲值專線"] += sec;
      target["GT+儲值專線"] += sec;
    }

    if ((row.line || "").includes("滿貫")) target["滿貫專線"] += sec;
    if ((row.line || "").includes("金好運")) target["金好運專線"] += sec;

    target["總計"] += sec;
  });

  return Array.from(map.values()).sort((a, b) =>
    a["客服名稱"].localeCompare(b["客服名稱"], "zh-Hant")
  );
};

const summarizePreviewRows = (rows = []) => {

const chunkArray = (arr = [], size = 300) => {

const paginateRows = (rows = [], page = 1, pageSize = 100) => {
  const safePageSize = Number(pageSize || 100);
  const totalPages = Math.max(1, Math.ceil((rows || []).length / safePageSize));
  const safePage = Math.min(Math.max(Number(page || 1), 1), totalPages);
  const start = (safePage - 1) * safePageSize;

  return {
    rows: rows.slice(start, start + safePageSize),
    safePage,
    totalPages,
    start
  };
};

function PaginationControls({ total = 0, page = 1, pageSize = 100, onPageChange, onPageSizeChange }) {
  const totalPages = Math.max(1, Math.ceil(Number(total || 0) / Number(pageSize || 100)));
  const safePage = Math.min(Math.max(Number(page || 1), 1), totalPages);
  const start = total ? (safePage - 1) * Number(pageSize) + 1 : 0;
  const end = Math.min(total, safePage * Number(pageSize));

  return (
    <div className="flex flex-wrap items-center justify-between gap-3 px-4 py-3 bg-slate-50 border-x border-b rounded-b-3xl text-sm font-bold text-slate-600">

      <div className="flex items-center gap-2 flex-wrap">
        <span>每頁</span>
        <select
          value={pageSize}
          onChange={(e) => {

          className="border border-slate-300 rounded-xl px-3 py-2 bg-white font-bold"
        >
          {[50, 100, 200, 500, 1000].map((size) => (
            <option key={size} value={size}>{size}</option>

        <span className="px-2">{safePage} / {totalPages}</span>
        <button type="button" disabled={safePage >= totalPages} onClick={() => onPageChange(safePage + 1)} className="px-3 py-2 rounded-xl bg-white border disabled:opacity-40">下一頁</button>

    </div>
  );
}

  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new window.Chart(canvasRef.current, {
      type,
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        spanGaps: false,
        plugins: {
          title: { display: !!title, text: title },
          legend: { display: true }
        }
      }
    });

    return () => chartRef.current && chartRef.current.destroy();
  }, [type, JSON.stringify(labels), JSON.stringify(datasets), title]);

  return <div className="chart-wrap"><canvas ref={canvasRef}></canvas></div>;
}

        <div className="bg-white rounded-2xl border p-4"><div className="text-xs text-slate-400 font-black mb-1">傳入筆數</div><div className="text-2xl font-black text-slate-800">{report.incomingCount}</div></div>
        <div className="bg-white rounded-2xl border p-4"><div className="text-xs text-slate-400 font-black mb-1">有效資料筆數</div><div className="text-2xl font-black text-slate-800">{report.validCount}</div></div>
        <div className="bg-white rounded-2xl border p-4"><div className="text-xs text-slate-400 font-black mb-1">目前預覽筆數</div><div className="text-2xl font-black text-slate-800">{report.previewCount}</div></div>

      {monthRows.length > 0 && (
        <div className="overflow-x-auto custom-scrollbar rounded-2xl border bg-white">
          <table className="w-full text-center text-sm whitespace-nowrap">
            <thead className="bg-indigo-900 text-white font-black"><tr><th className="px-4 py-3">月份</th><th className="px-4 py-3">應抓日期</th><th className="px-4 py-3">實際日期範圍</th><th className="px-4 py-3">有效筆數</th><th className="px-4 py-3">狀態</th></tr></thead>
            <tbody className="divide-y divide-slate-100 font-bold text-slate-700">
              {monthRows.map((m) => (
                <tr key={m.monthKey} className={m.ok ? "bg-white" : "bg-amber-50"}>
                  <td className="px-4 py-3 font-black">{formatMonthDisplay(m.monthKey)}</td>
                  <td className="px-4 py-3">{m.expectedRange}</td>
                  <td className="px-4 py-3">{m.actualRange}</td>
                  <td className="px-4 py-3">{m.validCount}</td>
                  <td className="px-4 py-3">{m.ok ? "完整月份範圍" : "非完整月份範圍"}</td>

              ))}

          </table>
        </div>
      )}

      {weekRows.length > 0 && (
        <div className="overflow-x-auto custom-scrollbar rounded-2xl border bg-white">
          <table className="w-full text-center text-sm whitespace-nowrap">
            <thead className="bg-indigo-900 text-white font-black"><tr><th className="px-4 py-3">週次</th><th className="px-4 py-3">日期範圍</th><th className="px-4 py-3">原始傳入</th><th className="px-4 py-3">有效資料</th><th className="px-4 py-3">目前預覽</th><th className="px-4 py-3">狀態</th></tr></thead>
            <tbody className="divide-y divide-slate-100 font-bold text-slate-700">
              {weekRows.map((w) => (
                <tr key={w.weekKey} className={w.ok ? "bg-white" : "bg-rose-50"}>
                  <td className="px-4 py-3 font-black">{formatWeekKeyZh(w.weekKey)}</td>
                  <td className="px-4 py-3">{w.weekLabel || "-"}</td>
                  <td className="px-4 py-3">{w.rawIncomingCount}</td>
                  <td className="px-4 py-3">{w.validCount}</td>
                  <td className="px-4 py-3">{w.previewCount}</td>
                  <td className="px-4 py-3">{w.ok ? "正常" : "預覽缺漏"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(!firebaseReady);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");

  const [loginError, setLoginError] = useState("");
  const [loginLockText, setLoginLockText] = useState(formatLockoutText(getLoginLockState().lockedUntil));

  const [syncStatus, setSyncStatus] = useState(firebaseReady ? "尚未登入" : "目前為本機模式");
  const [activeTab, setActiveTab] = useState("weekly");

  const [shiftRules, setShiftRules] = useState(EMPTY_SHIFT_RULES);
  const [effectiveRules, setEffectiveRules] = useState(EMPTY_EFFECTIVE_RULES);

  const [shiftEditorMonth, setShiftEditorMonth] = useState("default");
  const [shiftMonthInput, setShiftMonthInput] = useState("");
  const [shiftDraft, setShiftDraft] = useState({ "早班": "", "中班": "", "晚班": "" });

  const [effectiveDraft, setEffectiveDraft] = useState({ name: "", start: "", end: "", note: "" });

  const [cloudMasterStore, setCloudMasterStore] = useState(EMPTY_CLOUD_STORE);
  const [cloudIndex, setCloudIndex] = useState([]);
  const [selectedCloudItems, setSelectedCloudItems] = useState([]);

  const [previewRows, setPreviewRows] = useState([]);
  const [previewMeta, setPreviewMeta] = useState(EMPTY_PREVIEW_META);
  const [csvFileName, setCsvFileName] = useState("");
  const [uploadMessage, setUploadMessage] = useState("");
  const [uploadMode, setUploadMode] = useState("auto");
  const [validationReport, setValidationReport] = useState(null);

  const [viewType, setViewType] = useState("weeks");
  const [selectedMetric, setSelectedMetric] = useState("overallVerySatAvg");
  const [selectedAgent, setSelectedAgent] = useState("");
  const [trendCompareMode, setTrendCompareMode] = useState("single");
  const [selectedTrendAgents, setSelectedTrendAgents] = useState([]);
  const [includeHistoryAgents, setIncludeHistoryAgents] = useState(false);

  const [selectedYears, setSelectedYears] = useState([]);
  const [selectedMonths, setSelectedMonths] = useState([]);
  const [selectedWeeks, setSelectedWeeks] = useState([]);

  const [detailMode, setDetailMode] = useState("weeks");
  const [detailKey, setDetailKey] = useState("");

  const [previewPage, setPreviewPage] = useState(1);
  const [previewPageSize, setPreviewPageSize] = useState(100);
  const [detailPage, setDetailPage] = useState(1);
  const [detailPageSize, setDetailPageSize] = useState(100);

  const [isDragging, setIsDragging] = useState(false);

  const fileInputRef = useRef(null);

  const getActiveUser = useCallback((overrideUser = null) => {
    return overrideUser || user || (firebaseReady && auth ? auth.currentUser : null);
  }, [user]);

  const getAllAgentsFromRules = useCallback((rules = shiftRules) => {
    const set = new Set();
    Object.values(rules || {}).forEach((group) => {
      Object.values(group || {}).forEach((names) => (names || []).forEach((n) => set.add(n)));
    });
    return Array.from(set).sort((a, b) => a.localeCompare(b, "zh-Hant"));
  }, [shiftRules]);

  const getShiftInfoFromRules = useCallback((rules, agentName, monthKey, existingShift = "") => {
    const activeRules = rules || EMPTY_SHIFT_RULES;
    const normalizedMonth = normalizeMonthKey(monthKey);

    const specialShift = getSpecialShiftOverride(agentName, normalizedMonth);
    if (specialShift) return { shift: specialShift, source: "專案特殊規則" };

    const monthRules = activeRules[normalizedMonth];
    if (monthRules) {
      for (const [shift, names] of Object.entries(monthRules)) {
        if ((names || []).includes(agentName)) return { shift, source: "月份班表" };
      }
    }

    const defaultRules = activeRules.default || EMPTY_SHIFT_RULES.default;
    for (const [shift, names] of Object.entries(defaultRules)) {
      if ((names || []).includes(agentName)) return { shift, source: "default 班表" };
    }

    if (existingShift) return { shift: existingShift, source: "資料原始班別" };

    return { shift: "", source: "未設定" };
  }, []);

  const getShiftInfoByMonth = useCallback((agentName, monthKey, existingShift = "") => {
    return getShiftInfoFromRules(shiftRules, agentName, monthKey, existingShift);
  }, [getShiftInfoFromRules, shiftRules]);

  const saveShiftRules = async (rules) => {
    setShiftRules(rules);
    localStorage.setItem("weekly_call_project_shift_rules", JSON.stringify(rules));
    if (firebaseReady && user && db) await db.collection("weekly_call_project").doc("shift_rules").set({ rules }, { merge: true });
    setSyncStatus("☁️ 班表已同步 ✓");
  };

  const saveEffectiveRules = async (rules) => {
    setEffectiveRules(rules);
    localStorage.setItem("weekly_call_project_effective_rules", JSON.stringify(rules));
    if (firebaseReady && user && db) await db.collection("weekly_call_project").doc("effective_rules").set({ rules }, { merge: true });
    setSyncStatus("☁️ 人員有效期間已同步 ✓");
    await loadCloudBundle({ autoPreview: false, effectiveRulesOverride: rules });
  };

  const buildAgentStats = useCallback((rows, periodMonthKey = "", rulesOverride = null, effectiveOverride = null, periodKey = "", periodType = "weeks") => {
    const activeRules = rulesOverride || shiftRules;
    const activeEffective = effectiveOverride || effectiveRules;
    const agentBase = {};

    const shouldSeedAgent = (name) => includeHistoryAgents ? isAgentEffectiveForPeriod(name, periodKey, periodType, activeEffective) : true;

    getAllAgentsFromRules(activeRules).forEach((name) => {
      if (!periodKey || shouldSeedAgent(name)) {
        agentBase[name] = {
          name,
          shift: getShiftInfoFromRules(activeRules, name, periodMonthKey).shift,
          totalCalls: 0,
          q1Answered: 0, q1VerySatisfied: 0, q1Ok: 0, q1VeryUnsatisfied: 0,
          q2Answered: 0, q2VerySatisfied: 0, q2Ok: 0, q2VeryUnsatisfied: 0,
          lines: { "GT專線": 0, "儲值專線": 0, "GT+儲值專線": 0, "滿貫專線": 0, "金好運專線": 0 }
        };
      }
    });

    rows.forEach((d) => {
      if (!d.agent) return;
      if (!isAgentEffectiveForRow(d.agent, d, activeEffective)) return;

      if (!agentBase[d.agent]) {
        agentBase[d.agent] = {
          name: d.agent,
          shift: d.shift || getShiftInfoFromRules(activeRules, d.agent, d.monthKey).shift,
          totalCalls: 0,
          q1Answered: 0, q1VerySatisfied: 0, q1Ok: 0, q1VeryUnsatisfied: 0,
          q2Answered: 0, q2VerySatisfied: 0, q2Ok: 0, q2VeryUnsatisfied: 0,
          lines: { "GT專線": 0, "儲值專線": 0, "GT+儲值專線": 0, "滿貫專線": 0, "金好運專線": 0 }
        };
      }

      const a = agentBase[d.agent];
      a.shift = d.shift || a.shift;
      a.totalCalls += 1;

      if (VALID_SURVEY.includes(d.q1)) {
        a.q1Answered += 1;
        if (d.q1 === "非常滿意") a.q1VerySatisfied += 1;
        if (d.q1 === "尚可") a.q1Ok += 1;
        if (d.q1 === "非常不滿意") a.q1VeryUnsatisfied += 1;
      }

      if (VALID_SURVEY.includes(d.q2)) {
        a.q2Answered += 1;
        if (d.q2 === "非常滿意") a.q2VerySatisfied += 1;
        if (d.q2 === "尚可") a.q2Ok += 1;
        if (d.q2 === "非常不滿意") a.q2VeryUnsatisfied += 1;
      }

      const sec = Number(d.speakDuration || d.duration || 0);

      if ((d.line || "").includes("GT")) { a.lines["GT專線"] += sec; a.lines["GT+儲值專線"] += sec; }
      if ((d.line || "").includes("儲值")) { a.lines["儲值專線"] += sec; a.lines["GT+儲值專線"] += sec; }
      if ((d.line || "").includes("滿貫")) a.lines["滿貫專線"] += sec;
      if ((d.line || "").includes("金好運")) a.lines["金好運專線"] += sec;
    });

    return Object.values(agentBase).map((a) => {
      const q1VerySatRate = a.q1Answered ? (a.q1VerySatisfied / a.q1Answered) * 100 : 0;
      const q1OkRate = a.q1Answered ? (a.q1Ok / a.q1Answered) * 100 : 0;
      const q1VeryUnsatRate = a.q1Answered ? (a.q1VeryUnsatisfied / a.q1Answered) * 100 : 0;
      const q1SurRate = a.totalCalls ? (a.q1Answered / a.totalCalls) * 100 : 0;
      const q1UnansweredRate = a.totalCalls ? ((a.totalCalls - a.q1Answered) / a.totalCalls) * 100 : 0;

      const q2VerySatRate = a.q2Answered ? (a.q2VerySatisfied / a.q2Answered) * 100 : 0;
      const q2OkRate = a.q2Answered ? (a.q2Ok / a.q2Answered) * 100 : 0;
      const q2VeryUnsatRate = a.q2Answered ? (a.q2VeryUnsatisfied / a.q2Answered) * 100 : 0;
      const q2SurRate = a.totalCalls ? (a.q2Answered / a.totalCalls) * 100 : 0;
      const q2UnansweredRate = a.totalCalls ? ((a.totalCalls - a.q2Answered) / a.totalCalls) * 100 : 0;

      return {
        ...a,
        q1SurRate,
        q1UnansweredRate,
        q1VerySatRate,
        q1OkRate,
        q1VeryUnsatRate,
        q2SurRate,
        q2UnansweredRate,
        q2VerySatRate,
        q2OkRate,
        q2VeryUnsatRate,
        overallVerySatAvg: (q1VerySatRate + q2VerySatRate) / 2,
        overallOkAvg: (q1OkRate + q2OkRate) / 2,
        overallVeryUnsatAvg: (q1VeryUnsatRate + q2VeryUnsatRate) / 2,
        overallSurAvg: (q1SurRate + q2SurRate) / 2,
        overallUnansweredAvg: (q1UnansweredRate + q2UnansweredRate) / 2
      };
    });
  }, [shiftRules, effectiveRules, includeHistoryAgents, getAllAgentsFromRules, getShiftInfoFromRules]);

  const buildPeriodSummary = useCallback((rows, periodKey, periodLabel, extra = {}, rulesOverride = null, effectiveOverride = null, periodType = "weeks") => {
    const activeEffective = effectiveOverride || effectiveRules;
    const filteredRows = (rows || []).filter((r) => isAgentEffectiveForRow(r.agent, r, activeEffective));
    const periodMonthKey = filteredRows[0]?.monthKey || extra.month || "";

    const agents = buildAgentStats(filteredRows, periodMonthKey, rulesOverride, activeEffective, periodKey, periodType);
    const lineTotals = { "GT專線": 0, "儲值專線": 0, "GT+儲值專線": 0, "滿貫專線": 0, "金好運專線": 0 };

    let verySatTotal = 0, okTotal = 0, veryUnsatTotal = 0, surTotal = 0, unansweredTotal = 0;
    let countSat = 0, countSur = 0, teamTotalCalls = 0;

    agents.forEach((a) => {
      teamTotalCalls += a.totalCalls;
      Object.keys(lineTotals).forEach((k) => { lineTotals[k] += a.lines[k]; });
      if (a.totalCalls > 0) {
        verySatTotal += a.overallVerySatAvg;
        okTotal += a.overallOkAvg;
        veryUnsatTotal += a.overallVeryUnsatAvg;
        surTotal += a.overallSurAvg;
        unansweredTotal += a.overallUnansweredAvg;
        countSat += 1;
        countSur += 1;
      }
    });

    return {
      periodKey,
      periodLabel,
      agents,
      teamTotalCalls,
      teamLineTime: lineTotals,
      overallVerySatAvg: countSat ? verySatTotal / countSat : 0,
      overallOkAvg: countSat ? okTotal / countSat : 0,
      overallVeryUnsatAvg: countSat ? veryUnsatTotal / countSat : 0,
      overallSurAvg: countSur ? surTotal / countSur : 0,
      overallUnansweredAvg: countSur ? unansweredTotal / countSur : 0,
      ...extra
    };
  }, [buildAgentStats, effectiveRules]);

  const fetchRowsFromReportDoc = useCallback(async (itemOrDoc) => {
    const item = typeof itemOrDoc.data === "function" ? { id: itemOrDoc.id, ...itemOrDoc.data() } : itemOrDoc;
    if (!item) return [];
    if (Array.isArray(item.rows) && item.rows.length) return item.rows;

    if (item.rowStorage === "chunks") {
      const chunksSnap = await db.collection("weekly_call_project_reports").doc(item.id).collection("rows_chunks").orderBy("chunkIndex").get();
      let rows = [];
      chunksSnap.forEach((doc) => {
        const data = doc.data() || {};
        if (Array.isArray(data.rows)) rows = rows.concat(data.rows);
      });
      return rows;
    }

    return [];
  }, []);

  const loadCloudBundle = async (opts = { autoPreview: true }) => {
    const activeUser = getActiveUser(opts.userOverride || null);

    if (!firebaseReady || !db) {
      setSyncStatus("目前為本機模式");
      return;
    }

    if (!activeUser) {
      setSyncStatus("尚未登入");
      return;
    }

    const autoPreview = opts.autoPreview !== false;
    const activeShiftRules = opts.shiftRulesOverride || shiftRules;
    const activeEffective = opts.effectiveRulesOverride || effectiveRules;

    try {
      setSyncStatus(`登入成功，雲端資料讀取中... ${activeUser.email || ""}`);
      const reportsSnap = await db.collection("weekly_call_project_reports").get();

      const rawItems = reportsSnap.docs.map((doc) => ({ id: doc.id, ...doc.data() })).filter((item) => !item.deleted);
      const reportRowsMap = new Map();
      const rowsResults = await Promise.all(rawItems.map((item) => fetchRowsFromReportDoc(item)));

      let allRows = [];

      rawItems.forEach((item, index) => {
        const rows = rowsResults[index] || [];
        reportRowsMap.set(item.id, rows);
        allRows = allRows.concat(rows);
      });

      const items = rawItems
        .map((item) => ({ ...item, __sortValue: Number(item.createdAtMillis || item.createdAt?.seconds || 0) }))
        .sort((a, b) => (b.__sortValue || 0) - (a.__sortValue || 0));

      setCloudIndex(items);

      allRows = dedupeRows(
        allRows.map((r) => {
          const n = normalizeStoredRow(r);
          const si = getShiftInfoFromRules(activeShiftRules, n.agent, n.monthKey, n.shift);
          return { ...n, shift: si.shift, shiftSource: si.source };
        })
      )
        .filter((r) => isAgentEffectiveForRow(r.agent, r, activeEffective))
        .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));

      const weeks = {};
      const months = {};
      const years = {};
      const detailByWeek = {};
      const weekGroups = {};
      const monthGroups = {};
      const yearGroups = {};

      allRows.forEach((row) => {
        if (!row.weekKey || !row.monthKey || !row.yearKey) return;

        if (!weekGroups[row.weekKey]) weekGroups[row.weekKey] = [];
        if (!monthGroups[row.monthKey]) monthGroups[row.monthKey] = [];
        if (!yearGroups[row.yearKey]) yearGroups[row.yearKey] = [];

        weekGroups[row.weekKey].push(row);
        monthGroups[row.monthKey].push(row);
        yearGroups[row.yearKey].push(row);
      });

      Object.entries(weekGroups).forEach(([key, rows]) => {
        const first = rows[0];
        weeks[key] = buildPeriodSummary(rows, key, first.weekLabel, { year: first.yearKey, month: first.monthKey, weekStart: first.weekStart, weekEnd: first.weekEnd }, activeShiftRules, activeEffective, "weeks");
        detailByWeek[key] = { weekKey: key, weekLabel: first.weekLabel, rows: rows.map((r) => ({ ...r })) };
      });

      Object.entries(monthGroups).forEach(([key, rows]) => {
        const first = rows[0];
        months[key] = buildPeriodSummary(rows, key, key, { year: first.yearKey, month: key }, activeShiftRules, activeEffective, "months");
      });

      Object.entries(yearGroups).forEach(([key, rows]) => {
        years[key] = buildPeriodSummary(rows, key, key, { year: key }, activeShiftRules, activeEffective, "years");
      });

      setCloudMasterStore({ rows: allRows, weeks, months, years, detailByWeek });

      const nextYears = Object.keys(years).sort();
      const nextMonths = Object.keys(months).sort();
      const nextWeeks = Object.keys(weeks).sort();

      setSelectedYears((prev) => {
        const kept = prev.filter((x) => nextYears.includes(x));
        const missing = nextYears.filter((x) => !kept.includes(x));
        return [...kept, ...missing];
      });
      setSelectedMonths((prev) => {
        const kept = prev.filter((x) => nextMonths.includes(x));
        const missing = nextMonths.filter((x) => !kept.includes(x));
        return [...kept, ...missing];
      });
      // 修正：雲端重新載入後，自動補齊所有新週次，避免 2026-W17 其實存在但被舊篩選狀態隱藏。
      setSelectedWeeks((prev) => {
        const kept = prev.filter((x) => nextWeeks.includes(x));
        const missing = nextWeeks.filter((x) => !kept.includes(x));
        return [...kept, ...missing];
      });

      // 修正：通話明細、通話時間、滿意度分析查詢／趨勢分析不依賴目前預覽檔，而是以雲端主資料為準。
      // 雲端讀取完成後，若明細尚未選擇期間，直接帶入最新一週。
      if (nextWeeks.length && (!detailKey || !nextWeeks.includes(detailKey))) {
        setDetailMode("weeks");
        setDetailKey(nextWeeks[nextWeeks.length - 1]);
      } else if (!nextWeeks.length && nextMonths.length && (!detailKey || !nextMonths.includes(detailKey))) {
        setDetailMode("months");
        setDetailKey(nextMonths[nextMonths.length - 1]);
      } else if (!nextWeeks.length && !nextMonths.length && nextYears.length && (!detailKey || !nextYears.includes(detailKey))) {
        setDetailMode("years");
        setDetailKey(nextYears[nextYears.length - 1]);
      }

      if (autoPreview && items.length > 0) {
        // v3 修正：不要自動預覽「只有索引、沒有明細 rows」的最新雲端紀錄。
        // 這種紀錄通常來自重複上傳：validCount 有數字、insertedCount = 0、rows/chunks 為空。
        // 若直接拿它當最新資料，畫面就會顯示檔名 2026202604.csv 但共 0 筆。
        const latestWithRows = items.find((item) => (reportRowsMap.get(item.id) || []).length > 0);
        const latest = latestWithRows || items[0];
        const raw = reportRowsMap.get(latest.id) || [];

        const preview = dedupeRows(
          raw.map((r) => {
            const n = normalizeStoredRow(r);
            const si = getShiftInfoFromRules(activeShiftRules, n.agent, n.monthKey, n.shift);
            return { ...n, shift: si.shift, shiftSource: si.source };
          })
        )
          .filter((r) => isAgentEffectiveForRow(r.agent, r, activeEffective))
          .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));

        setPreviewRows(preview);
        setCsvFileName(latest.fileName || "雲端資料");
        setPreviewMeta({
          mode: raw.length ? "cloud-latest-with-rows" : "cloud-latest-metadata-only",

  const buildUploadRows = (rawRows) => {
    const detailRows = [];

    for (const raw of rawRows) {
      const data = getRowValueByAliases(raw);
      const direction = String(data.direction || "").trim();
      const agent = String(data.agent || "").trim();
      if (direction !== "傳入" || !agent) continue;

      const { date, time } = parseDateTimeValue(data.datetime);
      const monthKey = getCalendarMonthKey(date);
      const yearKey = getCalendarYearKey(date);
      const weekInfo = getWeekInfo(date, time || "00:00:00");
      const shiftInfo = getShiftInfoByMonth(agent, monthKey);
      const sat = extractSatisfaction(data.tags);

      const row = {
        agent,
        shift: shiftInfo.shift,
        shiftSource: shiftInfo.source,
        date,
        time,
        monthKey,
        yearKey,
        weekKey: weekInfo?.weekKey || "",
        weekLabel: weekInfo?.weekLabel || "",
        weekStart: weekInfo?.monday || "",
        weekEnd: weekInfo?.sunday || "",
        line: normalizeLineName(data.line),
        q1: sat.q1,
        q2: sat.q2,
        id: String(data.dialogId || "").trim(),
        handleDuration: parseDuration(data.handleTime),
        speakDuration: parseDuration(data.speakTime)
      };

      if (isAgentEffectiveForRow(agent, row, effectiveRules)) detailRows.push(row);
    }

    return dedupeRows(detailRows).sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
  };


  const getMonthExpectedRange = (monthKey) => {
    const m = String(monthKey || "").match(/^(\d{4})-(\d{2})$/);
    if (!m) return { start: "", end: "", label: "" };
    const y = Number(m[1]);
    const month = Number(m[2]);
    const start = `${y}-${String(month).padStart(2, "0")}-01`;
    const last = new Date(y, month, 0);
    const end = formatDateKey(last);
    return { start, end, label: `${formatCustomDate(start)}～${formatCustomDate(end)}` };
  };

  const buildValidationReport = (rawRows = [], validRows = [], previewRowsForReport = [], sourceName = "目前資料") => {
    const excluded = { notIncoming: 0, missingAgent: 0, missingDate: 0, ineffective: 0 };
    const rawWeekMap = {};
    const validWeekMap = {};
    const previewWeekMap = {};
    const monthMap = {};
    const validDates = [];

    rawRows.forEach((raw) => {
      const data = getRowValueByAliases(raw);
      const direction = String(data.direction || "").trim();
      const agent = String(data.agent || "").trim();
      const { date, time } = parseDateTimeValue(data.datetime);

      if (direction !== "傳入") {
        excluded.notIncoming += 1;
        return;
      }

      const weekInfo = getWeekInfo(date, time || "00:00:00");
      if (weekInfo?.weekKey) {
        if (!rawWeekMap[weekInfo.weekKey]) rawWeekMap[weekInfo.weekKey] = { count: 0, label: weekInfo.weekLabel };
        rawWeekMap[weekInfo.weekKey].count += 1;
      }

      if (!agent) excluded.missingAgent += 1;
      if (!date) excluded.missingDate += 1;
    });

    validRows.forEach((r) => {
      if (r.date) validDates.push(r.date);
      if (r.weekKey) {
        if (!validWeekMap[r.weekKey]) validWeekMap[r.weekKey] = { count: 0, label: r.weekLabel };
        validWeekMap[r.weekKey].count += 1;
      }
      if (r.monthKey) {
        if (!monthMap[r.monthKey]) monthMap[r.monthKey] = { dates: [], count: 0 };
        monthMap[r.monthKey].dates.push(r.date);
        monthMap[r.monthKey].count += 1;
      }
    });

    previewRowsForReport.forEach((r) => {
      if (r.weekKey) {
        if (!previewWeekMap[r.weekKey]) previewWeekMap[r.weekKey] = { count: 0, label: r.weekLabel };
        previewWeekMap[r.weekKey].count += 1;
      }
    });

    const allWeekKeys = Array.from(new Set([
      ...Object.keys(rawWeekMap),
      ...Object.keys(validWeekMap),
      ...Object.keys(previewWeekMap)
    ])).sort();

    const weekStats = allWeekKeys.map((weekKey) => {
      const rawIncomingCount = rawWeekMap[weekKey]?.count || 0;
      const validCount = validWeekMap[weekKey]?.count || 0;
      const previewCount = previewWeekMap[weekKey]?.count || 0;
      return {
        weekKey,
        weekLabel: rawWeekMap[weekKey]?.label || validWeekMap[weekKey]?.label || previewWeekMap[weekKey]?.label || "",
        rawIncomingCount,
        validCount,
        previewCount,
        ok: validCount === 0 || previewCount > 0
      };
    });

    const monthStats = Object.keys(monthMap).sort().map((monthKey) => {
      const dates = monthMap[monthKey].dates.filter(Boolean).sort();
      const first = dates[0] || "";
      const last = dates[dates.length - 1] || "";
      const expected = getMonthExpectedRange(monthKey);
      return {
        monthKey,
        expectedRange: expected.label,
        actualRange: first && last ? `${formatCustomDate(first)}～${formatCustomDate(last)}` : "-",
        validCount: monthMap[monthKey].count,
        ok: first <= expected.start && last >= expected.end
      };
    });

    const warnings = [];
    const missingWeeks = weekStats.filter((w) => w.validCount > 0 && w.previewCount === 0);
    if (missingWeeks.length) warnings.push(`有效資料含 ${missingWeeks.map((w) => formatWeekKeyZh(w.weekKey)).join("、")}，但目前預覽沒有顯示。`);
    monthStats.filter((m) => !m.ok).forEach((m) => warnings.push(`${formatMonthDisplay(m.monthKey)} 目前不是完整月份資料，應抓 ${m.expectedRange}。`));
    if (excluded.missingAgent > 0) warnings.push(`有 ${excluded.missingAgent} 筆傳入資料缺少客服名稱，已排除統計。`);
    if (excluded.missingDate > 0) warnings.push(`有 ${excluded.missingDate} 筆傳入資料缺少日期，可能無法判斷週次。`);

    const sortedDates = validDates.filter(Boolean).sort();
    return {
      sourceName,
      rawCount: rawRows.length,
      incomingCount: rawRows.length - excluded.notIncoming,
      validCount: validRows.length,
      previewCount: previewRowsForReport.length,
      excluded,
      dateRange: sortedDates.length ? `${formatCustomDate(sortedDates[0])}～${formatCustomDate(sortedDates[sortedDates.length - 1])}` : "-",
      weekStats,
      monthStats,
      warnings
    };
  };

  const handleDataUpload = async (file) => {
    if (!file) return;

    try {
      const raw = await readSpreadsheetRows(file);
      const rowsAll = buildUploadRows(raw);

      const weekCounter = {};
      rowsAll.forEach((r) => {
        if (r.weekKey) weekCounter[r.weekKey] = (weekCounter[r.weekKey] || 0) + 1;
      });

      const weekKeys = Object.keys(weekCounter).sort();
      let mode = uploadMode;
      // 修正：只要檔案跨多週，就一律整批保留，避免 4 月整月資料被單週模式切掉而漏掉 2026-W17。
      if (weekKeys.length > 1) mode = "multi_week";
      else if (mode === "auto") mode = "single_week";

      let rows = rowsAll;
      if (mode === "single_week") {
        const targetWeek = Object.keys(weekCounter).sort((a, b) => (weekCounter[b] - weekCounter[a]) || a.localeCompare(b))[0];
        rows = rowsAll.filter((r) => r.weekKey === targetWeek);
      }

      setCsvFileName(file.name || "");
      setPreviewRows(rows);
      setPreviewMeta({
        mode,
        title: file.name || "上傳資料",
        weekKeys: Array.from(new Set(rows.map((r) => r.weekKey).filter(Boolean))).sort(),
        monthKeys: Array.from(new Set(rows.map((r) => r.monthKey).filter(Boolean))).sort(),
        yearKeys: Array.from(new Set(rows.map((r) => r.yearKey).filter(Boolean))).sort(),
        sourceCount: 1,
        recordCountBeforeDedupe: raw.length,
        recordCountAfterDedupe: rows.length
      });
      setValidationReport(buildValidationReport(raw, rowsAll, rows, file.name || "上傳資料"));
      setUploadMessage(`檔案「${file.name}」讀取完成，共 ${rows.length} 筆有效資料。${mode === "single_week" ? "目前為單週模式。" : "目前為整批模式；已保留所有週次。"}`);
      setActiveTab("weekly");
    } catch (e) {
      console.error(e);
      alert("檔案讀取失敗，請確認格式是否為 csv / xlsx / xls。");
    }
  };

  const saveCurrentUploadToCloud = async () => {
    const activeUser = getActiveUser();
    if (!firebaseReady || !activeUser || !db) return alert("目前未登入，無法同步到雲端。");
    if (!previewRows.length) return alert("目前沒有可同步的資料。");
    if (!window.confirm("是否要將目前資料同步到雲端？")) return;

    try {
      setSyncStatus("同步雲端中...");
      const snap = await db.collection("weekly_call_project_reports").get();
      let cloudRows = [];

      // v4 修正：重複比對只看「目前有效、未刪除」的雲端資料。
      // Firestore 的刪除是軟刪除 deleted=true；如果把已刪除資料也拿來比對，
      // 會出現「畫面沒有資料，但同步時卻判斷 1815 筆都重複」的狀況。
      const activeDocs = snap.docs
        .map((doc) => ({ id: doc.id, ...doc.data() }))
        .filter((item) => !item.deleted);

      for (const item of activeDocs) {
        const rows = await fetchRowsFromReportDoc(item);
        cloudRows = cloudRows.concat(rows);
      }

      cloudRows = dedupeRows(cloudRows);
      const cloudKeys = new Set(cloudRows.map(makeRowUniqueKey));
      const previewUnique = dedupeRows(previewRows);

      let duplicateWithCloud = 0;
      const newRows = [];

      previewUnique.forEach((row) => {
        const key = makeRowUniqueKey(row);
        if (cloudKeys.has(key)) duplicateWithCloud += 1;
        else newRows.push(row);
      });

      // v3 修正：全部都是重複資料時，不再建立「validCount 有值但 rows 為空」的雲端紀錄。
      // 這種空紀錄會造成登入後自動載入最新資料時，畫面顯示檔名正確但共 0 筆。
      if (newRows.length === 0) {
        await loadCloudBundle({ autoPreview: true });
        setUploadMessage(`資料已存在目前有效的雲端資料中，本次沒有新增，也不建立空白雲端紀錄。重複 ${duplicateWithCloud} 筆。`);
        alert(`資料已存在目前有效的雲端資料中，本次沒有新增，也不建立空白雲端紀錄。重複 ${duplicateWithCloud} 筆。

如果查詢畫面仍看不到資料，請到「雲端已存資料」按重新整理，並確認該筆不是已刪除或只有索引的紀錄。`);
        return;
      }

      const docId = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      const weekKeys = Array.from(new Set(previewUnique.map((r) => r.weekKey).filter(Boolean))).sort();
      const monthKeys = Array.from(new Set(previewUnique.map((r) => r.monthKey).filter(Boolean))).sort();
      const yearKeys = Array.from(new Set(previewUnique.map((r) => r.yearKey).filter(Boolean))).sort();

      const rowChunks = chunkArray(newRows, 300);
      const reportRef = db.collection("weekly_call_project_reports").doc(docId);

      await reportRef.set({
        fileName: csvFileName || "未命名檔案",
        validCount: previewUnique.length,
        insertedCount: newRows.length,
        duplicateCountWithCloud: duplicateWithCloud,
        agentCount: Array.from(new Set(previewUnique.map((r) => r.agent).filter(Boolean))).length,
        weekKeys,
        monthKeys,
        yearKeys,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        createdAtMillis: Date.now(),
        createdBy: activeUser.email,
        rowStorage: rowChunks.length > 1 ? "chunks" : "inline",
        rowChunkCount: rowChunks.length,
        rows: rowChunks.length <= 1 ? newRows : []
      });

      if (rowChunks.length > 1) {
        for (let i = 0; i < rowChunks.length; i++) {
          await reportRef.collection("rows_chunks").doc(`chunk_${String(i + 1).padStart(4, "0")}`).set({
            chunkIndex: i + 1,
            rows: rowChunks[i]
          });
        }
      }

      await loadCloudBundle({ autoPreview: true });
      alert(`同步完成。實際新增 ${newRows.length} 筆，略過重複 ${duplicateWithCloud} 筆。`);
    } catch (e) {
      console.error(e);
      setSyncStatus("同步雲端失敗");
      alert(`同步雲端失敗：${e.message || e}`);
    }
  };

  const loadSelectedCloudReports = async (mergeMode = false) => {
    if (!selectedCloudItems.length) return alert("請先勾選雲端資料。");

    try {
      let rows = [];
      let firstDocData = null;

      for (const id of selectedCloudItems) {
        const doc = await db.collection("weekly_call_project_reports").doc(id).get();
        if (!doc.exists) continue;
        const data = { id: doc.id, ...doc.data() };
        if (!firstDocData) firstDocData = data;
        rows = rows.concat(await fetchRowsFromReportDoc(data));
      }

      if (!rows.length) {
        alert("你勾選的雲端資料只有索引，沒有實際明細 rows，所以載入後會是 0 筆。請刪除此筆空紀錄，重新上傳 CSV 並同步。");
      }

      rows = dedupeRows(
        rows.map((r) => {
          const n = normalizeStoredRow(r);
          const si = getShiftInfoByMonth(n.agent, n.monthKey, n.shift);
          return { ...n, shift: si.shift, shiftSource: si.source };
        })
      )
        .filter((r) => isAgentEffectiveForRow(r.agent, r, effectiveRules))
        .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));

      const finalRows = mergeMode ? dedupeRows([...previewRows, ...rows]).sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`)) : rows;
      setPreviewRows(finalRows);
      if (!mergeMode && firstDocData?.fileName) setCsvFileName(firstDocData.fileName);

      setPreviewMeta({
        mode: mergeMode ? "merge-selected-with-preview" : "selected-cloud",
        title: mergeMode ? "多筆雲端資料已累積到目前預覽" : "已載入選取的雲端資料",
        weekKeys: Array.from(new Set(finalRows.map((r) => r.weekKey).filter(Boolean))).sort(),
        monthKeys: Array.from(new Set(finalRows.map((r) => r.monthKey).filter(Boolean))).sort(),
        yearKeys: Array.from(new Set(finalRows.map((r) => r.yearKey).filter(Boolean))).sort(),
        sourceCount: selectedCloudItems.length,
        recordCountBeforeDedupe: rows.length,
        recordCountAfterDedupe: finalRows.length
      });

      setUploadMessage(mergeMode ? "已載入並累積選取的雲端資料。" : "已載入選取的雲端資料。");
      setActiveTab("weekly");
    } catch (e) {
      console.error(e);
      alert(`載入雲端資料失敗：${e.message || e}`);
    }
  };

  const deleteSelectedCloudReports = async () => {

        batch.set(ref, {

          deletedAtMillis: Date.now(),

        }, { merge: true });

      await batch.commit();

  const buildSatisfactionAnalysisRows = (rows = []) => {
    const map = new Map();

    rows.forEach((r) => {
      if (!r.agent) return;
      if (!map.has(r.agent)) {
        map.set(r.agent, {
          "客服名稱": r.agent,
          "班別": r.shift || "",
          "總通話數": 0,
          "Q1非常滿意": 0,
          "Q1尚可": 0,
          "Q1非常不滿意": 0,
          "Q2非常滿意": 0,
          "Q2尚可": 0,
          "Q2非常不滿意": 0
        });
      }

      const t = map.get(r.agent);
      t["班別"] = t["班別"] || r.shift || "";
      t["總通話數"] += 1;

      if (r.q1 === "非常滿意") t["Q1非常滿意"] += 1;
      if (r.q1 === "尚可") t["Q1尚可"] += 1;
      if (r.q1 === "非常不滿意") t["Q1非常不滿意"] += 1;
      if (r.q2 === "非常滿意") t["Q2非常滿意"] += 1;
      if (r.q2 === "尚可") t["Q2尚可"] += 1;
      if (r.q2 === "非常不滿意") t["Q2非常不滿意"] += 1;
    });

    return Array.from(map.values())
      .sort((a, b) => a["客服名稱"].localeCompare(b["客服名稱"], "zh-Hant"))
      .map((r) => {
        const q1Answered = r["Q1非常滿意"] + r["Q1尚可"] + r["Q1非常不滿意"];
        const q2Answered = r["Q2非常滿意"] + r["Q2尚可"] + r["Q2非常不滿意"];
        const q1VerySatRate = q1Answered ? r["Q1非常滿意"] / q1Answered : 0;
        const q2VerySatRate = q2Answered ? r["Q2非常滿意"] / q2Answered : 0;
        const q1Sur = r["總通話數"] ? q1Answered / r["總通話數"] : 0;
        const q2Sur = r["總通話數"] ? q2Answered / r["總通話數"] : 0;

        return {
          ...r,
          "人員非常滿意度(Q1)": q1VerySatRate,
          "人員調查率(Q1)": q1Sur,
          "問題非常滿意度(Q2)": q2VerySatRate,
          "問題調查率(Q2)": q2Sur,
          "整體非常滿意度平均": (q1VerySatRate + q2VerySatRate) / 2,
          "整體調查率平均": (q1Sur + q2Sur) / 2
        };
      });
  };

  const allYears = useMemo(() => Object.keys(cloudMasterStore.years || {}).sort(), [cloudMasterStore]);
  const allMonths = useMemo(() => Object.keys(cloudMasterStore.months || {}).sort(), [cloudMasterStore]);
  const allWeeks = useMemo(() => Object.keys(cloudMasterStore.weeks || {}).sort(), [cloudMasterStore]);

  useEffect(() => {
    if (allYears.length && selectedYears.length === 0) setSelectedYears([...allYears]);
  }, [allYears]);

  useEffect(() => {
    const months = allMonths.filter((m) => selectedYears.length === 0 || selectedYears.includes(m.slice(0, 4)));
    if (months.length && selectedMonths.length === 0) setSelectedMonths([...months]);
  }, [allMonths, selectedYears]);

  useEffect(() => {
    const weeks = allWeeks.filter((w) => {
      const item = cloudMasterStore.weeks?.[w];
      return item && (selectedYears.length ? selectedYears.includes(item.year) : true) && (selectedMonths.length ? selectedMonths.includes(item.month) : true);
    });
    if (weeks.length && selectedWeeks.length === 0) setSelectedWeeks([...weeks]);
  }, [allWeeks, selectedYears, selectedMonths]);

  useEffect(() => {
    if (!detailKey) {
      if (detailMode === "weeks" && allWeeks.length) setDetailKey(allWeeks[allWeeks.length - 1]);
      if (detailMode === "months" && allMonths.length) setDetailKey(allMonths[allMonths.length - 1]);
      if (detailMode === "years" && allYears.length) setDetailKey(allYears[allYears.length - 1]);
    }
  }, [detailMode, detailKey, allWeeks, allMonths, allYears]);

  // 修正：切到長期歷史總覽／趨勢分析／通話明細、通話時間、滿意度分析查詢時，若雲端主資料尚未進入記憶體，
  // 會自動重新抓雲端資料，不再只看目前上傳預覽檔。
  useEffect(() => {
    if (!firebaseReady || !user || !db) return;
    if (!["history", "trend", "detail"].includes(activeTab)) return;
    if ((cloudMasterStore.rows || []).length > 0 || cloudIndex.length > 0) return;
    loadCloudBundle({ autoPreview: false });
  }, [activeTab, user]);

  // v5 修正：長期歷史總覽／趨勢分析必須完全依目前勾選條件即時計算。
  // 舊版在「月／年」模式會直接使用預先算好的整月／整年資料，導致即使只勾選 1 週或 2 週，
  // 下方月表／趨勢仍顯示整月總數，看起來條件有變但數據不變。
  // 這裡改成：先依 年／月／週 三層勾選條件篩出 rows，再依目前 viewType 重新分組彙總。
  const periodList = useMemo(() => {
    const sourceRows = cloudMasterStore.rows || [];
    if (!sourceRows.length) return [];
    if (!selectedYears.length || !selectedMonths.length || !selectedWeeks.length) return [];

    const filteredRows = sourceRows.filter((row) => {
      return selectedYears.includes(row.yearKey)
        && selectedMonths.includes(row.monthKey)
        && selectedWeeks.includes(row.weekKey);
    });

    const groups = {};

    filteredRows.forEach((row) => {
      let key = row.weekKey;
      if (viewType === "months") key = row.monthKey;
      if (viewType === "years") key = row.yearKey;
      if (!key) return;
      if (!groups[key]) groups[key] = [];
      groups[key].push(row);
    });

    return Object.keys(groups)
      .sort()
      .map((key) => {
        const rows = groups[key];
        const first = rows[0] || {};

        if (viewType === "weeks") {
          return buildPeriodSummary(
            rows,
            key,
            first.weekLabel || "",
            { year: first.yearKey, month: first.monthKey, weekStart: first.weekStart, weekEnd: first.weekEnd },
            shiftRules,
            effectiveRules,
            "weeks"
          );
        }

        if (viewType === "months") {
          return buildPeriodSummary(
            rows,
            key,
            key,
            { year: first.yearKey, month: key },
            shiftRules,
            effectiveRules,
            "months"
          );
        }

        return buildPeriodSummary(
          rows,
          key,
          key,
          { year: key },
          shiftRules,
          effectiveRules,
          "years"
        );
      });
  }, [cloudMasterStore.rows, viewType, selectedYears, selectedMonths, selectedWeeks, buildPeriodSummary, shiftRules, effectiveRules]);

  const availableAgents = useMemo(() => {
    const set = new Set();

    if (includeHistoryAgents) {
      (cloudMasterStore.rows || []).forEach((r) => { if (r.agent) set.add(r.agent); });
      Object.keys(effectiveRules || {}).forEach((name) => set.add(name));
    } else {
      const latestPeriod = viewType === "years" ? allYears[allYears.length - 1] : viewType === "months" ? allMonths[allMonths.length - 1] : allWeeks[allWeeks.length - 1];
      (cloudMasterStore.rows || []).forEach((r) => {
        if (r.agent && isAgentEffectiveForPeriod(r.agent, latestPeriod || r.weekKey || r.monthKey || r.yearKey, viewType, effectiveRules)) set.add(r.agent);
      });
    }

    getAllAgentsFromRules().forEach((name) => set.add(name));
    return Array.from(set).sort((a, b) => a.localeCompare(b, "zh-Hant"));
  }, [cloudMasterStore, getAllAgentsFromRules, includeHistoryAgents, effectiveRules, viewType, allYears, allMonths, allWeeks]);

  useEffect(() => {
    if (!selectedAgent && availableAgents.length) setSelectedAgent(availableAgents[0]);
  }, [availableAgents, selectedAgent]);

  useEffect(() => {
    if (trendCompareMode === "single" && selectedAgent) setSelectedTrendAgents([selectedAgent]);
  }, [selectedAgent, trendCompareMode]);

  const selectedMetricConfig = HISTORY_METRICS.find((m) => m.key === selectedMetric) || HISTORY_METRICS[0];

  const formatPeriodKeyForDisplay = (item) => {
    if (!item) return "";
    if (viewType === "weeks") return formatWeekKeyZh(item.periodKey);
    if (viewType === "months") return formatMonthDisplay(item.periodKey);
    return formatYearDisplay(item.periodKey);
  };

  const getMetricValue = (item, agentName) => {
    if (!item) return null;
    if (!isAgentEffectiveForPeriod(agentName, item.periodKey, viewType, effectiveRules)) return null;

    const agentData = (item.agents || []).find((a) => a.name === agentName);
    if (!agentData) return null;
    if (Number(agentData.totalCalls || 0) <= 0) return null;

    if (selectedMetricConfig.source === "lines") {
      const value = agentData.lines?.[selectedMetricConfig.key];
      return value == null ? null : value;
    }

    const value = agentData[selectedMetricConfig.key];
    return value == null ? null : value;
  };

  const getComparableValue = (value) => {
    if (value == null) return null;
    return selectedMetricConfig.format === "hours" ? Number(value) / 3600 : Number(value);
  };

  const formatMetricValue = (value) => {
    if (value == null) return "-";
    if (selectedMetricConfig.format === "percent") return `${Number(value).toFixed(2)}%`;
    if (selectedMetricConfig.format === "hours") return `${(Number(value) / 3600).toFixed(2)} 小時`;
    return Number(value).toFixed(0);
  };

  const trendAgents = useMemo(() => {
    if (trendCompareMode === "multi") return selectedTrendAgents.filter(Boolean);
    return selectedAgent ? [selectedAgent] : [];
  }, [trendCompareMode, selectedTrendAgents, selectedAgent]);

  const trendData = useMemo(() => {
    const datasets = trendAgents.map((agent, idx) => ({
      label: `${agent}｜${selectedMetricConfig.label}`,
      data: periodList.map((p) => getComparableValue(getMetricValue(p, agent))),
      borderColor: TREND_COLORS[idx % TREND_COLORS.length].border,
      backgroundColor: TREND_COLORS[idx % TREND_COLORS.length].bg,
      tension: 0.25
    })).filter((ds) => ds.data.some((v) => v != null && !Number.isNaN(v)));

    return {
      labels: periodList.map((p) => formatPeriodKeyForDisplay(p)),
      datasets
    };
  }, [trendAgents, periodList, selectedMetric, viewType, effectiveRules]);

  const summaryRows = useMemo(() => {
    const agents = trendCompareMode === "multi" ? selectedTrendAgents.filter(Boolean) : availableAgents;

    return agents.map((name) => {
      const row = { name, shift: "" };
      periodList.forEach((p) => {
        row[p.periodKey] = getMetricValue(p, name);
        const agentData = (p.agents || []).find((a) => a.name === name);
        if (!row.shift && agentData && Number(agentData.totalCalls || 0) > 0) row.shift = agentData.shift || "";
      });
      return row;
    });
  }, [availableAgents, periodList, selectedMetric, trendCompareMode, selectedTrendAgents, viewType, effectiveRules]);

  const detailRows = useMemo(() => {
    let rows = [];
    if (detailMode === "weeks") rows = cloudMasterStore.detailByWeek?.[detailKey]?.rows || [];
    else if (detailMode === "months") {
      const expected = getMonthExpectedRange(detailKey);
      rows = (cloudMasterStore.rows || []).filter((r) => r.date >= expected.start && r.date <= expected.end);
    }
    else rows = (cloudMasterStore.rows || []).filter((r) => r.yearKey === detailKey);
    return rows.slice().sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
  }, [cloudMasterStore, detailMode, detailKey]);

  const previewSummary = useMemo(() => summarizePreviewRows(previewRows), [previewRows]);
  const previewAnalysisRows = useMemo(() => buildSatisfactionAnalysisRows(previewRows), [previewRows]);
  const previewPaging = useMemo(() => paginateRows(previewRows, previewPage, previewPageSize), [previewRows, previewPage, previewPageSize]);
  const detailPaging = useMemo(() => paginateRows(detailRows, detailPage, detailPageSize), [detailRows, detailPage, detailPageSize]);

  useEffect(() => setPreviewPage(1), [previewRows]);
  useEffect(() => setDetailPage(1), [detailRows]);

  const exportRowsBundleToExcel = async (rows, filenamePrefix = "資料匯出") => {
    if (!rows.length) return alert("目前沒有資料可以匯出。");
    if (!window.ExcelJS) return alert("Excel 匯出模組尚未載入完成。");

    try {
      const workbook = new window.ExcelJS.Workbook();

      const lightBlueFill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFE0F2FE" } };
      const headerFill = { type: "pattern", pattern: "solid", fgColor: { argb: "FF0F172A" } };
      const headerFont = { color: { argb: "FFFFFFFF" }, bold: true };

      const createSheet = (sheetName, headers, dataRows, percentColumns = []) => {
        const sheet = workbook.addWorksheet(sheetName);
        sheet.addRow(headers);

        sheet.getRow(1).eachCell((cell) => {
          cell.fill = headerFill;
          cell.font = headerFont;
          cell.alignment = { horizontal: "center", vertical: "middle" };
        });

        dataRows.forEach((rowData, index) => {
          const row = sheet.addRow(rowData);
          if (index % 2 === 1) row.eachCell((cell) => { cell.fill = lightBlueFill; });
          row.eachCell((cell, colNumber) => {
            cell.alignment = { horizontal: "center", vertical: "middle" };
            if (percentColumns.includes(colNumber)) cell.numFmt = "0.00%";
          });
        });

        sheet.columns.forEach((column) => { column.width = 18; });
        return sheet;
      };

      createSheet(
        "客服通話明細表",
        ["客服名稱", "班別", "日期", "時間", "遊戲專線", "滿意度問題1", "滿意度問題2", "對話ID"],
        rows.map((r) => [r.agent, r.shift || "", formatCustomDate(r.date), r.time, r.line, r.q1, r.q2, r.id])
      );

      createSheet(
        "總處理時間",
        SUMMARY_HEADERS,
        buildSummaryRowsFromSource(rows, "handle").map((r) => SUMMARY_HEADERS.map((h) => ["客服名稱", "班別"].includes(h) ? (r[h] || "") : Number(formatToHours(r[h]))))
      );

      createSheet(
        "總發話時間",
        SUMMARY_HEADERS,
        buildSummaryRowsFromSource(rows, "speak").map((r) => SUMMARY_HEADERS.map((h) => ["客服名稱", "班別"].includes(h) ? (r[h] || "") : Number(formatToHours(r[h]))))
      );

      const analysisHeaders = ["客服名稱", "班別", "總通話數", "人員非常滿意度(Q1)", "人員調查率(Q1)", "問題非常滿意度(Q2)", "問題調查率(Q2)", "整體非常滿意度平均", "整體調查率平均"];

      createSheet(
        "滿意度分析",
        analysisHeaders,
        buildSatisfactionAnalysisRows(rows).map((r) => [
          r["客服名稱"],
          r["班別"],
          r["總通話數"],
          r["人員非常滿意度(Q1)"],
          r["人員調查率(Q1)"],
          r["問題非常滿意度(Q2)"],
          r["問題調查率(Q2)"],
          r["整體非常滿意度平均"],
          r["整體調查率平均"]
        ]),
        [4, 5, 6, 7, 8, 9]
      );

      const buffer = await workbook.xlsx.writeBuffer();
      const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const today = new Date().toISOString().slice(0, 10).replace(/-/g, "");
      a.download = `${filenamePrefix}_${today}.xlsx`;
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      console.error("Excel 匯出失敗:", err);
      alert("匯出 Excel 時發生錯誤。");
    }
  };

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoginError("");

    const lockState = getLoginLockState();
    if (lockState.lockedUntil && Date.now() < lockState.lockedUntil) {
      const msg = formatLockoutText(lockState.lockedUntil);
      setLoginLockText(msg);
      setLoginError(msg);
      return;
    }

    if (!firebaseReady || !auth) {
      setLoginError("Firebase 尚未初始化");
      return;
    }

    try {
      setSyncStatus("登入中...");
      const cred = await auth.signInWithEmailAndPassword(email, password);
      clearLoginFailures();
      setLoginLockText("");
      setUser(cred.user);
      setSyncStatus(`登入成功，雲端資料讀取中... ${cred.user?.email || ""}`);
      // 保險機制：部分瀏覽器 onAuthStateChanged 觸發較慢時，登入成功後仍會主動抓一次雲端資料。
      window.setTimeout(() => {
        const current = auth.currentUser || cred.user;
        if (current) loadCloudBundle({ autoPreview: true, userOverride: current });
      }, 0);
    } catch (error) {
      const next = recordLoginFailure();
      const remain = Math.max(0, SECURITY_CONFIG.maxLoginFailures - Number(next.failures || 0));
      const lockMsg = formatLockoutText(next.lockedUntil);
      setLoginLockText(lockMsg);
      setLoginError(lockMsg || `登入失敗，請檢查帳號密碼。剩餘可嘗試 ${remain} 次。`);
      console.error(error);
    }
  };

  const handleLogout = async () => {
    if (firebaseReady && auth) {
      try {
        await auth.signOut();
      } catch (error) {
        console.error("登出失敗", error);
      }
    }
  };

    const normalized = normalizeMonthKey(shiftMonthInput);
    if (!normalized) return alert("請輸入正確格式，例如 2026-04");

    const next = { ...shiftRules, [normalized]: shiftRules[normalized] || { "早班": [], "中班": [], "晚班": [] } };
    await saveShiftRules(next);
    setShiftEditorMonth(normalized);
    setShiftMonthInput("");
  };

  const saveCurrentShiftMonth = async () => {
    const target = shiftEditorMonth || "default";
    const next = {
      ...shiftRules,
      [target]: {
        "早班": parseNameList(shiftDraft["早班"]),
        "中班": parseNameList(shiftDraft["中班"]),
        "晚班": parseNameList(shiftDraft["晚班"])
      }
    };
    await saveShiftRules(next);
    alert("班表已儲存");
  };

  const deleteShiftMonth = async (monthKey) => {
    if (monthKey === "default") return alert("default 不可刪除");
    if (!window.confirm(`確定刪除 ${monthKey} 的班表設定嗎？`)) return;
    const next = { ...shiftRules };
    delete next[monthKey];
    await saveShiftRules(next);
    setShiftEditorMonth("default");
  };

  const addEffectiveRule = async () => {
    const name = effectiveDraft.name.trim();
    if (!name) return alert("請輸入客服名稱");

    const next = {
      ...effectiveRules,
      [name]: {
        start: effectiveDraft.start.trim(),
        end: effectiveDraft.end.trim(),
        note: effectiveDraft.note.trim()
      }
    };

    await saveEffectiveRules(next);
    setEffectiveDraft({ name: "", start: "", end: "", note: "" });
    alert("人員有效期間已儲存");
  };

  const editEffectiveRule = (name, rule) => {
    setEffectiveDraft({
      name,
      start: rule.start || "",
      end: rule.end || "",
      note: rule.note || ""
    });
  };

  const deleteEffectiveRule = async (name) => {
    if (!window.confirm(`確定刪除「${name}」的人員有效期間設定嗎？`)) return;
    const next = { ...effectiveRules };
    delete next[name];
    await saveEffectiveRules(next);
  };

  const shiftMonthKeys = useMemo(() => ["default", ...Object.keys(shiftRules).filter((k) => k !== "default").sort()], [shiftRules]);

  if (!authReady) {
    return <div className="min-h-screen flex items-center justify-center"><div className="bg-white px-10 py-8 rounded-3xl shadow">載入中...</div></div>;
  }

  if (firebaseReady && !user) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
        <form onSubmit={handleLogin} className="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-slate-200">
          <h2 className="text-3xl font-black mb-2 text-center text-slate-800">客服電話數據登入</h2>
          <p className="text-slate-400 text-sm font-bold text-center mb-6">登入後會自動抓取雲端資料</p>

          {loginError && <div className="text-red-500 text-sm mb-4 text-center font-bold">{loginError}</div>}
          {loginLockText && !loginError && <div className="text-amber-600 bg-amber-50 border border-amber-200 rounded-xl text-sm mb-4 p-3 text-center font-bold">{loginLockText}</div>}

          <input type="email" placeholder="信箱" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full mb-4 p-3 rounded-xl border border-slate-300" />
          <input type="password" placeholder="密碼" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full mb-6 p-3 rounded-xl border border-slate-300" />
          <button type="submit" disabled={!!loginLockText} className={`w-full text-white font-bold p-3 rounded-xl ${loginLockText ? "bg-slate-400 cursor-not-allowed" : "bg-blue-600 hover:bg-blue-700"}`}>登入</button>
        </form>
      </div>
    );
  }

  const tabs = [
    { id: "weekly", name: " 預覽查詢上傳資料與通話時間", icon: "list" },
    { id: "upload", name: "資料上傳", icon: "upload" },
    { id: "cloud", name: "雲端已存資料", icon: "db" },
    { id: "history", name: "長期歷史總覽", icon: "db" },
    { id: "trend", name: "趨勢分析", icon: "chart" },
    { id: "detail", name: "通話明細、通話時間、滿意度分析查詢", icon: "list" },
    { id: "shift", name: "班表與有效期間", icon: "users" }
  ];

  return (
    <div className="min-h-screen p-4 md:p-8 bg-slate-100">
      <div className="max-w-[2200px] mx-auto space-y-6">
        <header className="flex justify-between items-center gap-4 flex-wrap">
          <div>
            <h1 className="text-3xl font-black text-slate-800 flex items-center gap-2"><Icon name="cloud" size={30} className="text-blue-600" />客服電話紀錄長期觀察系統</h1>
            <p className="text-sm text-slate-400 font-bold mt-1">沒有資料不補 0；超過人員有效期間不補班別、不進排行榜、不畫趨勢線。</p>
          </div>

          <div className="flex gap-3 flex-wrap items-center justify-end">
