                actions={[
                  <button key="load"   onClick={()=>loadSelectedCloudReports(false)} style={CRM.btnPrimary}>載入勾選</button>,
                  <button key="merge"  onClick={()=>loadSelectedCloudReports(true)}  style={{ ...CRM.btnGhost, background:"#f0fdf4", color:"#15803d", border:"0.5px solid #bbf7d0" }}>累積到預覽</button>,
                  <button key="reload" onClick={()=>loadCloudBundle({autoPreview:false})} style={CRM.btnGhost}>重新整理</button>,
                ]}
              />
              <div style={{ ...CRM.cardLg, overflow:"hidden" }}>
                <div style={{ overflowX:"auto" }}>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:"13px" }}>
                    <thead>
                      <tr>
                        {["","檔名","有效筆數","客服人數","週次","月份","建立人","重複","實際新增"].map((h,i)=>(
                          <th key={i} style={{ ...CRM.th, textAlign:i<=1?"left":"center" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {cloudIndex.length===0 ? (
                        <tr><td colSpan="9" style={{ ...CRM.td, padding:"40px", color:"#94a3b8", textAlign:"center" }}>目前沒有雲端資料</td></tr>
                      ) : cloudIndex.map((item,i)=>(
                        <tr key={item.id} style={{ background:i%2===0?"#fff":"#f9fafb" }}
                          onMouseEnter={e=>e.currentTarget.style.background="#f0f9ff"}
                          onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"#fff":"#f9fafb"}>
                          <td style={{ ...CRM.td, padding:"9px 14px", width:"40px" }}>
                            <input type="checkbox" checked={selectedCloudItems.includes(item.id)} style={{ accentColor:"#2563eb", cursor:"pointer" }}
                              onChange={()=>setSelectedCloudItems(prev=>prev.includes(item.id)?prev.filter(x=>x!==item.id):[...prev,item.id])} />
                          </td>
                          <td style={{ ...CRM.td, textAlign:"left", fontWeight:"500", color:"#1e293b" }}>{item.fileName||"—"}</td>
                          <td style={CRM.td}>{item.validCount||0}</td>
                          <td style={CRM.td}>{item.agentCount||0}</td>
                          <td style={{ ...CRM.td, fontSize:"11px", maxWidth:"200px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{(item.weekKeys||[]).map(formatWeekKeyZh).join("、")||"—"}</td>
                          <td style={CRM.td}>{(item.monthKeys||[]).join("、")||"—"}</td>
                          <td style={{ ...CRM.td, fontSize:"11px", color:"#64748b" }}>{item.createdBy||"—"}</td>
                          <td style={CRM.td}><span style={CRM.badge("#fef3c7","#92400e")}>{item.duplicateCountWithCloud||0}</span></td>
                          <td style={CRM.td}><span style={CRM.badge("#f0fdf4","#15803d")}>{item.insertedCount||0}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </>
          )}

          {/* ── 歷史總覽 ── */}
          {activeTab==="history" && (
            <>
              <PageHeader title="長期歷史總覽" subtitle="依篩選條件彙總各期間整體指標" />
              <PeriodFilterPanel allYears={allYears} allMonths={allMonths} allWeeks={allWeeks} cloudMasterStore={cloudMasterStore} selectedYears={selectedYears} selectedMonths={selectedMonths} selectedWeeks={selectedWeeks} setSelectedYears={setSelectedYears} setSelectedMonths={setSelectedMonths} setSelectedWeeks={setSelectedWeeks} viewType={viewType} setViewType={setViewType} />
              <CrmHistoryTable periodList={periodList} viewType={viewType} />
            </>
          )}

          {/* ── 趨勢分析 ── */}
          {activeTab==="trend" && (
            <>
              <PageHeader title="趨勢分析" subtitle="多人指標比對、期間快速篩選、排名與明細" />
              <PeriodFilterPanel allYears={allYears} allMonths={allMonths} allWeeks={allWeeks} cloudMasterStore={cloudMasterStore} selectedYears={selectedYears} selectedMonths={selectedMonths} selectedWeeks={selectedWeeks} setSelectedYears={setSelectedYears} setSelectedMonths={setSelectedMonths} setSelectedWeeks={setSelectedWeeks} viewType={viewType} setViewType={setViewType} />
              <TrendPanel periodList={periodList} viewType={viewType} availableAgents={availableAgents} effectiveRules={effectiveRules} includeHistoryAgents={includeHistoryAgents} setIncludeHistoryAgents={setIncludeHistoryAgents} selectedTrendAgents={selectedTrendAgents} setSelectedTrendAgents={setSelectedTrendAgents} selectedMetric={selectedMetric} setSelectedMetric={setSelectedMetric} />
            </>
          )}

          {/* ── 明細查詢 ── */}
          {activeTab==="detail" && (
            <>
              <PageHeader
                title="明細查詢"
                subtitle={`共 ${detailRows.length} 筆`}
                actions={[
                  <select key="mode" value={detailMode} onChange={e=>{setDetailMode(e.target.value);setDetailKey("");}} style={CRM.select}>
                    <option value="weeks">週</option><option value="months">月</option><option value="years">年</option>
                  </select>,
                  <select key="key" value={detailKey} onChange={e=>setDetailKey(e.target.value)} style={{ ...CRM.select, minWidth:"160px" }}>
                    <option value="">請選擇期間</option>
                    {(detailMode==="weeks"?allWeeks:detailMode==="months"?allMonths:allYears).map(k=>(
                      <option key={k} value={k}>{detailMode==="weeks"?formatWeekDisplay(k,cloudMasterStore.weeks?.[k]?.periodLabel||""):detailMode==="months"?formatMonthDisplay(k):formatYearDisplay(k)}</option>
                    ))}
                  </select>,
                  <button key="export" onClick={()=>exportRowsBundleToExcel(detailRows,"明細查詢")} style={CRM.btnPrimary}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ verticalAlign:"-2px", marginRight:"5px" }}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
                    匯出 Excel
                  </button>,
                ]}
              />
              {detailMode==="months" && detailKey && (
                <div style={{ background:"#eff6ff", border:"0.5px solid #bfdbfe", borderRadius:"8px", padding:"10px 16px", fontSize:"12px", color:"#1d4ed8" }}>
                  月份查詢使用完整日期區間：{getMonthExpectedRange(detailKey).label}
                </div>
              )}
              <div style={{ ...CRM.cardLg, overflow:"hidden" }}>
                <div style={CRM.hdr}><span style={CRM.title}>通話明細</span><span style={CRM.badge("#f8fafc","#64748b")}>{detailRows.length} 筆</span></div>
                <CrmTableRows rows={detailPaging.rows} start={detailPaging.start} />
                <CrmPagination total={detailRows.length} page={detailPage} pageSize={detailPageSize} onPageChange={setDetailPage} onPageSizeChange={setDetailPageSize} />
              </div>
              <CrmSummaryTable title="電話接聽時數 — 總處理時間" rows={summarizePreviewRows(detailRows).handleRows} />
              <CrmSummaryTable title="電話接聽時數 — 總發話時間" rows={summarizePreviewRows(detailRows).speakRows} />
              <CrmAnalysisTable rows={buildSatisfactionAnalysisRows(detailRows)} />
            </>
          )}

          {/* ── 班表設定 ── */}
          {activeTab==="shift" && (
            <>
              <PageHeader title="班表與人員有效期間" subtitle="設定各月份班別名單及人員有效服務期間" />
              <div style={{ display:"grid", gridTemplateColumns:"220px 1fr", gap:"16px", alignItems:"start" }}>
                {/* 新增月份 */}
                <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
                  <div style={{ ...CRM.cardLg, overflow:"hidden" }}>
                    <div style={CRM.hdr}><span style={CRM.title}>新增月份班表</span></div>
                    <div style={{ padding:"14px 16px", display:"flex", flexDirection:"column", gap:"10px" }}>
                      <input value={shiftMonthInput} onChange={e=>setShiftMonthInput(e.target.value)} placeholder="例如 2026-04" style={CRM.input} />
                      <button onClick={addShiftMonth} style={CRM.btnPrimary}>新增月份</button>
                    </div>
                  </div>
                  <div style={{ background:"#fffbeb", border:"0.5px solid #fde68a", borderRadius:"10px", padding:"12px 14px", fontSize:"12px", color:"#92400e", lineHeight:"1.7" }}>
                    <div style={{ fontWeight:"700", marginBottom:"4px" }}>有效期間規則</div>
                    超過有效期間：不補班別、不進排行榜、不畫趨勢線。<br/>週：2025-W35，月：2025-09，年：2025
                  </div>
                </div>
                {/* 班表編輯 */}
                <div style={{ ...CRM.cardLg, overflow:"hidden" }}>
                  <div style={CRM.hdr}>
                    <span style={CRM.title}>班表編輯</span>
                    <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
                      <select value={shiftEditorMonth} onChange={e=>setShiftEditorMonth(e.target.value)} style={CRM.select}>
                        {shiftMonthKeys.map(k=><option key={k} value={k}>{k}</option>)}
                      </select>
                      {shiftEditorMonth!=="default" && <button onClick={()=>deleteShiftMonth(shiftEditorMonth)} style={{ ...CRM.btnDanger, padding:"5px 12px", fontSize:"12px" }}>刪除</button>}
                      <button onClick={saveCurrentShiftMonth} style={{ ...CRM.btnPrimary, padding:"5px 14px", fontSize:"12px" }}>儲存</button>
                    </div>
                  </div>
                  <div style={{ padding:"16px 20px", display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"12px" }}>
                    {["早班","中班","晚班"].map(shift=>{
                      const sc = CRM.SHIFT[shift]||{bg:"#f1f5f9",tc:"#475569"};
                      return (
                        <div key={shift} style={{ background:"#f9fafb", borderRadius:"8px", padding:"12px 14px", border:"0.5px solid #e2e8f0" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"8px" }}>
                            <span style={CRM.badge(sc.bg,sc.tc)}>{shift}</span>
                          </div>
                          <textarea rows="8" value={shiftDraft[shift]} onChange={e=>setShiftDraft(prev=>({...prev,[shift]:e.target.value}))} placeholder="請輸入名單，可用 、 或換行分隔" style={{ ...CRM.input, resize:"vertical", fontSize:"12px", lineHeight:"1.7" }}></textarea>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              {/* 有效期間 */}
              <div style={{ ...CRM.cardLg, overflow:"hidden" }}>
                <div style={CRM.hdr}><span style={CRM.title}>人員有效期間</span><span style={CRM.badge("#f8fafc","#64748b")}>{Object.keys(effectiveRules).length} 人</span></div>
                <div style={{ padding:"14px 20px", display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr 100px", gap:"8px", borderBottom:"0.5px solid #f1f5f9" }}>
                  <input value={effectiveDraft.name}  onChange={e=>setEffectiveDraft(p=>({...p,name:e.target.value}))}  placeholder="客服名稱"       style={CRM.input} />
                  <input value={effectiveDraft.start} onChange={e=>setEffectiveDraft(p=>({...p,start:e.target.value}))} placeholder="起始 例 2025-W09" style={CRM.input} />
                  <input value={effectiveDraft.end}   onChange={e=>setEffectiveDraft(p=>({...p,end:e.target.value}))}   placeholder="結束 例 2025-W35" style={CRM.input} />
                  <input value={effectiveDraft.note}  onChange={e=>setEffectiveDraft(p=>({...p,note:e.target.value}))}  placeholder="備註"           style={CRM.input} />
                  <button onClick={addEffectiveRule} style={CRM.btnPrimary}>新增/更新</button>
                </div>
                <div style={{ overflowX:"auto" }}>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:"13px" }}>
                    <thead><tr>{["客服名稱","起始","結束","備註","操作"].map(h=><th key={h} style={h==="客服名稱"?{...CRM.th,textAlign:"left"}:CRM.th}>{h}</th>)}</tr></thead>
                    <tbody>
                      {Object.keys(effectiveRules).length===0 ? (
                        <tr><td colSpan="5" style={{ ...CRM.td, padding:"40px", color:"#94a3b8", textAlign:"center" }}>尚無設定</td></tr>
                      ) : Object.entries(effectiveRules).map(([name,rule],i)=>(
                        <tr key={name} style={{ background:i%2===0?"#fff":"#f9fafb" }}
                          onMouseEnter={e=>e.currentTarget.style.background="#f0f9ff"}
                          onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"#fff":"#f9fafb"}>
                          <td style={{ ...CRM.td, textAlign:"left", fontWeight:"500", color:"#1e293b" }}>{name}</td>
                          <td style={CRM.td}><span style={CRM.badge("#f0f9ff","#0284c7")}>{rule.start||"—"}</span></td>
                          <td style={CRM.td}><span style={CRM.badge("#fef3c7","#92400e")}>{rule.end||"—"}</span></td>
                          <td style={{ ...CRM.td, fontSize:"12px", color:"#64748b" }}>{rule.note||"—"}</td>
                          <td style={CRM.td}>
                            <div style={{ display:"flex", gap:"6px", justifyContent:"center" }}>
                              <button onClick={()=>editEffectiveRule(name,rule)} style={{ ...CRM.btnGhost, padding:"4px 12px", fontSize:"12px" }}>編輯</button>
                              <button onClick={()=>deleteEffectiveRule(name)} style={{ ...CRM.btnDanger, padding:"4px 12px", fontSize:"12px" }}>刪除</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
