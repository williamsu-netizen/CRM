            <button title="重新從雲端抓資料" onClick={() => loadCloudBundle({ autoPreview: true })} className="w-11 h-11 rounded-2xl bg-indigo-600 text-white hover:bg-indigo-700 flex items-center justify-center shadow-sm"><Icon name="refresh" size={18} /></button>
            <button title="同步雲端" onClick={saveCurrentUploadToCloud} className="w-11 h-11 rounded-2xl bg-emerald-600 text-white hover:bg-emerald-700 flex items-center justify-center shadow-sm"><Icon name="upload" size={18} /></button>
            <button title="刪除雲端資料" onClick={deleteSelectedCloudReports} className="w-11 h-11 rounded-2xl bg-rose-500 text-white hover:bg-rose-600 flex items-center justify-center shadow-sm"><Icon name="trash" size={18} /></button>
            <button onClick={handleLogout} className="bg-slate-500 text-white px-5 py-2.5 rounded-2xl font-bold hover:bg-slate-600">登出</button>
          </div>
        </header>

        {uploadMessage && <div className="bg-emerald-50 border border-emerald-200 text-emerald-700 px-5 py-4 rounded-2xl font-bold">{uploadMessage}</div>}

        <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
          <div className="bg-white rounded-3xl border p-5 shadow-sm"><div className="text-sm text-slate-400 font-black mb-2">雲端資料筆數</div><div className="text-3xl font-black text-slate-800">{cloudIndex.length}</div></div>
          <div className="bg-white rounded-3xl border p-5 shadow-sm"><div className="text-sm text-slate-400 font-black mb-2">累積年份</div><div className="text-3xl font-black text-slate-800">{allYears.length}</div></div>
          <div className="bg-white rounded-3xl border p-5 shadow-sm"><div className="text-sm text-slate-400 font-black mb-2">累積月份</div><div className="text-3xl font-black text-slate-800">{allMonths.length}</div></div>
          <div className="bg-white rounded-3xl border p-5 shadow-sm"><div className="text-sm text-slate-400 font-black mb-2">累積週數</div><div className="text-3xl font-black text-slate-800">{allWeeks.length}</div></div>
          <div className="bg-white rounded-3xl border p-5 shadow-sm"><div className="text-sm text-slate-400 font-black mb-2">目前預覽</div><div className="text-3xl font-black text-slate-800">{previewRows.length}</div></div>
        </div>

        <div className="bg-white p-2 rounded-[28px] shadow-sm border border-slate-200">
          <div className="flex gap-2 overflow-x-auto">
            {tabs.map((t) => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} className={`px-5 py-3 rounded-2xl font-black flex items-center gap-2 whitespace-nowrap ${activeTab === t.id ? "bg-blue-600 text-white" : "text-slate-400 hover:bg-slate-50"}`}>
                <Icon name={t.icon} size={16} />{t.name}
              </button>
            ))}
          </div>
        </div>

        {activeTab === "upload" && (
          <section className="bg-white rounded-[40px] shadow-sm border p-8 space-y-6">
            <h3 className="text-xl font-black text-slate-800 underline decoration-blue-500 decoration-4 underline-offset-8">資料上傳</h3>
            <div className="bg-slate-50 rounded-3xl border p-5 grid grid-cols-1 lg:grid-cols-3 gap-4 items-end">
              <div>
                <div className="text-sm text-slate-400 font-black mb-2">上傳判斷模式</div>
                <select value={uploadMode} onChange={(e) => setUploadMode(e.target.value)} className="w-full border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-700 bg-white">
                  <option value="auto">自動判斷</option>
                  <option value="single_week">固定單週模式</option>
                  <option value="multi_week">固定整批模式</option>
                </select>
              </div>
              <div className="lg:col-span-2 text-sm font-bold text-slate-500 leading-7">自動判斷：1週當單週，多週保留全部。<br />超過人員有效期間的資料會自動排除，不會補到後續週期。</div>
            </div>

            <div onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); }} onDragEnter={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); }} onDragLeave={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); }} onDrop={(e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); const files = e.dataTransfer.files; if (files && files.length > 0) handleDataUpload(files[0]); }} className={`border-4 border-dashed rounded-[28px] p-10 text-center transition-colors duration-200 ${isDragging ? "border-blue-500 bg-blue-50" : "border-slate-200 bg-slate-50"}`}>
              <div className="text-2xl font-black text-slate-700 mb-3">拖曳或選擇資料檔</div>
              <div className="text-sm text-slate-400 font-bold mb-6">支援格式：csv / xlsx / xls</div>
              <button onClick={() => fileInputRef.current?.click()} className="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black hover:bg-blue-700">選擇檔案</button>
              <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls" className="hidden" onChange={(e) => { const f = e.target.files?.[0]; if (f) handleDataUpload(f); e.target.value = ""; }} />
            </div>
          </section>
        )}

        {activeTab === "weekly" && (
          <section className="bg-white rounded-[40px] shadow-sm border p-8 space-y-8">
            <div className="flex flex-wrap justify-between gap-4">
              <div>
                <h3 className="text-xl font-black text-slate-800 underline decoration-blue-500 decoration-4 underline-offset-8"> 預覽查詢上傳資料與通話時間</h3>
                <p className="text-xs text-slate-400 font-bold mt-2">目前檔案：{csvFileName || "-"}，共 {previewRows.length} 筆</p>
                <p className="text-xs text-slate-500 font-bold mt-2">期間：{previewMeta.weekKeys.length ? previewMeta.weekKeys.map(formatWeekKeyZh).join("、") : "-"}</p>
              </div>
              <button onClick={() => exportRowsBundleToExcel(previewRows, " 預覽查詢上傳資料與通話時間")} className="bg-emerald-600 text-white px-5 py-2.5 rounded-2xl font-bold hover:bg-emerald-700 flex items-center gap-2"><Icon name="download" size={18} />匯出 Excel</button>
            </div>
            <DataValidationPanel report={validationReport} />
            <div>
              <div className="text-lg font-black text-slate-800 mb-4">一、通話明細</div>
              <TableRows rows={previewPaging.rows} start={previewPaging.start} />
              <PaginationControls total={previewRows.length} page={previewPage} pageSize={previewPageSize} onPageChange={setPreviewPage} onPageSizeChange={setPreviewPageSize} />
            </div>
            <SummaryTable title="二、電話接聽時數_總處理時間" rows={previewSummary.handleRows} />
            <SummaryTable title="三、電話接聽時數_總發話時間" rows={previewSummary.speakRows} />
            <AnalysisTable rows={previewAnalysisRows} />
          </section>
        )}

        {activeTab === "cloud" && (
          <section className="bg-white rounded-[40px] shadow-sm border p-8 space-y-6">
            <h3 className="text-xl font-black text-slate-800 underline decoration-blue-500 decoration-4 underline-offset-8">雲端已存資料</h3>
            <div className="flex gap-2 flex-wrap">
              <button onClick={() => loadSelectedCloudReports(false)} className="bg-blue-600 text-white px-4 py-2 rounded-2xl font-bold hover:bg-blue-700">載入勾選資料</button>
              <button onClick={() => loadSelectedCloudReports(true)} className="bg-emerald-600 text-white px-4 py-2 rounded-2xl font-bold hover:bg-emerald-700">累積到目前預覽</button>
              <button onClick={() => loadCloudBundle({ autoPreview: false })} className="bg-slate-600 text-white px-4 py-2 rounded-2xl font-bold hover:bg-slate-700">重新整理</button>
            </div>

            <div className="overflow-x-auto custom-scrollbar rounded-3xl border">
              <table className="w-full text-center text-sm whitespace-nowrap">
                <thead className="bg-slate-900 text-white font-black"><tr><th className="px-4 py-4">選取</th><th className="px-4 py-4">檔名</th><th className="px-4 py-4">有效筆數</th><th className="px-4 py-4">客服人數</th><th className="px-4 py-4">週次</th><th className="px-4 py-4">月份</th><th className="px-4 py-4">建立人</th><th className="px-4 py-4">重複</th><th className="px-4 py-4">實際新增</th></tr></thead>
                <tbody className="divide-y divide-slate-100 font-bold text-slate-700">
                  {cloudIndex.length === 0 ? (
                    <tr><td colSpan="9" className="px-6 py-12 text-slate-400">目前沒有雲端資料</td></tr>
                  ) : cloudIndex.map((item, i) => (
                    <tr key={item.id} className={`hover:bg-sky-100 ${i % 2 === 1 ? "bg-sky-50" : "bg-white"}`}>
                      <td className="px-4 py-4"><input type="checkbox" checked={selectedCloudItems.includes(item.id)} onChange={() => setSelectedCloudItems((prev) => prev.includes(item.id) ? prev.filter((x) => x !== item.id) : [...prev, item.id])} /></td>
                      <td className="px-4 py-4 text-left">{item.fileName || "-"}</td>
                      <td className="px-4 py-4">{item.validCount || 0}</td>
                      <td className="px-4 py-4">{item.agentCount || 0}</td>
                      <td className="px-4 py-4">{(item.weekKeys || []).map(formatWeekKeyZh).join("、") || "-"}</td>
                      <td className="px-4 py-4">{(item.monthKeys || []).join("、") || "-"}</td>
                      <td className="px-4 py-4">{item.createdBy || "-"}</td>
                      <td className="px-4 py-4">{item.duplicateCountWithCloud || 0}</td>
                      <td className="px-4 py-4">{item.insertedCount || 0}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </section>
        )}

        {(activeTab === "history" || activeTab === "trend") && (
          <section className="bg-white rounded-[40px] shadow-sm border p-8 space-y-6">
            <div className="flex flex-wrap justify-between gap-4">
              <h3 className="text-xl font-black text-slate-800 underline decoration-purple-500 decoration-4 underline-offset-8">{activeTab === "history" ? "長期歷史總覽" : "趨勢分析"}</h3>
              <div className="flex gap-2 flex-wrap">
                <button onClick={() => setViewType("years")} className={`px-4 py-2 rounded-2xl font-black ${viewType === "years" ? "bg-purple-600 text-white" : "bg-slate-100 text-slate-600"}`}>年</button>
                <button onClick={() => setViewType("months")} className={`px-4 py-2 rounded-2xl font-black ${viewType === "months" ? "bg-purple-600 text-white" : "bg-slate-100 text-slate-600"}`}>月</button>
                <button onClick={() => setViewType("weeks")} className={`px-4 py-2 rounded-2xl font-black ${viewType === "weeks" ? "bg-purple-600 text-white" : "bg-slate-100 text-slate-600"}`}>周</button>
              </div>
            </div>

            <TimeFilterPanel
              allYears={allYears}
              allMonths={allMonths}
              allWeeks={allWeeks}
              selectedYears={selectedYears}
              selectedMonths={selectedMonths}
              selectedWeeks={selectedWeeks}
              setSelectedYears={setSelectedYears}
              setSelectedMonths={setSelectedMonths}
              setSelectedWeeks={setSelectedWeeks}
              cloudMasterStore={cloudMasterStore}
            />

            {activeTab === "trend" && (
              <>
                <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
                  <div className="bg-slate-50 rounded-3xl p-5 border">
                    <div className="font-black text-slate-700 mb-3">歷史人員</div>
                    <label className="flex items-center gap-2 font-bold text-slate-600">
                      <input type="checkbox" checked={includeHistoryAgents} onChange={(e) => setIncludeHistoryAgents(e.target.checked)} />
                      包含已不在單位人員
                    </label>
                  </div>

                  <div className="bg-slate-50 rounded-3xl p-5 border">
                    <div className="font-black text-slate-700 mb-3">比對模式</div>
                    <button onClick={() => setTrendCompareMode("single")} className={`px-4 py-2 rounded-2xl font-black mr-2 ${trendCompareMode === "single" ? "bg-purple-600 text-white" : "bg-white text-slate-600 border"}`}>單人</button>
                    <button onClick={() => setTrendCompareMode("multi")} className={`px-4 py-2 rounded-2xl font-black ${trendCompareMode === "multi" ? "bg-purple-600 text-white" : "bg-white text-slate-600 border"}`}>多人</button>
                  </div>

                  <div className="bg-slate-50 rounded-3xl p-5 border">
                    <div className="font-black text-slate-700 mb-3">客服人員</div>
                    {trendCompareMode === "single" ? (
                      <select value={selectedAgent} onChange={(e) => setSelectedAgent(e.target.value)} className="w-full border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-600 bg-white">
                        {availableAgents.map((agent) => <option key={agent} value={agent}>{agent}</option>)}
                      </select>
                    ) : (
                      <div className="space-y-3">
                        <div className="flex items-center justify-between gap-2 flex-wrap">
                          <div className="text-xs font-black text-slate-400">已選 {selectedTrendAgents.length} / {availableAgents.length} 人</div>
                          <div className="flex gap-2">
                            <button
                              type="button"
                              onClick={() => setSelectedTrendAgents([...availableAgents])}
                              className="text-xs bg-purple-600 text-white rounded-lg px-3 py-1.5 font-black hover:bg-purple-700"
                            >
                              全選
                            </button>
                            <button
                              type="button"
                              onClick={() => setSelectedTrendAgents([])}
                              className="text-xs bg-white border border-slate-300 text-slate-600 rounded-lg px-3 py-1.5 font-black hover:bg-slate-100"
                            >
                              清空
                            </button>
                          </div>
                        </div>

                        <div className="space-y-2 max-h-36 overflow-y-auto custom-scrollbar pr-2">
                          {availableAgents.map((agent) => (
                            <label key={agent} className="flex items-center gap-2 text-sm font-bold text-slate-600">
                              <input type="checkbox" checked={selectedTrendAgents.includes(agent)} onChange={() => setSelectedTrendAgents((prev) => prev.includes(agent) ? prev.filter((x) => x !== agent) : [...prev, agent])} />
                              {agent}
                            </label>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="bg-slate-50 rounded-3xl p-5 border">
                    <div className="font-black text-slate-700 mb-3">觀察指標</div>
                    <select value={selectedMetric} onChange={(e) => setSelectedMetric(e.target.value)} className="w-full border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-600 bg-white">
                      {HISTORY_METRICS.map((metric) => <option key={metric.key} value={metric.key}>{metric.label}</option>)}
                    </select>
                  </div>
                </div>

                <div className="bg-slate-50 rounded-[28px] border p-6">
                  {trendData.datasets.length > 0 ? (
                    <HistoryChart type={trendData.labels.length <= 1 ? "bar" : "line"} labels={trendData.labels} datasets={trendData.datasets} title={selectedMetricConfig.label} />
                  ) : (
                    <div className="text-center py-16 text-slate-400 font-bold">目前沒有可顯示的趨勢資料</div>
                  )}
                </div>
              </>
            )}

            {activeTab === "history" && <HistoryTable periodList={periodList} viewType={viewType} />}

            <TrendTable rows={summaryRows} periodList={periodList} formatPeriodKeyForDisplay={formatPeriodKeyForDisplay} formatMetricValue={formatMetricValue} />
          </section>
        )}

        {activeTab === "detail" && (
          <section className="bg-white rounded-[40px] shadow-sm border p-8 space-y-6">
            <div className="flex flex-wrap justify-between gap-4">
              <h3 className="text-xl font-black text-slate-800 underline decoration-blue-500 decoration-4 underline-offset-8">通話明細、通話時間、滿意度分析查詢</h3>
              <div className="flex gap-2 flex-wrap">
                <select value={detailMode} onChange={(e) => { setDetailMode(e.target.value); setDetailKey(""); }} className="border border-slate-300 rounded-xl px-4 py-2 font-bold text-slate-600 bg-white">
                  <option value="weeks">週</option><option value="months">月</option><option value="years">年</option>
                </select>
                <select value={detailKey} onChange={(e) => setDetailKey(e.target.value)} className="border border-slate-300 rounded-xl px-4 py-2 font-bold text-slate-600 bg-white">
                  <option value="">請選擇</option>
                  {(detailMode === "weeks" ? allWeeks : detailMode === "months" ? allMonths : allYears).map((key) => (
                    <option key={key} value={key}>{detailMode === "weeks" ? formatWeekDisplay(key, cloudMasterStore.weeks?.[key]?.periodLabel || "") : detailMode === "months" ? formatMonthDisplay(key) : formatYearDisplay(key)}</option>
                  ))}
                </select>
                <button onClick={() => exportRowsBundleToExcel(detailRows, "通話明細、通話時間、滿意度分析查詢")} className="bg-emerald-600 text-white px-4 py-2 rounded-2xl font-bold hover:bg-emerald-700">匯出明細</button>
              </div>
            </div>

            <div className="text-sm font-bold text-slate-500">共 {detailRows.length} 筆</div>
            {detailMode === "months" && detailKey && (
              <div className="bg-blue-50 border border-blue-200 rounded-2xl px-5 py-4 text-sm font-bold text-blue-800">
                月份查詢已固定使用完整日期區間：{getMonthExpectedRange(detailKey).label}，不再受到週次勾選影響。
              </div>
            )}
            <TableRows rows={detailPaging.rows} start={detailPaging.start} />
            <PaginationControls total={detailRows.length} page={detailPage} pageSize={detailPageSize} onPageChange={setDetailPage} onPageSizeChange={setDetailPageSize} />

            <div className="pt-6 border-t border-slate-200 space-y-8">
              <div className="text-sm font-black text-slate-500">
                下方彙總表會依目前「通話明細、通話時間、滿意度分析查詢」選到的週／月／年即時計算，與匯出 Excel 的四張表一致。
              </div>
              <SummaryTable title="二、電話接聽時數_總處理時間" rows={summarizePreviewRows(detailRows).handleRows} />
              <SummaryTable title="三、電話接聽時數_總發話時間" rows={summarizePreviewRows(detailRows).speakRows} />
              <AnalysisTable rows={buildSatisfactionAnalysisRows(detailRows)} />
            </div>
          </section>
        )}

        {activeTab === "shift" && (
          <section className="bg-white rounded-[40px] shadow-sm border p-8 space-y-8">
            <h3 className="text-xl font-black text-slate-800 underline decoration-blue-500 decoration-4 underline-offset-8">班表與人員有效期間</h3>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="bg-slate-50 rounded-3xl border p-5 space-y-4">
                <div className="font-black text-slate-700">新增月份班表</div>
                <input value={shiftMonthInput} onChange={(e) => setShiftMonthInput(e.target.value)} placeholder="例如 2026-04" className="w-full border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-700" />
                <button onClick={addShiftMonth} className="w-full bg-blue-600 text-white px-4 py-3 rounded-2xl font-black hover:bg-blue-700">新增月份</button>
              </div>

              <div className="bg-slate-50 rounded-3xl border p-5 space-y-4 lg:col-span-2">
                <div className="flex gap-3 justify-between flex-wrap">
                  <div className="font-black text-slate-700">班表編輯</div>
                  <div className="flex gap-2 flex-wrap">
                    <select value={shiftEditorMonth} onChange={(e) => setShiftEditorMonth(e.target.value)} className="border border-slate-300 rounded-xl px-4 py-2 font-bold text-slate-700 bg-white">
                      {shiftMonthKeys.map((key) => <option key={key} value={key}>{key}</option>)}
                    </select>
                    {shiftEditorMonth !== "default" && <button onClick={() => deleteShiftMonth(shiftEditorMonth)} className="bg-rose-500 text-white px-4 py-2 rounded-xl font-black hover:bg-rose-600">刪除此月份</button>}
                    <button onClick={saveCurrentShiftMonth} className="bg-emerald-600 text-white px-4 py-2 rounded-xl font-black hover:bg-emerald-700">儲存班表</button>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  {["早班", "中班", "晚班"].map((shift) => (
                    <div key={shift} className="bg-white rounded-2xl border p-4 space-y-3">
                      <div className="font-black text-slate-700">{shift}</div>
                      <textarea rows="8" value={shiftDraft[shift]} onChange={(e) => setShiftDraft((prev) => ({ ...prev, [shift]: e.target.value }))} placeholder="請輸入名單，可用 、 或換行分隔" className="w-full border border-slate-300 rounded-xl px-3 py-3 text-sm text-slate-700"></textarea>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="bg-amber-50 border border-amber-200 rounded-3xl p-5">
              <div className="font-black text-amber-800 mb-2">有效期間規則</div>
              <div className="text-sm font-bold text-amber-700 leading-7">超過有效期間：不補班別、不進排行榜、不畫趨勢線。沒有資料代表空白，不代表 0%。<br />週格式：2025-W35；月格式：2025-09；年格式：2025。</div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
              <input value={effectiveDraft.name} onChange={(e) => setEffectiveDraft((prev) => ({ ...prev, name: e.target.value }))} placeholder="客服名稱" className="border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-700" />
              <input value={effectiveDraft.start} onChange={(e) => setEffectiveDraft((prev) => ({ ...prev, start: e.target.value }))} placeholder="起始：例 2025-W09" className="border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-700" />
              <input value={effectiveDraft.end} onChange={(e) => setEffectiveDraft((prev) => ({ ...prev, end: e.target.value }))} placeholder="結束：例 2025-W35" className="border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-700" />
              <input value={effectiveDraft.note} onChange={(e) => setEffectiveDraft((prev) => ({ ...prev, note: e.target.value }))} placeholder="備註" className="border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-700" />
              <button onClick={addEffectiveRule} className="bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700">新增/更新</button>
            </div>

            <div className="overflow-x-auto custom-scrollbar rounded-3xl border">
              <table className="w-full text-center text-sm whitespace-nowrap">
                <thead className="bg-slate-900 text-white font-black"><tr><th className="px-4 py-4">客服名稱</th><th className="px-4 py-4">起始</th><th className="px-4 py-4">結束</th><th className="px-4 py-4">備註</th><th className="px-4 py-4">操作</th></tr></thead>
                <tbody className="font-bold text-slate-700 divide-y divide-slate-100">
                  {Object.entries(effectiveRules).length === 0 ? (
                    <tr><td colSpan="5" className="px-6 py-12 text-slate-400">尚無人員有效期間設定</td></tr>
                  ) : Object.entries(effectiveRules).map(([name, rule], i) => (
                    <tr key={name} className={`hover:bg-sky-100 ${i % 2 === 1 ? "bg-sky-50" : "bg-white"}`}>
                      <td className="px-4 py-4">{name}</td><td className="px-4 py-4">{rule.start || "-"}</td><td className="px-4 py-4">{rule.end || "-"}</td><td className="px-4 py-4">{rule.note || "-"}</td>
                      <td className="px-4 py-4"><div className="flex gap-2 justify-center"><button onClick={() => editEffectiveRule(name, rule)} className="bg-slate-600 text-white px-3 py-1 rounded-xl hover:bg-slate-700">編輯</button><button onClick={() => deleteEffectiveRule(name)} className="bg-rose-500 text-white px-3 py-1 rounded-xl hover:bg-rose-600">刪除</button></div></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </section>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
