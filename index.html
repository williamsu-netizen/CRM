const METRIC_IS_PCT = { overallVerySatAvg:true, overallSurAvg:true, q1VerySatRate:true, q1SurRate:true, q2VerySatRate:true, q2SurRate:true, totalCalls:false, "GT專線":false, "儲值專線":false, "GT+儲値専線":false, "滿貫專線":false, "金好運專線":false };

const formatPercent = (n) => `${Number(n || 0).toFixed(2)}%`;
const formatToHours = (seconds) => (Number(seconds || 0) / 3600).toFixed(2);
const normalizeMonthKey = (value) => { if (!value) return ""; const m = String(value).trim().match(/^(\d{4})[-\/](\d{1,2})$/); if (!m) return ""; return `${m[1]}-${String(m[2]).padStart(2, "0")}`; };
const parseNameList = (text) => String(text || "").split(/[、,，\n]/).map((s) => s.trim()).filter(Boolean);
const stringifyNameList = (arr) => (arr || []).join("、");
const formatDateKey = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
const formatCustomDate = (dateStr) => { if (!dateStr) return ""; const parts = String(dateStr).split(/[-/]/); if (parts.length >= 3) return `${parts[0]}/${parseInt(parts[1], 10)}/${parseInt(parts[2], 10)}`; return dateStr; };
const formatWeekKeyZh = (weekKey) => { const m = String(weekKey || "").match(/^(\d{4})-W(\d{2})$/); if (!m) return weekKey || ""; return `${m[1]}年第${parseInt(m[2], 10)}週`; };
const formatWeekDisplay = (weekKey, weekLabel = "") => { const zh = formatWeekKeyZh(weekKey); if (!weekLabel) return zh; return `${zh}（${String(weekLabel).replace(/\s*~\s*/g, "～")}）`; };
const formatMonthDisplay = (monthKey = "") => { const m = String(monthKey || "").match(/^(\d{4})-(\d{2})$/); if (!m) return monthKey || ""; return `${m[1]}年${m[2]}月`; };
const formatYearDisplay = (yearKey = "") => yearKey ? `${yearKey}年` : "";

const getLoginLockState = () => { try { const raw = localStorage.getItem(LOGIN_LOCK_KEY); if (!raw) return { failures: 0, lockedUntil: 0 }; const state = JSON.parse(raw); if (Number(state.lockedUntil || 0) && Date.now() < Number(state.lockedUntil)) return state; if (Number(state.lockedUntil || 0) && Date.now() >= Number(state.lockedUntil)) { localStorage.removeItem(LOGIN_LOCK_KEY); return { failures: 0, lockedUntil: 0 }; } return { failures: Number(state.failures || 0), lockedUntil: 0 }; } catch (e) { return { failures: 0, lockedUntil: 0 }; } };
const recordLoginFailure = () => { const current = getLoginLockState(); const failures = Number(current.failures || 0) + 1; const lockedUntil = failures >= SECURITY_CONFIG.maxLoginFailures ? Date.now() + SECURITY_CONFIG.lockoutMinutes * 60 * 1000 : 0; const next = { failures, lockedUntil }; localStorage.setItem(LOGIN_LOCK_KEY, JSON.stringify(next)); return next; };
const clearLoginFailures = () => { try { localStorage.removeItem(LOGIN_LOCK_KEY); } catch (e) {} };
const formatLockoutText = (lockedUntil) => { const remainMs = Math.max(0, Number(lockedUntil || 0) - Date.now()); const remainMin = Math.ceil(remainMs / 60000); return remainMin > 0 ? `登入失敗次數過多，請 ${remainMin} 分鐘後再試。` : ""; };

const toDate = (dateStr, timeStr = "00:00:00") => { if (!dateStr) return null; const safeDate = String(dateStr).replace(/\//g, "-"); const safeTime = timeStr || "00:00:00"; const dt = new Date(`${safeDate}T${safeTime.length === 5 ? safeTime + ":00" : safeTime}`); return Number.isNaN(dt.getTime()) ? null : dt; };

const getWeekInfo = (dateStr, timeStr = "00:00:00") => {
  const dt = toDate(dateStr, timeStr);
  if (!dt) return null;
  const clone = new Date(dt);
  clone.setHours(0, 0, 0, 0);
  const day = clone.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;
  const monday = new Date(clone);
  monday.setDate(clone.getDate() + diffToMonday);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const firstThursday = new Date(monday);
  firstThursday.setDate(monday.getDate() + 3);
  const weekYear = firstThursday.getFullYear();
  const jan4 = new Date(weekYear, 0, 4);
  const jan4Day = jan4.getDay() || 7;
  const firstWeekMonday = new Date(jan4);
  firstWeekMonday.setDate(jan4.getDate() - jan4Day + 1);
  const weekNo = Math.floor((monday - firstWeekMonday) / 604800000) + 1;
  return {
    weekKey: `${weekYear}-W${String(weekNo).padStart(2, "0")}`,
    weekLabel: `${monday.getFullYear()}/${monday.getMonth() + 1}/${monday.getDate()} ~ ${sunday.getFullYear()}/${sunday.getMonth() + 1}/${sunday.getDate()}`,
    monday: formatDateKey(monday),
    sunday: formatDateKey(sunday)
  };
};

const getCalendarMonthKey = (dateStr) => { if (!dateStr) return ""; const safe = String(dateStr).replace(/\//g, "-"); const m = safe.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/); return m ? `${m[1]}-${String(m[2]).padStart(2, "0")}` : ""; };
const getCalendarYearKey = (dateStr) => { if (!dateStr) return ""; const safe = String(dateStr).replace(/\//g, "-"); const m = safe.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/); return m ? m[1] : ""; };
const weekKeyToNumber = (weekKey) => { const m = String(weekKey || "").match(/^(\d{4})-W(\d{2})$/); if (!m) return null; return Number(m[1]) * 100 + Number(m[2]); };
const monthKeyToNumber = (monthKey) => { const m = String(monthKey || "").match(/^(\d{4})-(\d{2})$/); if (!m) return null; return Number(m[1]) * 100 + Number(m[2]); };
const yearKeyToNumber = (yearKey) => { const m = String(yearKey || "").match(/^(\d{4})$/); if (!m) return null; return Number(m[1]); };
const effectiveKeyToNumber = (value, fallbackType = "weeks") => { const v = String(value || "").trim(); if (!v) return null; if (/^\d{4}-W\d{2}$/.test(v)) return weekKeyToNumber(v); if (/^\d{4}-\d{2}$/.test(v)) return monthKeyToNumber(v); if (/^\d{4}$/.test(v)) return yearKeyToNumber(v); if (fallbackType === "months") return monthKeyToNumber(v); if (fallbackType === "years") return yearKeyToNumber(v); return weekKeyToNumber(v); };
const periodKeyToNumber = (periodKey, periodType = "weeks") => { if (periodType === "weeks") return weekKeyToNumber(periodKey); if (periodType === "months") return monthKeyToNumber(periodKey); if (periodType === "years") return yearKeyToNumber(periodKey); return null; };

const isAgentEffectiveForPeriod = (agentName, periodKey, periodType, effectiveRules) => {
  const name = String(agentName || "").trim();
  if (!name) return false;
  const rule = (effectiveRules || {})[name];
  if (!rule) return true;
  const current = periodKeyToNumber(periodKey, periodType);
  if (current == null) return true;
  if (rule.start) { const start = effectiveKeyToNumber(rule.start, periodType); if (start != null && current < start) return false; }
  if (rule.end) { const end = effectiveKeyToNumber(rule.end, periodType); if (end != null && current > end) return false; }
  return true;
};

const isAgentEffectiveForRow = (agentName, row, effectiveRules) => {
  if (!row) return false;
  if (row.weekKey) return isAgentEffectiveForPeriod(agentName, row.weekKey, "weeks", effectiveRules);
  if (row.monthKey) return isAgentEffectiveForPeriod(agentName, row.monthKey, "months", effectiveRules);
  if (row.yearKey) return isAgentEffectiveForPeriod(agentName, row.yearKey, "years", effectiveRules);
  return true;
};

  if (name === "呂宜庭") { if (month >= "2025-03" && month <= "2025-10") return "早班"; if (month === "2025-11") return "晚班"; }
  if (name === "程馨慧") { if (month >= "2025-03" && month <= "2025-09") return "中班"; if (month >= "2025-10" && month <= "2025-11") return "早班"; }
  if (name === "林廷坤") { if (month >= "2025-03" && month <= "2025-04") return "晚班"; if (month >= "2025-05" && month <= "2025-11") return "中班"; }
  if (name === "戴聰成") return "早班";
  return "";
};

const parseDuration = (val) => {
  if (val == null || val === "") return 0;
  const s = String(val).trim();
  if (/^\d+(\.\d+)?$/.test(s)) return Math.round(Number(s));
  const hms = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (hms) return Number(hms[1]) * 3600 + Number(hms[2]) * 60 + Number(hms[3] || 0);
  const zh = s.match(/(?:(\d+)\s*小時)?\s*(?:(\d+)\s*分)?\s*(?:(\d+)\s*秒)?/);
  if (zh && (zh[1] || zh[2] || zh[3])) return Number(zh[1] || 0) * 3600 + Number(zh[2] || 0) * 60 + Number(zh[3] || 0);
  return 0;
};

const normalizeHeaderText = (s) => String(s || "").trim().replace(/\s+/g, "").replace(/[：:]/g, "");

const parseDateTimeValue = (value) => {
  if (value == null || value === "") return { date: "", time: "" };
  if (value instanceof Date && !Number.isNaN(value.getTime())) return { date: formatDateKey(value), time: `${String(value.getHours()).padStart(2, "0")}:${String(value.getMinutes()).padStart(2, "0")}:${String(value.getSeconds()).padStart(2, "0")}` };
  if (typeof value === "number" && window.XLSX && window.XLSX.SSF) { try { const parsed = window.XLSX.SSF.parse_date_code(value); if (parsed) return { date: `${parsed.y}-${String(parsed.m).padStart(2, "0")}-${String(parsed.d).padStart(2, "0")}`, time: `${String(parsed.H || 0).padStart(2, "0")}:${String(parsed.M || 0).padStart(2, "0")}:${String(Math.floor(parsed.S || 0)).padStart(2, "0")}` }; } catch (e) {} }
  const raw = String(value || "").trim();
  if (!raw) return { date: "", time: "" };
  const normalized = raw.replace(/-/g, "/");
  const parts = normalized.split(/\s+/);
  let dateStr = parts[0];
  let timeStr = parts.length >= 2 ? parts[1].slice(0, 8) : "";
  const dParts = dateStr.split("/");
  if (dParts.length === 3) dateStr = `${dParts[0]}-${String(dParts[1]).padStart(2, "0")}-${String(dParts[2]).padStart(2, "0")}`;
  else dateStr = dateStr.replace(/\//g, "-");
  if (timeStr && timeStr.length === 5) timeStr += ":00";
  return { date: dateStr, time: timeStr };
};

const normalizeLineName = (value) => {
  const raw = String(value || "").trim();
  if (!raw) return "";
  const v = raw.replace(/^\d+[_-]?/, "");
  if (v.includes("GT")) return "GT專線";
  if (v.includes("儲值")) return "儲值專線";
  if (v.includes("滿貫")) return "滿貫專線";
  if (v.includes("金好運")) return "金好運專線";
  return v.endsWith("專線") ? v : `${v}專線`;
};

const normalizeSurveyAnswer = (value) => { const t = String(value || "").trim(); return VALID_SURVEY.includes(t) ? t : "未回答"; };

const extractSatisfaction = (tagText) => {
  const text = String(tagText || "").trim();
  let q1 = "", q2 = "";
  if (text) { const parts = text.split(/[;,，]/).map((v) => v.trim()).filter(Boolean); for (const p of parts) { const m1 = p.match(/^問題?1(.+)$/); const m2 = p.match(/^問題?2(.+)$/); if (m1) q1 = m1[1].trim(); if (m2) q2 = m2[1].trim(); } }
  return { q1: normalizeSurveyAnswer(q1), q2: normalizeSurveyAnswer(q2) };
};

const makeRowUniqueKey = (row) => [String(row.id||"").trim(),String(row.agent||"").trim(),String(row.date||"").trim(),String(row.time||"").trim(),String(row.line||"").trim(),String(row.q1||"").trim(),String(row.q2||"").trim(),String(row.handleDuration||"").trim(),String(row.speakDuration||row.duration||"").trim()].join("||");

const dedupeRows = (rows = []) => { const map = new Map(); rows.forEach((row) => { const key = makeRowUniqueKey(row); if (!map.has(key)) map.set(key, row); }); return Array.from(map.values()); };

const parseSimpleCsvLine = (line) => { const result = []; let cur = "", inQuotes = false; for (let i = 0; i < line.length; i++) { const ch = line[i]; if (ch === '"') { if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; } else inQuotes = !inQuotes; } else if (ch === "," && !inQuotes) { result.push(cur); cur = ""; } else cur += ch; } result.push(cur); return result; };

const parseSimpleCsv = (text) => { const lines = String(text || "").replace(/^\uFEFF/, "").split(/\r?\n/).filter(Boolean); if (!lines.length) return []; const headers = parseSimpleCsvLine(lines[0]); return lines.slice(1).map((line) => { const cols = parseSimpleCsvLine(line); const obj = {}; headers.forEach((h, i) => { obj[h] = cols[i] ?? ""; }); return obj; }); };

const readSpreadsheetRows = async (file) => {
  const ext = (file.name.split(".").pop() || "").toLowerCase();
  if (ext === "csv") return parseSimpleCsv(await file.text());
  if (ext === "xlsx" || ext === "xls") {
    const arrayBuffer = await file.arrayBuffer();
    const workbook = window.XLSX.read(arrayBuffer, { type: "array", cellDates: true });
    const firstSheetName = workbook.SheetNames[0];
    if (!firstSheetName) return [];
    const sheet = workbook.Sheets[firstSheetName];
    return window.XLSX.utils.sheet_to_json(sheet, { defval: "", raw: true });
  }
  throw new Error("不支援的檔案格式");
};

const normalizeStoredRow = (row = {}) => {
  const date = row.date || row["來電日期"] || "";
  const time = row.time || row["來電時間"] || "";
  const info = getWeekInfo(date, time || "00:00:00");
  const monthKey = getCalendarMonthKey(date) || normalizeMonthKey(row.monthKey || "");
  const yearKey = getCalendarYearKey(date) || String(row.yearKey || "");
  const handleDuration = Number(row.handleDuration || row["總處理秒數"] || 0);
  const speakDuration = Number(row.speakDuration || row["總發話秒數"] || row.duration || 0);
  return {
    agent: row.agent || row["客服名稱"] || "", shift: row.shift || row["班別"] || "", shiftSource: row.shiftSource || row["班別來源"] || "",
    date, time, monthKey, yearKey,
    weekKey: info?.weekKey || row.weekKey || "", weekLabel: info?.weekLabel || row.weekLabel || "",
    weekStart: info?.monday || row.weekStart || "", weekEnd: info?.sunday || row.weekEnd || "",
    line: row.line || row["遊戲專線"] || "",
    q1: normalizeSurveyAnswer(row.q1 || row["滿意度問題1"]),
    q2: normalizeSurveyAnswer(row.q2 || row["滿意度問題2"]),
    id: row.id || row["對話ID"] || "",
    handleDuration, speakDuration, duration: speakDuration
  };
};

const buildSummaryRowsFromSource = (rows = [], type = "speak") => {
  const map = new Map();
  const durationKey = type === "handle" ? "handleDuration" : "speakDuration";
  rows.forEach((row) => {
    const agent = row.agent || "";
    if (!agent) return;
    if (!map.has(agent)) map.set(agent, { "客服名稱": agent, "班別": row.shift || "", "GT專線": 0, "儲值專線": 0, "GT+儲值專線": 0, "滿貫專線": 0, "金好運專線": 0, "總計": 0 });
    const target = map.get(agent);
    target["班別"] = target["班別"] || row.shift || "";
    const sec = Number(row[durationKey] || 0);
    if ((row.line || "").includes("GT")) { target["GT專線"] += sec; target["GT+儲值專線"] += sec; }
    if ((row.line || "").includes("儲值")) { target["儲值專線"] += sec; target["GT+儲值專線"] += sec; }
    if ((row.line || "").includes("滿貫")) target["滿貫專線"] += sec;
    if ((row.line || "").includes("金好運")) target["金好運專線"] += sec;
    target["總計"] += sec;
  });
  return Array.from(map.values()).sort((a, b) => a["客服名稱"].localeCompare(b["客服名稱"], "zh-Hant"));
};

const summarizePreviewRows = (rows = []) => ({ detailRows: rows, handleRows: buildSummaryRowsFromSource(rows, "handle"), speakRows: buildSummaryRowsFromSource(rows, "speak") });

const chunkArray = (arr = [], size = 300) => { const result = []; for (let i = 0; i < arr.length; i += size) result.push(arr.slice(i, i + size)); return result; };

const paginateRows = (rows = [], page = 1, pageSize = 100) => {
  const safePageSize = Number(pageSize || 100);
  const totalPages = Math.max(1, Math.ceil((rows || []).length / safePageSize));
  const safePage = Math.min(Math.max(Number(page || 1), 1), totalPages);
  const start = (safePage - 1) * safePageSize;
  return { rows: rows.slice(start, start + safePageSize), safePage, totalPages, start };
};

function PaginationControls({ total = 0, page = 1, pageSize = 100, onPageChange, onPageSizeChange }) {
  const totalPages = Math.max(1, Math.ceil(Number(total || 0) / Number(pageSize || 100)));

  const start = total ? (safePage - 1) * Number(pageSize) + 1 : 0;
  const end = Math.min(total, safePage * Number(pageSize));
  return (
    <div className="flex flex-wrap items-center justify-between gap-3 px-4 py-3 bg-slate-50 border-x border-b rounded-b-3xl text-sm font-bold text-slate-600">

// ─── CRM PAGINATION ───────────────────────────────────────────────────────────
function CrmPagination({ total, page, pageSize, onPageChange, onPageSizeChange }) {
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const safePage = Math.min(Math.max(page, 1), totalPages);
  const start = total ? (safePage-1)*pageSize+1 : 0;
  const end = Math.min(total, safePage*pageSize);
  const PBtn = ({ label, disabled, onClick }) => (
    <button type="button" disabled={disabled} onClick={onClick}
      style={{ padding:"5px 12px", borderRadius:"6px", border:"0.5px solid #e2e8f0", background: disabled?"#f8fafc":"#fff", color: disabled?"#cbd5e1":"#475569", fontSize:"12px", cursor: disabled?"default":"pointer", fontFamily:"inherit" }}>
      {label}
    </button>
  );
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 20px", borderTop:"0.5px solid #f1f5f9", flexWrap:"wrap", gap:"8px" }}>
      <span style={{ fontSize:"12px", color:"#94a3b8" }}>顯示 {start}–{end} / 共 {total} 筆</span>
      <div style={{ display:"flex", alignItems:"center", gap:"6px", flexWrap:"wrap" }}>
        <span style={{ fontSize:"12px", color:"#64748b" }}>每頁</span>
        <select value={pageSize} onChange={e=>{ onPageSizeChange(+e.target.value); onPageChange(1); }}
          style={{ ...CRM.select, padding:"4px 8px", fontSize:"12px" }}>
          {[50,100,200,500].map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <PBtn label="«" disabled={safePage<=1} onClick={()=>onPageChange(1)} />
        <PBtn label="‹" disabled={safePage<=1} onClick={()=>onPageChange(safePage-1)} />
        <span style={{ fontSize:"12px", color:"#475569", padding:"0 4px" }}>{safePage} / {totalPages}</span>
        <PBtn label="›" disabled={safePage>=totalPages} onClick={()=>onPageChange(safePage+1)} />
        <PBtn label="»" disabled={safePage>=totalPages} onClick={()=>onPageChange(totalPages)} />
      </div>
    </div>
  );
}

// ─── Period filter panel: shortcut buttons + custom range (A+C design) ────────
function PeriodFilterPanel({ allYears, allMonths, allWeeks, cloudMasterStore, selectedYears, selectedMonths, selectedWeeks, setSelectedYears, setSelectedMonths, setSelectedWeeks, viewType, setViewType }) {

  const [activeShortcut, setActiveShortcut] = useState("recent4");
  const [fromKey, setFromKey] = useState("");
  const [toKey, setToKey] = useState("");

  const list = viewType === "years" ? allYears : viewType === "months" ? allMonths : allWeeks;

  const fmtKey = useCallback((k) => {
    if (viewType === "weeks") return formatWeekKeyZh(k);
    if (viewType === "months") return formatMonthDisplay(k);
    return formatYearDisplay(k);
  }, [viewType]);

  const SHORTCUTS = useMemo(() => {
    if (viewType === "weeks") return [
      { key: "recent1",  label: "最近 1 週",   n: 1  },
      { key: "recent4",  label: "最近 4 週",   n: 4  },
      { key: "recent8",  label: "最近 8 週",   n: 8  },
      { key: "recent13", label: "最近 13 週",  n: 13 },
      { key: "all",      label: "全部週次",    n: null },
      { key: "custom",   label: "自訂範圍",    n: null },
    ];
    if (viewType === "months") return [
      { key: "recent1",  label: "最近 1 個月", n: 1 },
      { key: "recent3",  label: "最近 3 個月", n: 3 },
      { key: "recent6",  label: "最近 6 個月", n: 6 },
      { key: "thisYear", label: "今年度",       n: null },
      { key: "all",      label: "全部月份",    n: null },
      { key: "custom",   label: "自訂範圍",    n: null },
    ];
    return [
      { key: "recent2",  label: "最近 2 年",   n: 2 },
      { key: "all",      label: "全部年份",    n: null },
      { key: "custom",   label: "自訂範圍",    n: null },
    ];
  }, [viewType]);

  const applyRange = useCallback((from, to, sc, curList) => {
    const L = curList || list;
    const fi = L.indexOf(from);
    const ti = L.indexOf(to);
    if (fi < 0 || ti < 0) return;
    const slice = L.slice(Math.min(fi, ti), Math.max(fi, ti) + 1);
    if (viewType === "weeks") {
      const ys = Array.from(new Set(slice.map(w => cloudMasterStore.weeks?.[w]?.year).filter(Boolean)));
      const ms = Array.from(new Set(slice.map(w => cloudMasterStore.weeks?.[w]?.month).filter(Boolean)));
      setSelectedYears(ys);
      setSelectedMonths(ms);
      setSelectedWeeks(slice);
    } else if (viewType === "months") {
      const ys = Array.from(new Set(slice.map(m => m.slice(0, 4))));
      setSelectedYears(ys);
      setSelectedMonths(slice);
      setSelectedWeeks(allWeeks.filter(w => { const it = cloudMasterStore.weeks?.[w]; return it && slice.includes(it.month); }));
    } else {
      setSelectedYears(slice);
      setSelectedMonths(allMonths.filter(m => slice.includes(m.slice(0, 4))));
      setSelectedWeeks(allWeeks.filter(w => { const it = cloudMasterStore.weeks?.[w]; return it && slice.includes(it.year); }));
    }
  }, [viewType, list, cloudMasterStore, allWeeks, allMonths, setSelectedYears, setSelectedMonths, setSelectedWeeks]);

  const resolveShortcut = useCallback((sc, curList) => {
    const L = curList || list;
    if (!L.length) return { from: "", to: "" };
    const last = L[L.length - 1];
    if (sc.key === "all") return { from: L[0], to: last };
    if (sc.key === "thisYear") {
      const thisY = String(new Date().getFullYear());
      const inYear = L.filter(m => m.startsWith(thisY));
      return inYear.length ? { from: inYear[0], to: inYear[inYear.length - 1] } : { from: L[0], to: last };
    }
    if (sc.n) {
      const from = L[Math.max(0, L.length - sc.n)];
      return { from, to: last };
    }
    return { from: L[0], to: last };
  }, [list]);

  useEffect(() => {
    if (!list.length) return;
    const defaultSc = SHORTCUTS.find(s => s.key === activeShortcut) || SHORTCUTS[0];
    const { from, to } = resolveShortcut(defaultSc, list);
    setFromKey(from);
    setToKey(to);
    if (defaultSc.key !== "custom") applyRange(from, to, defaultSc, list);
  }, [viewType, list.length]);

  const handleShortcut = (sc) => {
    setActiveShortcut(sc.key);
    if (sc.key === "custom") return;
    const { from, to } = resolveShortcut(sc);
    setFromKey(from);
    setToKey(to);
    applyRange(from, to, sc);
  };

  const handleFromChange = (val) => {
    setFromKey(val);
    setActiveShortcut("custom");
    const fi = list.indexOf(val);
    const ti = list.indexOf(toKey);
    const safeToKey = fi > ti ? val : toKey;
    setToKey(safeToKey);
    applyRange(val, safeToKey, { key: "custom" });
  };

  const handleToChange = (val) => {
    setToKey(val);
    setActiveShortcut("custom");
    const fi = list.indexOf(fromKey);
    const ti = list.indexOf(val);
    const safeFromKey = ti < fi ? val : fromKey;
    setFromKey(safeFromKey);
    applyRange(safeFromKey, val, { key: "custom" });
  };

  const selectedCount = viewType === "years" ? selectedYears.length : viewType === "months" ? selectedMonths.length : selectedWeeks.length;
  const unit = viewType === "years" ? "年" : viewType === "months" ? "個月" : "週";

  const rangeCount = useMemo(() => {
    if (!fromKey || !toKey) return 0;
    const fi = list.indexOf(fromKey);
    const ti = list.indexOf(toKey);
    return fi >= 0 && ti >= 0 ? Math.abs(ti - fi) + 1 : 0;
  }, [fromKey, toKey, list]);

  return (
    <div className="tr-panel p-5 space-y-4">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"10px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <span style={{fontSize:"13px",fontWeight:"600",color:"var(--color-text-primary)"}}>期間篩選</span>
          {selectedCount > 0 && (
            <span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:"12px",fontSize:"12px",fontWeight:"500",background:"#E6F1FB",color:"#0C447C"}}>
              已選 {selectedCount} {unit}
            </span>
          )}
        </div>
        <div style={{display:"flex",gap:"4px"}}>
          <button type="button" onClick={() => setViewType("weeks")} className={`tr-ptab${viewType==="weeks"?" on":""}`}>週</button>
          <button type="button" onClick={() => setViewType("months")} className={`tr-ptab${viewType==="months"?" on":""}`}>月</button>
          <button type="button" onClick={() => setViewType("years")} className={`tr-ptab${viewType==="years"?" on":""}`}>年</button>
        </div>
      </div>

      <div className="tr-fbox">
        <div style={{fontSize:"11px",fontWeight:"500",color:"#94a3b8",marginBottom:"8px",userSelect:"none"}}>快速選取</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
          {list.length === 0 ? (
            <span style={{fontSize:"12px",color:"#94a3b8"}}>雲端尚無資料</span>
          ) : SHORTCUTS.map(sc => (
            <button
              key={sc.key}
              type="button"
              onClick={() => handleShortcut(sc)}
              style={{
                display:"inline-flex",alignItems:"center",gap:"4px",
                padding:"5px 14px",borderRadius:"20px",fontSize:"13px",cursor:"pointer",
                fontFamily:"inherit",whiteSpace:"nowrap",transition:"all .15s",
                border: activeShortcut === sc.key ? "0.5px solid #185FA5" : "0.5px solid #e2e8f0",
                background: activeShortcut === sc.key ? "#185FA5" : "#f8fafc",
                color: activeShortcut === sc.key ? "#E6F1FB" : "#64748b",
                fontWeight: activeShortcut === sc.key ? "500" : "400",
              }}
            >
              {sc.key === "custom" && <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M4 6h16M4 12h10M4 18h6"/></svg>}
              {sc.label}
            </button>
          ))}
        </div>
      </div>

      <div className="tr-fbox">
        <div style={{fontSize:"11px",fontWeight:"500",color:"#94a3b8",marginBottom:"8px",userSelect:"none"}}>自訂範圍</div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
          <span style={{fontSize:"12px",color:"#64748b",whiteSpace:"nowrap"}}>從</span>
          <select
            value={fromKey}
            onChange={e => handleFromChange(e.target.value)}
            style={{fontSize:"12px",padding:"5px 8px",borderRadius:"6px",border:"0.5px solid #e2e8f0",background:"#fff",color:"#334155",cursor:"pointer",fontFamily:"inherit",outline:"none"}}
          >
            {list.map(k => <option key={k} value={k}>{fmtKey(k)}</option>)}
          </select>
          <span style={{fontSize:"12px",color:"#64748b",whiteSpace:"nowrap"}}>到</span>
          <select
            value={toKey}
            onChange={e => handleToChange(e.target.value)}
            style={{fontSize:"12px",padding:"5px 8px",borderRadius:"6px",border:"0.5px solid #e2e8f0",background:"#fff",color:"#334155",cursor:"pointer",fontFamily:"inherit",outline:"none"}}
          >
            {list.map(k => <option key={k} value={k}>{fmtKey(k)}</option>)}
          </select>
          {rangeCount > 0 && (
            <span style={{fontSize:"12px",fontWeight:"500",color:"#185FA5",whiteSpace:"nowrap"}}>
              共 {rangeCount} {unit}
            </span>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── TrendPanel: Professional CRM UI ─────────────────────────────────────────
function TrendPanel({ periodList, viewType, availableAgents, effectiveRules, includeHistoryAgents, setIncludeHistoryAgents, selectedTrendAgents, setSelectedTrendAgents, selectedMetric, setSelectedMetric }) {
  const chartRef = useRef(null);
  const chartInstRef = useRef(null);

  const AGENT_PALETTE = [
    { color: "#2563eb", bg: "#eff6ff", tc: "#1e40af" },
    { color: "#0891b2", bg: "#ecfeff", tc: "#155e75" },
    { color: "#7c3aed", bg: "#f5f3ff", tc: "#4c1d95" },
    { color: "#0d9488", bg: "#f0fdfa", tc: "#134e4a" },
    { color: "#dc2626", bg: "#fef2f2", tc: "#991b1b" },
    { color: "#ea580c", bg: "#fff7ed", tc: "#9a3412" },
    { color: "#d97706", bg: "#fffbeb", tc: "#92400e" },
    { color: "#65a30d", bg: "#f7fee7", tc: "#3f6212" },
    { color: "#9333ea", bg: "#faf5ff", tc: "#581c87" },
    { color: "#0284c7", bg: "#f0f9ff", tc: "#0c4a6e" },
    { color: "#be185d", bg: "#fdf2f8", tc: "#831843" },
    { color: "#1d4ed8", bg: "#eff6ff", tc: "#1e3a8a" },
    { color: "#b45309", bg: "#fef3c7", tc: "#78350f" },
  ];
  const DASH_PATTERNS = [[], [6,3], [3,3], [8,3,2,3], [4,2], [10,3], [2,2], [7,2,2,2]];
  const SHIFT_STYLE = { "早班": { bg: "#eff6ff", tc: "#1e40af" }, "中班": { bg: "#f0fdf4", tc: "#14532d" }, "晚班": { bg: "#fff7ed", tc: "#9a3412" } };

  const agentColorMap = useMemo(() => {
    const map = {};
    availableAgents.forEach((name, i) => { map[name] = AGENT_PALETTE[i % AGENT_PALETTE.length]; });
    return map;
  }, [availableAgents]);

  const metricCfg = HISTORY_METRICS.find(m => m.key === selectedMetric) || HISTORY_METRICS[0];
  const isPct = metricCfg.format === "percent";
  const isHours = metricCfg.format === "hours";

  const activeAgents = useMemo(() => selectedTrendAgents.filter(n => availableAgents.includes(n)), [selectedTrendAgents, availableAgents]);

  const getVal = useCallback((periodItem, agentName) => {
    if (!periodItem) return null;
    if (!isAgentEffectiveForPeriod(agentName, periodItem.periodKey, viewType, effectiveRules)) return null;
    const agentData = (periodItem.agents || []).find(a => a.name === agentName);
    if (!agentData || Number(agentData.totalCalls || 0) <= 0) return null;
    if (metricCfg.source === "lines") {
      const v = agentData.lines?.[metricCfg.key];
      return (v == null || Number(v) === 0) ? null : v;
    }
    const v = agentData[metricCfg.key];
    return v == null ? null : v;
  }, [periodList, selectedMetric, viewType, effectiveRules, metricCfg]);

  const fmt = useCallback((v) => {
    if (v == null) return "—";
    if (isPct) return `${Number(v).toFixed(2)}%`;
    if (isHours) return `${(Number(v) / 3600).toFixed(2)} h`;
    return Math.round(Number(v)).toLocaleString();
  }, [isPct, isHours]);

  const fmtChart = useCallback((v) => {
    if (v == null) return null;
    if (isHours) return Number(v) / 3600;
    return Number(v);
  }, [isHours]);

  const periodLabels = useMemo(() => periodList.map(p => {
    if (viewType === "years") return formatYearDisplay(p.periodKey);
    if (viewType === "months") return formatMonthDisplay(p.periodKey);
    return formatWeekKeyZh(p.periodKey);
  }), [periodList, viewType]);

  const lastPeriod = periodList[periodList.length - 1];

  const rankData = useMemo(() => {
    if (!lastPeriod) return [];
    return activeAgents
      .map(name => ({ name, v: getVal(lastPeriod, name), clr: agentColorMap[name] }))
      .filter(x => x.v != null)
      .sort((a, b) => b.v - a.v);
  }, [activeAgents, lastPeriod, getVal, agentColorMap]);

  const allPeriodVals = useMemo(() =>
    activeAgents.flatMap(name => periodList.map(p => getVal(p, name))).filter(v => v != null),
    [activeAgents, periodList, getVal]
  );
  const kpiHigh = allPeriodVals.length ? Math.max(...allPeriodVals) : null;
  const kpiLow  = allPeriodVals.length ? Math.min(...allPeriodVals) : null;
  const kpiAvg  = allPeriodVals.length ? allPeriodVals.reduce((a, b) => a + b, 0) / allPeriodVals.length : null;

  const kpiHighName = useMemo(() => {
    if (kpiHigh == null) return "";
    for (const p of periodList) {
      for (const name of activeAgents) {
        if (getVal(p, name) === kpiHigh) return name;
      }
    }
    return "";
  }, [kpiHigh, periodList, activeAgents, getVal]);

  const kpiLowName = useMemo(() => {
    if (kpiLow == null) return "";
    for (const p of periodList) {
      for (const name of activeAgents) {
        if (getVal(p, name) === kpiLow) return name;
      }
    }
    return "";
  }, [kpiLow, periodList, activeAgents, getVal]);

  useEffect(() => {
    if (!chartRef.current || !window.Chart) return;
    if (chartInstRef.current) chartInstRef.current.destroy();
    if (!periodList.length || !activeAgents.length) return;

    const datasets = activeAgents.map((name, i) => ({
      label: name,
      data: periodList.map(p => fmtChart(getVal(p, name))),
      borderColor: agentColorMap[name]?.color || "#2563eb",
      backgroundColor: (agentColorMap[name]?.color || "#2563eb") + "15",
      pointBackgroundColor: agentColorMap[name]?.color || "#2563eb",
      pointRadius: 3, pointHoverRadius: 5,
      tension: 0.3, spanGaps: false, fill: false,
      borderDash: DASH_PATTERNS[i % DASH_PATTERNS.length],
      borderWidth: 2,
    }));

    const chartVals = datasets.flatMap(d => d.data).filter(v => v != null);
    const minV = chartVals.length ? Math.min(...chartVals) : 0;
    const maxV = chartVals.length ? Math.max(...chartVals) : 100;
    const pad = isPct ? 3 : Math.max((maxV - minV) * 0.12, 1);

    chartInstRef.current = new window.Chart(chartRef.current, {
      type: periodList.length <= 1 ? "bar" : "line",
      data: { labels: periodLabels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false, spanGaps: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => { const v = ctx.parsed.y; return v == null ? `${ctx.dataset.label}: —` : `${ctx.dataset.label}: ${fmt(isHours ? v * 3600 : v)}`; } } }
        },
        scales: {
          x: { grid: { color: "rgba(148,163,184,0.1)" }, ticks: { font: { size: 11 }, color: "#94a3b8", maxRotation: 30 } },
          y: {
            grid: { color: "rgba(148,163,184,0.1)" },
            ticks: { font: { size: 11 }, color: "#94a3b8", callback: v => isPct ? v.toFixed(0) + "%" : v.toLocaleString() },
            min: chartVals.length ? Math.max(0, +(minV - pad).toFixed(1)) : undefined,
            max: chartVals.length ? +(maxV + pad).toFixed(1) : undefined,
          }
        }
      }
    });
    return () => { if (chartInstRef.current) chartInstRef.current.destroy(); };
  }, [activeAgents, periodList, selectedMetric, viewType, effectiveRules]);

  const selAll   = () => setSelectedTrendAgents([...availableAgents]);
  const clearAll = () => setSelectedTrendAgents([]);
  const toggleAgent = (name) => setSelectedTrendAgents(prev => prev.includes(name) ? prev.filter(x => x !== name) : [...prev, name]);

  const cardStyle = { background: "#fff", border: "0.5px solid #e2e8f0", borderRadius: "12px", overflow: "hidden" };
  const cardHeaderStyle = { padding: "13px 20px", borderBottom: "0.5px solid #f1f5f9", display: "flex", alignItems: "center", justifyContent: "space-between", gap: "10px" };
  const cardTitleStyle = { fontSize: "11px", fontWeight: "700", color: "#64748b", letterSpacing: ".06em", textTransform: "uppercase" };
  const kpiCardStyle = { background: "#f8fafc", borderRadius: "8px", padding: "14px 16px", border: "0.5px solid #f1f5f9" };

  const METRIC_GROUPS = [
    { label: "滿意度指標", items: [
      { key: "overallVerySatAvg", label: "整體非常滿意度", icon: "📊", bg: "#eff6ff", tc: "#1d4ed8" },
      { key: "overallSurAvg",     label: "整體調查率",     icon: "📋", bg: "#f0fdf4", tc: "#15803d" },
      { key: "q1VerySatRate",     label: "人員滿意(Q1)",   icon: "👤", bg: "#faf5ff", tc: "#7c3aed" },
      { key: "q2VerySatRate",     label: "問題滿意(Q2)",   icon: "💬", bg: "#fff7ed", tc: "#c2410c" },
      { key: "q1SurRate",         label: "人員調查率(Q1)", icon: "📞", bg: "#faf5ff", tc: "#7c3aed" },
      { key: "q2SurRate",         label: "問題調查率(Q2)", icon: "📞", bg: "#fff7ed", tc: "#c2410c" },
    ]},
    { label: "通話量與時數", items: [
      { key: "totalCalls", label: "總通話數",       icon: "📱", bg: "#f0fdf4", tc: "#15803d" },
      { key: "GT+儲值專線", label: "GT+儲值時數",   icon: "⏱", bg: "#f0f9ff", tc: "#0284c7", source: "lines" },
      { key: "滿貫專線",    label: "滿貫專線時數",  icon: "⏱", bg: "#f0f9ff", tc: "#0284c7", source: "lines" },
      { key: "金好運專線",  label: "金好運專線時數",icon: "⏱", bg: "#f0f9ff", tc: "#0284c7", source: "lines" },
    ]},
  ];

  const metricLabel = METRIC_GROUPS.flatMap(g => g.items).find(m => m.key === selectedMetric)?.label || metricCfg.label;
  const periodRangeLabel = periodLabels.length ? `${periodLabels[0]}${periodLabels.length > 1 ? " — " + periodLabels[periodLabels.length - 1] : ""}` : "—";

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "14px" }}>

      {/* ① KPI 摘要列 */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, minmax(0,1fr))", gap: "10px" }}>
        {[
          { label: "比對人數",   val: activeAgents.length,                                        sub: "人員已選取",                                              color: "#1e293b" },
          { label: "期間最高",   val: fmt(kpiHigh),                                               sub: kpiHighName || "—",                                        color: "#15803d" },
          { label: "期間平均",   val: fmt(kpiAvg),                                                sub: `${periodLabels[0] || ""}${periodLabels.length > 1 ? " — " + periodLabels[periodLabels.length-1] : ""}`, color: "#1d4ed8" },
          { label: "期間最低",   val: fmt(kpiLow),                                                sub: kpiLowName || "—",                                         color: "#b91c1c" },
        ].map(k => (
          <div key={k.label} style={kpiCardStyle}>
            <div style={{ fontSize: "10px", fontWeight: "700", color: "#94a3b8", letterSpacing: ".06em", textTransform: "uppercase", marginBottom: "8px" }}>{k.label}</div>
            <div style={{ fontSize: "22px", fontWeight: "600", color: k.color, lineHeight: 1 }}>{k.val}</div>
            <div style={{ fontSize: "11px", color: "#94a3b8", marginTop: "5px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{k.sub || "—"}</div>
          </div>
        ))}
      </div>

      {/* ② 指標選擇 + 折線圖 */}
      <div style={cardStyle}>
        <div style={{ display: "grid", gridTemplateColumns: "190px 1fr", minHeight: "340px" }}>

          {/* 左側指標列表 */}
          <div style={{ borderRight: "0.5px solid #f1f5f9", paddingTop: "8px", paddingBottom: "8px" }}>
            {METRIC_GROUPS.map(group => (
              <div key={group.label}>
                <div style={{ padding: "8px 16px 4px", fontSize: "10px", fontWeight: "700", color: "#cbd5e1", letterSpacing: ".08em", textTransform: "uppercase" }}>{group.label}</div>
                {group.items.map(item => {
                  const on = selectedMetric === item.key;
                  return (
                    <div
                      key={item.key}
                      onClick={() => setSelectedMetric(item.key)}
                      style={{
                        display: "flex", alignItems: "center", gap: "10px",
                        padding: "9px 16px", cursor: "pointer",
                        borderLeft: on ? "2.5px solid #3b82f6" : "2.5px solid transparent",
                        background: on ? "#f0f9ff" : "transparent",
                        transition: "all .12s",
                      }}
                      onMouseEnter={e => { if (!on) e.currentTarget.style.background = "#f8fafc"; }}
                      onMouseLeave={e => { if (!on) e.currentTarget.style.background = "transparent"; }}
                    >
                      <div style={{ width: "28px", height: "28px", borderRadius: "7px", background: item.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "13px", flexShrink: 0 }}>{item.icon}</div>
                      <div style={{ fontSize: "12px", color: on ? "#1d4ed8" : "#64748b", fontWeight: on ? "600" : "400", lineHeight: 1.3 }}>{item.label}</div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>

          {/* 右側圖表 */}
          <div style={{ padding: "16px 20px", display: "flex", flexDirection: "column", gap: "12px" }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: "8px" }}>
              <div>
                <div style={{ fontSize: "14px", fontWeight: "600", color: "#1e293b" }}>{metricLabel} 趨勢</div>
                <div style={{ fontSize: "11px", color: "#94a3b8", marginTop: "3px" }}>{periodRangeLabel}</div>
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: "10px" }}>
                {activeAgents.map((name, i) => {
                  const clr = agentColorMap[name];
                  const dash = DASH_PATTERNS[i % DASH_PATTERNS.length];
                  return (
                    <span key={name} style={{ display: "flex", alignItems: "center", gap: "5px", fontSize: "11px", color: clr?.color || "#888" }}>
                      <span style={{ width: "18px", height: "0", display: "inline-block", borderTop: dash.length ? `2px dashed ${clr?.color}` : `2px solid ${clr?.color}` }}></span>
                      <span style={{ fontWeight: "500" }}>{name}</span>
                    </span>
                  );
                })}
              </div>
            </div>

            {activeAgents.length === 0 || periodList.length === 0 ? (
              <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "#94a3b8", fontSize: "13px", height: "200px" }}>
                請選取人員並設定期間篩選條件
              </div>
            ) : (
              <div style={{ position: "relative", height: "200px", width: "100%" }}>
                <canvas ref={chartRef} role="img" aria-label="客服趨勢折線圖">趨勢資料</canvas>
              </div>
            )}

            {/* 人員篩選 */}
            <div style={{ borderTop: "0.5px solid #f1f5f9", paddingTop: "12px" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "8px" }}>
                <span style={{ fontSize: "10px", fontWeight: "700", color: "#cbd5e1", letterSpacing: ".06em", textTransform: "uppercase" }}>人員篩選</span>
                <div style={{ display: "flex", gap: "6px" }}>
                  <button type="button" onClick={selAll} style={{ fontSize: "11px", padding: "2px 8px", border: "0.5px solid #e2e8f0", borderRadius: "5px", background: "#fff", cursor: "pointer", color: "#64748b", fontFamily: "inherit" }}>全選</button>
                  <button type="button" onClick={clearAll} style={{ fontSize: "11px", padding: "2px 8px", border: "0.5px solid #e2e8f0", borderRadius: "5px", background: "#fff", cursor: "pointer", color: "#64748b", fontFamily: "inherit" }}>清空</button>
                  <label style={{ display: "flex", alignItems: "center", gap: "4px", fontSize: "11px", color: "#64748b", cursor: "pointer", padding: "2px 8px", border: "0.5px solid #e2e8f0", borderRadius: "5px" }}>
                    <input type="checkbox" checked={includeHistoryAgents} onChange={e => setIncludeHistoryAgents(e.target.checked)} style={{ accentColor: "#2563eb" }} />
                    含歷史人員
                  </label>
                </div>
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                {availableAgents.map(name => {
                  const clr = agentColorMap[name];
                  const on = selectedTrendAgents.includes(name);
                  return (
                    <button key={name} type="button" onClick={() => toggleAgent(name)}
                      style={{
                        display: "inline-flex", alignItems: "center", gap: "5px",
                        padding: "4px 10px", borderRadius: "20px", fontSize: "12px",
                        cursor: "pointer", fontFamily: "inherit", transition: "all .12s",
                        border: on ? `0.5px solid ${clr?.color}` : "0.5px solid #e2e8f0",
                        background: on ? clr?.bg : "#f8fafc",
                        color: on ? clr?.tc : "#64748b",
                        fontWeight: on ? "500" : "400",
                      }}>
                      <span style={{ width: "7px", height: "7px", borderRadius: "50%", background: clr?.color || "#888", flexShrink: 0 }}></span>
                      {name}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ③ 排名 + 數值明細（並排） */}
      <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: "12px", alignItems: "start" }}>

        {/* 排名卡 */}
        <div style={cardStyle}>
          <div style={cardHeaderStyle}>
            <span style={cardTitleStyle}>最新期間排名</span>
            <span style={{ fontSize: "11px", color: "#94a3b8" }}>{periodLabels[periodLabels.length - 1] || "—"}</span>
          </div>
          <div style={{ padding: "4px 0" }}>
            {rankData.length === 0 ? (
              <div style={{ padding: "24px", textAlign: "center", fontSize: "12px", color: "#94a3b8" }}>尚無資料</div>
            ) : rankData.map(({ name, v, clr }, i) => {
              const rankBg   = i === 0 ? "#fef3c7" : i === 1 ? "#f1f5f9" : i === 2 ? "#fef9f0" : "transparent";
              const rankTc   = i === 0 ? "#92400e" : i === 1 ? "#475569" : i === 2 ? "#78350f" : "#94a3b8";
              const agentShift = periodList.map(p => (p.agents || []).find(a => a.name === name)?.shift).find(Boolean) || "";
              const sc = SHIFT_STYLE[agentShift] || { bg: "#f1f5f9", tc: "#475569" };
              return (
                <div key={name} style={{ display: "grid", gridTemplateColumns: "36px 36px 1fr 80px", alignItems: "center", gap: "6px", padding: "9px 14px", borderBottom: i < rankData.length - 1 ? "0.5px solid #f8fafc" : "none", transition: "background .1s" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#f8fafc"}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  {/* 名次 */}
                  <div style={{ textAlign: "center" }}>
                    <span style={{ display: "inline-block", width: "24px", height: "24px", lineHeight: "24px", textAlign: "center", borderRadius: "6px", fontSize: "12px", fontWeight: "700", background: rankBg, color: rankTc }}>{i + 1}</span>
                  </div>
                  {/* 頭像 */}
                  <div style={{ width: "30px", height: "30px", borderRadius: "50%", background: clr?.bg || "#f1f5f9", color: clr?.tc || "#334155", fontSize: "12px", fontWeight: "600", display: "flex", alignItems: "center", justifyContent: "center", border: `1.5px solid ${clr?.color || "#e2e8f0"}`, flexShrink: 0 }}>{name[0]}</div>
                  {/* 姓名 + 班別 + 進度條 */}
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: "13px", fontWeight: "500", color: "#1e293b", marginBottom: "3px", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{name}</div>
                    <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                      {agentShift && <span style={{ fontSize: "10px", fontWeight: "600", padding: "1px 6px", borderRadius: "8px", background: sc.bg, color: sc.tc, whiteSpace: "nowrap" }}>{agentShift}</span>}
                      <div style={{ flex: 1, height: "4px", background: "#f1f5f9", borderRadius: "2px", overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${Math.round((v / rankData[0].v) * 100)}%`, background: clr?.color || "#2563eb", borderRadius: "2px", transition: "width .4s" }}></div>
                      </div>
                    </div>
                  </div>
                  {/* 數值 */}
                  <div style={{ textAlign: "right" }}>
                    <span style={{ fontSize: "12px", fontWeight: "600", color: clr?.tc || "#334155", background: clr?.bg || "#f1f5f9", padding: "3px 8px", borderRadius: "6px", whiteSpace: "nowrap", fontVariantNumeric: "tabular-nums" }}>{fmt(v)}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* 數值明細表 */}
        <div style={{ ...cardStyle, overflow: "hidden" }}>
          <div style={cardHeaderStyle}>
            <span style={cardTitleStyle}>各期間數值明細</span>
            <span style={{ fontSize: "11px", color: "#94a3b8" }}>{metricLabel}</span>
          </div>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "12px" }}>
              <thead>
                <tr style={{ background: "#f8fafc" }}>
                  <th style={{ padding: "9px 14px", textAlign: "left", fontWeight: "700", color: "#64748b", borderBottom: "0.5px solid #e2e8f0", whiteSpace: "nowrap", fontSize: "11px", letterSpacing: ".02em" }}>客服人員</th>
                  <th style={{ padding: "9px 10px", textAlign: "center", fontWeight: "700", color: "#64748b", borderBottom: "0.5px solid #e2e8f0", whiteSpace: "nowrap", fontSize: "11px" }}>班別</th>
                  {periodList.map((p, pi) => (
                    <th key={p.periodKey} style={{ padding: "9px 12px", textAlign: "center", fontWeight: "700", color: pi === periodList.length - 1 ? "#1d4ed8" : "#64748b", borderBottom: "0.5px solid #e2e8f0", whiteSpace: "nowrap", fontSize: "11px", background: pi === periodList.length - 1 ? "#f0f9ff" : "#f8fafc" }}>
                      {viewType === "years" ? formatYearDisplay(p.periodKey) : viewType === "months" ? formatMonthDisplay(p.periodKey) : formatWeekKeyZh(p.periodKey)}
                    </th>
                  ))}
                  <th style={{ padding: "9px 12px", textAlign: "center", fontWeight: "700", color: "#15803d", borderBottom: "0.5px solid #e2e8f0", whiteSpace: "nowrap", fontSize: "11px", background: "#f0fdf4", borderLeft: "0.5px solid #e2e8f0" }}>平均</th>
                </tr>
              </thead>
              <tbody>
                {activeAgents.map((name, ri) => {
                  const clr = agentColorMap[name];
                  const agentShift = periodList.map(p => (p.agents || []).find(a => a.name === name)?.shift).find(Boolean) || "";
                  const sc = SHIFT_STYLE[agentShift] || { bg: "#f1f5f9", tc: "#475569" };

                  const agentVals = periodList.map(p => getVal(p, name)).filter(v => v != null);
                  const agentAvg = agentVals.length ? agentVals.reduce((a, b) => a + b, 0) / agentVals.length : null;

                  const pctColor = (v) => {
                    if (v == null) return "#94a3b8";
                    const n = isPct ? Number(v) : isHours ? Number(v) / 3600 : Number(v);
                    if (isPct) { if (n >= 95) return "#15803d"; if (n >= 90) return "#1d4ed8"; if (n >= 85) return "#d97706"; return "#dc2626"; }
                    return "#475569";
                  };

                  return (
                    <tr key={name} style={{ background: ri % 2 === 0 ? "#fff" : "#fafafa" }}
                      onMouseEnter={e => e.currentTarget.style.background = "#f0f9ff"}
                      onMouseLeave={e => e.currentTarget.style.background = ri % 2 === 0 ? "#fff" : "#fafafa"}>
                      <td style={{ padding: "9px 14px", fontWeight: "500", whiteSpace: "nowrap", borderBottom: "0.5px solid #f8fafc", color: "#1e293b" }}>
                        <span style={{ display: "inline-flex", alignItems: "center", gap: "6px" }}>
                          <span style={{ width: "7px", height: "7px", borderRadius: "50%", background: clr?.color || "#888", flexShrink: 0 }}></span>
                          {name}
                        </span>
                      </td>
                      <td style={{ padding: "9px 10px", textAlign: "center", borderBottom: "0.5px solid #f8fafc" }}>
                        {agentShift && <span style={{ fontSize: "10px", fontWeight: "600", padding: "2px 7px", borderRadius: "9px", background: sc.bg, color: sc.tc, whiteSpace: "nowrap" }}>{agentShift}</span>}
                      </td>
                      {periodList.map((p, pi) => {
                        const v = getVal(p, name);
                        const isLast = pi === periodList.length - 1;
                        return (
                          <td key={p.periodKey} style={{ padding: "9px 12px", textAlign: "center", borderBottom: "0.5px solid #f8fafc", fontVariantNumeric: "tabular-nums", background: isLast ? "#f0f9ff" : "inherit" }}>
                            {v == null ? (
                              <span style={{ color: "#cbd5e1" }}>—</span>
                            ) : isLast ? (
                              <span style={{ fontSize: "12px", fontWeight: "600", color: clr?.tc, background: clr?.bg, padding: "3px 8px", borderRadius: "5px" }}>{fmt(v)}</span>
                            ) : (
                              <span style={{ color: pctColor(v), fontWeight: isPct ? "500" : "400" }}>{fmt(v)}</span>
                            )}
                          </td>
                        );
                      })}
                      <td style={{ padding: "9px 12px", textAlign: "center", borderBottom: "0.5px solid #f8fafc", fontVariantNumeric: "tabular-nums", background: "#f0fdf4", borderLeft: "0.5px solid #e2e8f0" }}>
                        {agentAvg == null ? (
                          <span style={{ color: "#cbd5e1" }}>—</span>
                        ) : (
                          <span style={{ fontSize: "12px", fontWeight: "600", color: pctColor(agentAvg), background: "#dcfce7", padding: "3px 8px", borderRadius: "5px" }}>{fmt(agentAvg)}</span>
                        )}
                      </td>
                    </tr>
                  );
                })}

                {/* 分隔線 */}
                <tr><td colSpan={periodList.length + 3} style={{ padding: 0, borderTop: "2px solid #e2e8f0" }}></td></tr>

                {/* 全員平均列 */}
                {(() => {
                  const colAvgs = periodList.map(p => {
                    const vals = activeAgents.map(name => getVal(p, name)).filter(v => v != null);
                    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
                  });
                  const agentAvgs = activeAgents.map(name => {
                    const vals = periodList.map(p => getVal(p, name)).filter(v => v != null);
                    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
                  }).filter(v => v != null);
                  const overallAvg = agentAvgs.length ? agentAvgs.reduce((a, b) => a + b, 0) / agentAvgs.length : null;
                  const pctColor = (v) => {
                    if (v == null) return "#94a3b8";
                    if (!isPct) return "#15803d";
                    const n = Number(v);
                    if (n >= 95) return "#15803d"; if (n >= 90) return "#1d4ed8"; if (n >= 85) return "#d97706"; return "#dc2626";
                  };
                  return (
                    <tr style={{ background: "#f0fdf4" }}>
                      <td style={{ padding: "10px 14px", fontWeight: "600", color: "#15803d", whiteSpace: "nowrap", fontSize: "12px" }}>全員平均</td>
                      <td style={{ padding: "10px 10px", textAlign: "center", fontSize: "11px", color: "#94a3b8" }}>—</td>
                      {colAvgs.map((v, pi) => {
                        const isLast = pi === periodList.length - 1;
                        return (
                          <td key={pi} style={{ padding: "10px 12px", textAlign: "center", fontVariantNumeric: "tabular-nums", background: isLast ? "#dcfce7" : "#f0fdf4" }}>
                            {v == null ? <span style={{ color: "#cbd5e1" }}>—</span> : <span style={{ fontWeight: "600", color: pctColor(v) }}>{fmt(v)}</span>}
                          </td>
                        );
                      })}
                      <td style={{ padding: "10px 12px", textAlign: "center", fontVariantNumeric: "tabular-nums", background: "#dcfce7", borderLeft: "0.5px solid #e2e8f0" }}>
                        {overallAvg == null ? <span style={{ color: "#cbd5e1" }}>—</span> : <span style={{ fontWeight: "700", color: pctColor(overallAvg), fontSize: "13px" }}>{fmt(overallAvg)}</span>}
                      </td>
                    </tr>
                  );
                })()}
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  );
}


// ─── APP COMPONENT ────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(!firebaseReady);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loginError, setLoginError] = useState("");
  const [loginLockText, setLoginLockText] = useState(formatLockoutText(getLoginLockState().lockedUntil));

  const [syncStatus, setSyncStatus] = useState(firebaseReady ? "尚未登入" : "目前為本機模式");
  const [activeTab, setActiveTab] = useState("weekly");

  const [shiftRules, setShiftRules] = useState(EMPTY_SHIFT_RULES);
  const [effectiveRules, setEffectiveRules] = useState(EMPTY_EFFECTIVE_RULES);
  const [shiftEditorMonth, setShiftEditorMonth] = useState("default");
  const [shiftMonthInput, setShiftMonthInput] = useState("");
  const [shiftDraft, setShiftDraft] = useState({ "早班": "", "中班": "", "晚班": "" });
  const [effectiveDraft, setEffectiveDraft] = useState({ name: "", start: "", end: "", note: "" });

  const [cloudMasterStore, setCloudMasterStore] = useState(EMPTY_CLOUD_STORE);
  const [cloudIndex, setCloudIndex] = useState([]);
  const [selectedCloudItems, setSelectedCloudItems] = useState([]);

  const [previewRows, setPreviewRows] = useState([]);
  const [previewMeta, setPreviewMeta] = useState(EMPTY_PREVIEW_META);
  const [csvFileName, setCsvFileName] = useState("");
  const [uploadMessage, setUploadMessage] = useState("");
  const [uploadMode, setUploadMode] = useState("auto");
  const [validationReport, setValidationReport] = useState(null);

  const [viewType, setViewType] = useState("weeks");
  const [selectedMetric, setSelectedMetric] = useState("overallVerySatAvg");
  const [selectedTrendAgents, setSelectedTrendAgents] = useState([]);
  const [includeHistoryAgents, setIncludeHistoryAgents] = useState(false);

  const [selectedYears, setSelectedYears] = useState([]);
  const [selectedMonths, setSelectedMonths] = useState([]);
  const [selectedWeeks, setSelectedWeeks] = useState([]);

  const [detailMode, setDetailMode] = useState("weeks");
  const [detailKey, setDetailKey] = useState("");

  const [previewPage, setPreviewPage] = useState(1);
  const [previewPageSize, setPreviewPageSize] = useState(100);
  const [detailPage, setDetailPage] = useState(1);
  const [detailPageSize, setDetailPageSize] = useState(100);
  const [isDragging, setIsDragging] = useState(false);

  const fileInputRef = useRef(null);

  const getActiveUser = useCallback((overrideUser = null) => overrideUser || user || (firebaseReady && auth ? auth.currentUser : null), [user]);

  const getAllAgentsFromRules = useCallback((rules = shiftRules) => {
    const set = new Set();
    Object.values(rules || {}).forEach((group) => { Object.values(group || {}).forEach((names) => (names || []).forEach((n) => set.add(n))); });
    return Array.from(set).sort((a, b) => a.localeCompare(b, "zh-Hant"));
  }, [shiftRules]);

  const getShiftInfoFromRules = useCallback((rules, agentName, monthKey, existingShift = "") => {
    const activeRules = rules || EMPTY_SHIFT_RULES;
    const normalizedMonth = normalizeMonthKey(monthKey);
    const specialShift = getSpecialShiftOverride(agentName, normalizedMonth);
    if (specialShift) return { shift: specialShift, source: "專案特殊規則" };
    const monthRules = activeRules[normalizedMonth];
    if (monthRules) { for (const [shift, names] of Object.entries(monthRules)) { if ((names || []).includes(agentName)) return { shift, source: "月份班表" }; } }
    const defaultRules = activeRules.default || EMPTY_SHIFT_RULES.default;
    for (const [shift, names] of Object.entries(defaultRules)) { if ((names || []).includes(agentName)) return { shift, source: "default 班表" }; }
    if (existingShift) return { shift: existingShift, source: "資料原始班別" };
    return { shift: "", source: "未設定" };
  }, []);

  const getShiftInfoByMonth = useCallback((agentName, monthKey, existingShift = "") => getShiftInfoFromRules(shiftRules, agentName, monthKey, existingShift), [getShiftInfoFromRules, shiftRules]);

  const saveShiftRules = async (rules) => {
    setShiftRules(rules);
    localStorage.setItem("weekly_call_project_shift_rules", JSON.stringify(rules));
    if (firebaseReady && user && db) await db.collection("weekly_call_project").doc("shift_rules").set({ rules }, { merge: true });
    setSyncStatus("☁️ 班表已同步 ✓");
  };

  const saveEffectiveRules = async (rules) => {
    setEffectiveRules(rules);
    localStorage.setItem("weekly_call_project_effective_rules", JSON.stringify(rules));
    if (firebaseReady && user && db) await db.collection("weekly_call_project").doc("effective_rules").set({ rules }, { merge: true });
    setSyncStatus("☁️ 人員有效期間已同步 ✓");
    await loadCloudBundle({ autoPreview: false, effectiveRulesOverride: rules });
  };

  const buildAgentStats = useCallback((rows, periodMonthKey = "", rulesOverride = null, effectiveOverride = null, periodKey = "", periodType = "weeks", forceIncludeHistory = false) => {
    const activeRules = rulesOverride || shiftRules;
    const activeEffective = effectiveOverride || effectiveRules;
    const agentBase = {};
    const shouldSeedAgent = (name) => forceIncludeHistory ? isAgentEffectiveForPeriod(name, periodKey, periodType, activeEffective) : true;
    getAllAgentsFromRules(activeRules).forEach((name) => {
      if (!periodKey || shouldSeedAgent(name)) {
        agentBase[name] = { name, shift: getShiftInfoFromRules(activeRules, name, periodMonthKey).shift, totalCalls: 0, q1Answered: 0, q1VerySatisfied: 0, q1Ok: 0, q1VeryUnsatisfied: 0, q2Answered: 0, q2VerySatisfied: 0, q2Ok: 0, q2VeryUnsatisfied: 0, lines: { "GT專線": 0, "儲值專線": 0, "GT+儲值專線": 0, "滿貫專線": 0, "金好運專線": 0 } };
      }
    });
    rows.forEach((d) => {
      if (!d.agent) return;
      if (!isAgentEffectiveForRow(d.agent, d, activeEffective)) return;
      if (!agentBase[d.agent]) {
        agentBase[d.agent] = { name: d.agent, shift: d.shift || getShiftInfoFromRules(activeRules, d.agent, d.monthKey).shift, totalCalls: 0, q1Answered: 0, q1VerySatisfied: 0, q1Ok: 0, q1VeryUnsatisfied: 0, q2Answered: 0, q2VerySatisfied: 0, q2Ok: 0, q2VeryUnsatisfied: 0, lines: { "GT專線": 0, "儲值專線": 0, "GT+儲值專線": 0, "滿貫專線": 0, "金好運專線": 0 } };
      }
      const a = agentBase[d.agent];
      a.shift = d.shift || a.shift;
      a.totalCalls += 1;
      if (VALID_SURVEY.includes(d.q1)) { a.q1Answered += 1; if (d.q1 === "非常滿意") a.q1VerySatisfied += 1; if (d.q1 === "尚可") a.q1Ok += 1; if (d.q1 === "非常不滿意") a.q1VeryUnsatisfied += 1; }
      if (VALID_SURVEY.includes(d.q2)) { a.q2Answered += 1; if (d.q2 === "非常滿意") a.q2VerySatisfied += 1; if (d.q2 === "尚可") a.q2Ok += 1; if (d.q2 === "非常不滿意") a.q2VeryUnsatisfied += 1; }
      const sec = Number(d.speakDuration || d.duration || 0);
      if ((d.line || "").includes("GT")) { a.lines["GT專線"] += sec; a.lines["GT+儲值專線"] += sec; }
      if ((d.line || "").includes("儲值")) { a.lines["儲值專線"] += sec; a.lines["GT+儲值專線"] += sec; }
      if ((d.line || "").includes("滿貫")) a.lines["滿貫專線"] += sec;
      if ((d.line || "").includes("金好運")) a.lines["金好運專線"] += sec;
    });
    return Object.values(agentBase).map((a) => {
      const q1VerySatRate = a.q1Answered ? (a.q1VerySatisfied / a.q1Answered) * 100 : 0;
      const q1OkRate = a.q1Answered ? (a.q1Ok / a.q1Answered) * 100 : 0;
      const q1VeryUnsatRate = a.q1Answered ? (a.q1VeryUnsatisfied / a.q1Answered) * 100 : 0;
      const q1SurRate = a.totalCalls ? (a.q1Answered / a.totalCalls) * 100 : 0;
      const q1UnansweredRate = a.totalCalls ? ((a.totalCalls - a.q1Answered) / a.totalCalls) * 100 : 0;
      const q2VerySatRate = a.q2Answered ? (a.q2VerySatisfied / a.q2Answered) * 100 : 0;
      const q2OkRate = a.q2Answered ? (a.q2Ok / a.q2Answered) * 100 : 0;
      const q2VeryUnsatRate = a.q2Answered ? (a.q2VeryUnsatisfied / a.q2Answered) * 100 : 0;
      const q2SurRate = a.totalCalls ? (a.q2Answered / a.totalCalls) * 100 : 0;
      const q2UnansweredRate = a.totalCalls ? ((a.totalCalls - a.q2Answered) / a.totalCalls) * 100 : 0;
      return { ...a, q1SurRate, q1UnansweredRate, q1VerySatRate, q1OkRate, q1VeryUnsatRate, q2SurRate, q2UnansweredRate, q2VerySatRate, q2OkRate, q2VeryUnsatRate, overallVerySatAvg: (q1VerySatRate + q2VerySatRate) / 2, overallOkAvg: (q1OkRate + q2OkRate) / 2, overallVeryUnsatAvg: (q1VeryUnsatRate + q2VeryUnsatRate) / 2, overallSurAvg: (q1SurRate + q2SurRate) / 2, overallUnansweredAvg: (q1UnansweredRate + q2UnansweredRate) / 2 };
    });
  }, [shiftRules, effectiveRules, getAllAgentsFromRules, getShiftInfoFromRules]);

  const buildPeriodSummary = useCallback((rows, periodKey, periodLabel, extra = {}, rulesOverride = null, effectiveOverride = null, periodType = "weeks") => {
    const activeEffective = effectiveOverride || effectiveRules;
    const filteredRows = (rows || []).filter((r) => isAgentEffectiveForRow(r.agent, r, activeEffective));
    const periodMonthKey = filteredRows[0]?.monthKey || extra.month || "";
    const agents = buildAgentStats(filteredRows, periodMonthKey, rulesOverride, activeEffective, periodKey, periodType);
    const lineTotals = { "GT專線": 0, "儲值專線": 0, "GT+儲值專線": 0, "滿貫專線": 0, "金好運專線": 0 };
    let verySatTotal = 0, okTotal = 0, veryUnsatTotal = 0, surTotal = 0, unansweredTotal = 0, countSat = 0, countSur = 0, teamTotalCalls = 0;
    agents.forEach((a) => {
      teamTotalCalls += a.totalCalls;
      Object.keys(lineTotals).forEach((k) => { lineTotals[k] += a.lines[k]; });
      if (a.totalCalls > 0) { verySatTotal += a.overallVerySatAvg; okTotal += a.overallOkAvg; veryUnsatTotal += a.overallVeryUnsatAvg; surTotal += a.overallSurAvg; unansweredTotal += a.overallUnansweredAvg; countSat += 1; countSur += 1; }
    });
    return { periodKey, periodLabel, agents, teamTotalCalls, teamLineTime: lineTotals, overallVerySatAvg: countSat ? verySatTotal / countSat : 0, overallOkAvg: countSat ? okTotal / countSat : 0, overallVeryUnsatAvg: countSat ? veryUnsatTotal / countSat : 0, overallSurAvg: countSur ? surTotal / countSur : 0, overallUnansweredAvg: countSur ? unansweredTotal / countSur : 0, ...extra };
  }, [buildAgentStats, effectiveRules]);

  const fetchRowsFromReportDoc = useCallback(async (itemOrDoc) => {
    const item = typeof itemOrDoc.data === "function" ? { id: itemOrDoc.id, ...itemOrDoc.data() } : itemOrDoc;
    if (!item) return [];
    if (Array.isArray(item.rows) && item.rows.length) return item.rows;
    if (item.rowStorage === "chunks") {
      const chunksSnap = await db.collection("weekly_call_project_reports").doc(item.id).collection("rows_chunks").orderBy("chunkIndex").get();
      let rows = [];
      chunksSnap.forEach((doc) => { const data = doc.data() || {}; if (Array.isArray(data.rows)) rows = rows.concat(data.rows); });
      return rows;
    }
    return [];
  }, []);

  const loadCloudBundle = async (opts = { autoPreview: true }) => {
    const activeUser = getActiveUser(opts.userOverride || null);
    if (!firebaseReady || !db) { setSyncStatus("目前為本機模式"); return; }
    if (!activeUser) { setSyncStatus("尚未登入"); return; }
    const autoPreview = opts.autoPreview !== false;
    const activeShiftRules = opts.shiftRulesOverride || shiftRules;
    const activeEffective = opts.effectiveRulesOverride || effectiveRules;
    try {
      setSyncStatus(`登入成功，雲端資料讀取中... ${activeUser.email || ""}`);
      const reportsSnap = await db.collection("weekly_call_project_reports").get();
      const rawItems = reportsSnap.docs.map((doc) => ({ id: doc.id, ...doc.data() })).filter((item) => !item.deleted);
      const reportRowsMap = new Map();
      const rowsResults = await Promise.all(rawItems.map((item) => fetchRowsFromReportDoc(item)));
      let allRows = [];
      rawItems.forEach((item, index) => { const rows = rowsResults[index] || []; reportRowsMap.set(item.id, rows); allRows = allRows.concat(rows); });
      const items = rawItems.map((item) => ({ ...item, __sortValue: Number(item.createdAtMillis || item.createdAt?.seconds || 0) })).sort((a, b) => (b.__sortValue || 0) - (a.__sortValue || 0));
      setCloudIndex(items);
      allRows = dedupeRows(allRows.map((r) => { const n = normalizeStoredRow(r); const si = getShiftInfoFromRules(activeShiftRules, n.agent, n.monthKey, n.shift); return { ...n, shift: si.shift, shiftSource: si.source }; })).filter((r) => isAgentEffectiveForRow(r.agent, r, activeEffective)).sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
      const weeks = {}, months = {}, years = {}, detailByWeek = {}, weekGroups = {}, monthGroups = {}, yearGroups = {};
      allRows.forEach((row) => {
        if (!row.weekKey || !row.monthKey || !row.yearKey) return;
        if (!weekGroups[row.weekKey]) weekGroups[row.weekKey] = [];
        if (!monthGroups[row.monthKey]) monthGroups[row.monthKey] = [];
        if (!yearGroups[row.yearKey]) yearGroups[row.yearKey] = [];
        weekGroups[row.weekKey].push(row); monthGroups[row.monthKey].push(row); yearGroups[row.yearKey].push(row);
      });
      Object.entries(weekGroups).forEach(([key, rows]) => {
        const first = rows[0];
        weeks[key] = buildPeriodSummary(rows, key, first.weekLabel, { year: first.yearKey, month: first.monthKey, weekStart: first.weekStart, weekEnd: first.weekEnd }, activeShiftRules, activeEffective, "weeks");
        detailByWeek[key] = { weekKey: key, weekLabel: first.weekLabel, rows: rows.map((r) => ({ ...r })) };
      });
      Object.entries(monthGroups).forEach(([key, rows]) => { const first = rows[0]; months[key] = buildPeriodSummary(rows, key, key, { year: first.yearKey, month: key }, activeShiftRules, activeEffective, "months"); });
