const SECURITY_CONFIG = {
  maxLoginFailures: 5,
  lockoutMinutes: 15,
  sessionTimeoutMinutes: 30
};
const LOGIN_LOCK_KEY = "weekly_call_project_login_lock";
const SESSION_TIMEOUT_MS = SECURITY_CONFIG.sessionTimeoutMinutes * 60 * 1000;

const getLoginLockState = () => {
  try {
    const raw = localStorage.getItem(LOGIN_LOCK_KEY);
    if (!raw) return { failures: 0, lockedUntil: 0 };
    const state = JSON.parse(raw);
    if (Number(state.lockedUntil || 0) && Date.now() < Number(state.lockedUntil)) return state;
    if (Number(state.lockedUntil || 0) && Date.now() >= Number(state.lockedUntil)) {
      localStorage.removeItem(LOGIN_LOCK_KEY);
      return { failures: 0, lockedUntil: 0 };
    }
    return { failures: Number(state.failures || 0), lockedUntil: 0 };
  } catch (e) {
    return { failures: 0, lockedUntil: 0 };
  }
};

const recordLoginFailure = () => {
  const current = getLoginLockState();
  const failures = Number(current.failures || 0) + 1;
  const lockedUntil = failures >= SECURITY_CONFIG.maxLoginFailures ? Date.now() + SECURITY_CONFIG.lockoutMinutes * 60 * 1000 : 0;
  const next = { failures, lockedUntil };
  localStorage.setItem(LOGIN_LOCK_KEY, JSON.stringify(next));
  return next;
};

const clearLoginFailures = () => {
  try { localStorage.removeItem(LOGIN_LOCK_KEY); } catch (e) {}
};

const toDate = (dateStr, timeStr = "00:00:00") => {
  if (!dateStr) return null;
  const safeDate = String(dateStr).replace(/\//g, "-");
  const safeTime = timeStr || "00:00:00";
  const dt = new Date(`${safeDate}T${safeTime.length === 5 ? safeTime + ":00" : safeTime}`);
  return Number.isNaN(dt.getTime()) ? null : dt;
};

const getWeekInfo = (dateStr, timeStr = "00:00:00") => {
  const dt = toDate(dateStr, timeStr);
  if (!dt) return null;
  const clone = new Date(dt);
  clone.setHours(0, 0, 0, 0);
  const day = clone.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;
  const monday = new Date(clone);
  monday.setDate(clone.getDate() + diffToMonday);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const firstThursday = new Date(monday);
  firstThursday.setDate(monday.getDate() + 3);
  const weekYear = firstThursday.getFullYear();
  const jan4 = new Date(weekYear, 0, 4);
  const jan4Day = jan4.getDay() || 7;
  const firstWeekMonday = new Date(jan4);
  firstWeekMonday.setDate(jan4.getDate() - jan4Day + 1);
  const weekNo = Math.floor((monday - firstWeekMonday) / 604800000) + 1;
  const mondayLabel = `${monday.getFullYear()}/${monday.getMonth() + 1}/${monday.getDate()}`;
  const sundayLabel = `${sunday.getFullYear()}/${sunday.getMonth() + 1}/${sunday.getDate()}`;
  return {
    weekKey: `${weekYear}-W${String(weekNo).padStart(2, "0")}`,
    weekLabel: `${mondayLabel} ~ ${sundayLabel}`,
    monday: formatDateKey(monday),
    sunday: formatDateKey(sunday)
  };
};

const getCalendarYearKey = (dateStr) => {

  const m = safe.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);

};

const getCalendarMonthKey = (dateStr) => {
  if (!dateStr) return "";
  const safe = String(dateStr).replace(/\//g, "-");
  const m = safe.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  return m ? `${m[1]}-${String(m[2]).padStart(2, "0")}` : "";
};

const parseDuration = (val) => {
  if (val == null || val === "") return 0;
  const s = String(val).trim();
  if (/^\d+(\.\d+)?$/.test(s)) return Math.round(Number(s));
  const hms = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (hms) return Number(hms[1]) * 3600 + Number(hms[2]) * 60 + Number(hms[3] || 0);
  const zh = s.match(/(?:(\d+)\s*小時)?\s*(?:(\d+)\s*分)?\s*(?:(\d+)\s*秒)?/);
  if (zh && (zh[1] || zh[2] || zh[3])) return Number(zh[1] || 0) * 3600 + Number(zh[2] || 0) * 60 + Number(zh[3] || 0);
  return 0;
};

const normalizeHeaderText = (s) => String(s || "").trim().replace(/\s+/g, "").replace(/[：:]/g, "");
const parseSimpleCsvLine = (line) => {
  const result = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === "," && !inQuotes) {
      result.push(cur); cur = "";
    } else cur += ch;
  }
  result.push(cur);
  return result;
};

const parseSimpleCsv = (text) => {
  const lines = String(text || "").replace(/^\uFEFF/, "").split(/\r?\n/).filter(Boolean);
  if (!lines.length) return [];
  const headers = parseSimpleCsvLine(lines[0]);
  return lines.slice(1).map(line => {
    const cols = parseSimpleCsvLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = cols[i] ?? ""; });
    return obj;
  });
};

const parseDateTimeValue = (value) => {
  if (value == null || value === "") return { date: "", time: "" };
  if (value instanceof Date && !Number.isNaN(value.getTime())) {
    const y = value.getFullYear();
    const m = String(value.getMonth() + 1).padStart(2, "0");
    const d = String(value.getDate()).padStart(2, "0");
    const hh = String(value.getHours()).padStart(2, "0");
    const mm = String(value.getMinutes()).padStart(2, "0");
    const ss = String(value.getSeconds()).padStart(2, "0");
    return { date: `${y}-${m}-${d}`, time: `${hh}:${mm}:${ss}` };
  }
  if (typeof value === "number" && window.XLSX && window.XLSX.SSF) {
    try {
      const parsed = window.XLSX.SSF.parse_date_code(value);
      if (parsed) {
        const y = parsed.y;
        const m = String(parsed.m).padStart(2, "0");
        const d = String(parsed.d).padStart(2, "0");
        const hh = String(parsed.H || 0).padStart(2, "0");
        const mm = String(parsed.M || 0).padStart(2, "0");
        const ss = String(Math.floor(parsed.S || 0)).padStart(2, "0");
        return { date: `${y}-${m}-${d}`, time: `${hh}:${mm}:${ss}` };
      }
    } catch (e) {}
  }
  const raw = String(value || "").trim();
  if (!raw) return { date: "", time: "" };
  const normalized = raw.replace(/-/g, "/");
  const parts = normalized.split(/\s+/);
  let dateStr = parts[0];
  let timeStr = parts.length >= 2 ? parts[1].slice(0, 8) : "";
  const dParts = dateStr.split("/");
  if (dParts.length === 3) dateStr = `${dParts[0]}-${String(dParts[1]).padStart(2, "0")}-${String(dParts[2]).padStart(2, "0")}`;
  else dateStr = dateStr.replace(/\//g, "-");
  if (timeStr && timeStr.length === 5) timeStr += ":00";
  return { date: dateStr, time: timeStr };
};

const normalizeLineName = (value) => {
  const raw = String(value || "").trim();
  if (!raw) return "";
  const v = raw.replace(/^\d+[_-]?/, "");
  if (v.includes("GT")) return "GT專線";
  if (v.includes("儲值")) return "儲值專線";
  if (v.includes("滿貫")) return "滿貫專線";
  if (v.includes("金好運")) return "金好運專線";
  return v.endsWith("專線") ? v : `${v}專線`;
};

const normalizeSurveyAnswer = (value) => {
  const t = String(value || "").trim();
  return ["非常滿意", "尚可", "非常不滿意"].includes(t) ? t : "未回答";
};

const extractSatisfaction = (tagText) => {
  const text = String(tagText || "").trim();
  let q1 = "";
  let q2 = "";
  if (text) {
    const parts = text.split(/[;,，]/).map(v => v.trim()).filter(Boolean);
    for (const p of parts) {
      const m1 = p.match(/^問題?1(.+)$/);
      const m2 = p.match(/^問題?2(.+)$/);
      if (m1) q1 = m1[1].trim();
      if (m2) q2 = m2[1].trim();
    }
  }
  return { q1: normalizeSurveyAnswer(q1), q2: normalizeSurveyAnswer(q2) };
};

const makeRowUniqueKey = (row) => [
  String(row.id || "").trim(),
  String(row.agent || "").trim(),
  String(row.date || "").trim(),
  String(row.time || "").trim()
].join("||");

const dedupeRows = (rows = []) => {
  const map = new Map();
  rows.forEach(row => {
    const key = makeRowUniqueKey(row);
    if (!map.has(key)) map.set(key, row);
  });
  return Array.from(map.values());
};

const getDuplicateCount = (rows = []) => rows.length - dedupeRows(rows).length;

const readSpreadsheetRows = async (file) => {
  const ext = (file.name.split(".").pop() || "").toLowerCase();
  if (ext === "csv") return parseSimpleCsv(await file.text());
  if (ext === "xlsx" || ext === "xls") {
    const arrayBuffer = await file.arrayBuffer();
    const workbook = window.XLSX.read(arrayBuffer, { type: "array", cellDates: true });
    const firstSheetName = workbook.SheetNames[0];
    if (!firstSheetName) return [];
    const sheet = workbook.Sheets[firstSheetName];
    return window.XLSX.utils.sheet_to_json(sheet, { defval: "", raw: true });
  }
  throw new Error("不支援的檔案格式");
};

const buildSummaryRowsFromSource = (rows = [], type = "handle") => {
  const map = new Map();
  const durationKey = type === "handle" ? "handleDuration" : "speakDuration";
  rows.forEach(row => {
    const agent = row.agent || "";
    if (!agent) return;
    if (!map.has(agent)) {
      map.set(agent, {
        "客服名稱": agent,
        "班別": row.shift || "",
        "GT專線": 0,
        "儲值專線": 0,
        "GT+儲值專線": 0,
        "滿貫專線": 0,
        "金好運專線": 0,
        "總計": 0
      });
    }
    const target = map.get(agent);
    target["班別"] = target["班別"] || row.shift || "";
    const sec = Number(row[durationKey] || 0);
    if ((row.line || "").includes("GT")) {
      target["GT專線"] += sec;
      target["GT+儲值專線"] += sec;
    }
    if ((row.line || "").includes("儲值")) {
      target["儲值專線"] += sec;
      target["GT+儲值專線"] += sec;
    }
    if ((row.line || "").includes("滿貫")) target["滿貫專線"] += sec;
    if ((row.line || "").includes("金好運")) target["金好運專線"] += sec;
    target["總計"] += sec;
  });
  return Array.from(map.values()).sort((a, b) => a["客服名稱"].localeCompare(b["客服名稱"], "zh-Hant"));
};

    const target = map.get(agent);
    target["班別"] = target["班別"] || row.shift || "";
    target["總通話數"] += 1;
    if (row.q1 === "非常滿意") target["Q1非常滿意"] += 1;
    if (row.q1 === "尚可") target["Q1尚可"] += 1;
    if (row.q1 === "非常不滿意") target["Q1非常不滿意"] += 1;
    if (row.q2 === "非常滿意") target["Q2非常滿意"] += 1;
    if (row.q2 === "尚可") target["Q2尚可"] += 1;
    if (row.q2 === "非常不滿意") target["Q2非常不滿意"] += 1;
  });
  return Array.from(map.values()).sort((a, b) => a["客服名稱"].localeCompare(b["客服名稱"], "zh-Hant")).map(row => {
    const q1Answered = row["Q1非常滿意"] + row["Q1尚可"] + row["Q1非常不滿意"];
    const q2Answered = row["Q2非常滿意"] + row["Q2尚可"] + row["Q2非常不滿意"];
    const q1Sur = row["總通話數"] ? q1Answered / row["總通話數"] : 0;
    const q1UnansweredRate = row["總通話數"] ? (row["總通話數"] - q1Answered) / row["總通話數"] : 0;
    const q2Sur = row["總通話數"] ? q2Answered / row["總通話數"] : 0;
    const q2UnansweredRate = row["總通話數"] ? (row["總通話數"] - q2Answered) / row["總通話數"] : 0;
    const q1VerySatRate = q1Answered ? row["Q1非常滿意"] / q1Answered : 0;
    const q1OkRate = q1Answered ? row["Q1尚可"] / q1Answered : 0;
    const q1VeryUnsatRate = q1Answered ? row["Q1非常不滿意"] / q1Answered : 0;
    const q2VerySatRate = q2Answered ? row["Q2非常滿意"] / q2Answered : 0;
    const q2OkRate = q2Answered ? row["Q2尚可"] / q2Answered : 0;
    const q2VeryUnsatRate = q2Answered ? row["Q2非常不滿意"] / q2Answered : 0;
    return {
      ...row,
      "人員非常滿意度(Q1)": q1VerySatRate,
      "問題非常滿意度(Q2)": q2VerySatRate,
      "整體非常滿意度平均": (q1VerySatRate + q2VerySatRate) / 2,
      "人員調查率(Q1)": q1Sur,
      "Q1未回答率": q1UnansweredRate,
      "Q1非常滿意率": q1VerySatRate,
      "Q1尚可率": q1OkRate,
      "Q1非常不滿意率": q1VeryUnsatRate,
      "問題調查率(Q2)": q2Sur,
      "Q2未回答率": q2UnansweredRate,
      "Q2非常滿意率": q2VerySatRate,
      "Q2尚可率": q2OkRate,
      "Q2非常不滿意率": q2VeryUnsatRate,
      "整體調查率平均": (q1Sur + q2Sur) / 2,
      "整體未回答率平均": (q1UnansweredRate + q2UnansweredRate) / 2,
      "整體非常滿意率": (q1VerySatRate + q2VerySatRate) / 2,
      "整體尚可率": (q1OkRate + q2OkRate) / 2,
      "整體非常不滿意率": (q1VeryUnsatRate + q2VeryUnsatRate) / 2
    };
  });
};
const buildRankingRows = (analysisRows = []) => {
  const rankMetric = (metricKey) => {
    const sorted = analysisRows
      .filter(r => Number(r["總通話數"] || 0) > 0)
      .slice()
      .sort((a, b) => Number(b[metricKey] || 0) - Number(a[metricKey] || 0) || a["客服名稱"].localeCompare(b["客服名稱"], "zh-Hant"));
    let lastValue = null;
    let lastRank = 0;
    return sorted.map((row, index) => {
      const value = Number(row[metricKey] || 0);
      const rank = lastValue !== null && Math.abs(lastValue - value) < 1e-12 ? lastRank : index + 1;
      lastValue = value;
      lastRank = rank;
      return { 排名: rank, 客服名稱: row["客服名稱"], 數值: value };
    });
  };
  return {
    q1Sat: rankMetric("人員非常滿意度(Q1)"),
    q1Sur: rankMetric("人員調查率(Q1)"),
    q2Sat: rankMetric("問題非常滿意度(Q2)"),
    q2Sur: rankMetric("問題調查率(Q2)"),
    overallSat: rankMetric("整體非常滿意度平均"),
    overallSur: rankMetric("整體調查率平均")
  };
};

const getRowDateSortValue = (row = {}) => {
  const date = String(row.date || row["來電日期"] || "").trim();
  const time = String(row.time || row["來電時間"] || "00:00:00").trim() || "00:00:00";
  const dt = toDate(date, time);
  return dt ? dt.getTime() : 0;
};

const getMonthEndMillis = (monthKey = "") => {
  const m = String(monthKey || "").match(/^(\d{4})-(\d{2})$/);
  if (!m) return 0;
  return new Date(Number(m[1]), Number(m[2]), 0, 23, 59, 59, 999).getTime();
};

const getIsoWeekStartMillis = (weekKey = "") => {
  const m = String(weekKey || "").match(/^(\d{4})-W(\d{2})$/);
  if (!m) return 0;
  const year = Number(m[1]);
  const week = Number(m[2]);
  const jan4 = new Date(year, 0, 4);
  const jan4Day = jan4.getDay() || 7;
  const firstWeekMonday = new Date(jan4);
  firstWeekMonday.setDate(jan4.getDate() - jan4Day + 1);
  firstWeekMonday.setDate(firstWeekMonday.getDate() + (week - 1) * 7);
  return firstWeekMonday.getTime();
};

const getReportContentSortValue = (item = {}, rows = []) => {
  let maxTime = 0;
  (rows || []).forEach(row => {
    const t = getRowDateSortValue(row);
    if (t > maxTime) maxTime = t;
  });
  if (maxTime > 0) return maxTime;

  const monthKeys = Array.isArray(item.monthKeys) ? item.monthKeys.filter(Boolean) : [];
  if (monthKeys.length) return getMonthEndMillis(monthKeys.slice().sort().at(-1));

  const weekKeys = Array.isArray(item.weekKeys) ? item.weekKeys.filter(Boolean) : [];
  if (weekKeys.length) return getIsoWeekStartMillis(weekKeys.slice().sort().at(-1));

  const yearKeys = Array.isArray(item.yearKeys) ? item.yearKeys.filter(Boolean) : [];
  if (yearKeys.length) return new Date(Number(yearKeys.slice().sort().at(-1)), 11, 31, 23, 59, 59, 999).getTime();

  const createdAtMillis = Number(item.createdAtMillis || 0);
  if (createdAtMillis > 0) return createdAtMillis;
  return Number(item.createdAt?.seconds || 0) * 1000;
};

const normalizeStoredRow = (row = {}) => {
  const baseDate = row.date || row["來電日期"] || "";
  const baseTime = row.time || row["來電時間"] || "00:00:00";
  const info = getWeekInfo(baseDate, baseTime || "00:00:00");
  const monthKey = getCalendarMonthKey(baseDate) || normalizeMonthKey(row.monthKey || "");
  const yearKey = getCalendarYearKey(baseDate) || String(row.yearKey || "");
  const handleDuration = Number(row.handleDuration || row["總處理秒數"] || 0);
  const speakDuration = Number(row.speakDuration || row["總發話秒數"] || row.duration || 0);
  return {
    agent: row.agent || row["客服名稱"] || "",
    shift: row.shift || row["班別"] || "",
    shiftSource: row.shiftSource || row["班別來源"] || "",
    date: baseDate,

    monthKey,

    q2: normalizeSurveyAnswer(row.q2 || row["滿意度問題2"]),
    id: row.id || row["對話ID"] || "",

  };
};

const paginateRows = (rows = [], page = 1, pageSize = 100) => {
  const safePageSize = Number(pageSize || 100);
  const totalPages = Math.max(1, Math.ceil((rows || []).length / safePageSize));
  const safePage = Math.min(Math.max(Number(page || 1), 1), totalPages);
  const start = (safePage - 1) * safePageSize;
  return { rows: rows.slice(start, start + safePageSize), safePage, totalPages, start };
};

function PaginationControls({ total = 0, page = 1, pageSize = 100, onPageChange, onPageSizeChange }) {
  const totalPages = Math.max(1, Math.ceil(Number(total || 0) / Number(pageSize || 100)));
  const safePage = Math.min(Math.max(Number(page || 1), 1), totalPages);
  const start = total ? (safePage - 1) * Number(pageSize) + 1 : 0;
  const end = Math.min(total, safePage * Number(pageSize));
  return (
    <div className="flex flex-wrap items-center justify-between gap-3 px-4 py-3 bg-slate-50 border-x border-b rounded-b-3xl text-sm font-bold text-slate-600">
      <div>顯示 {start} - {end} / 共 {total} 筆</div>
      <div className="flex items-center gap-2 flex-wrap">
        <span>每頁</span>
        <select value={pageSize} onChange={(e)=>{ onPageSizeChange(Number(e.target.value)); onPageChange(1); }} className="border border-slate-300 rounded-xl px-3 py-2 bg-white font-bold">
          {[50,100,200,500,1000].map(size => <option key={size} value={size}>{size}</option>)}
        </select>
        <button type="button" disabled={safePage <= 1} onClick={()=>onPageChange(1)} className="px-3 py-2 rounded-xl bg-white border disabled:opacity-40">首頁</button>
        <button type="button" disabled={safePage <= 1} onClick={()=>onPageChange(safePage - 1)} className="px-3 py-2 rounded-xl bg-white border disabled:opacity-40">上一頁</button>
        <span className="px-2">{safePage} / {totalPages}</span>
        <button type="button" disabled={safePage >= totalPages} onClick={()=>onPageChange(safePage + 1)} className="px-3 py-2 rounded-xl bg-white border disabled:opacity-40">下一頁</button>
        <button type="button" disabled={safePage >= totalPages} onClick={()=>onPageChange(totalPages)} className="px-3 py-2 rounded-xl bg-white border disabled:opacity-40">末頁</button>
      </div>
    </div>
  );
}

function HistoryChart({ type = "line", labels = [], datasets = [], title = "" }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new window.Chart(canvasRef.current, {
      type,
      data: { labels, datasets },
      options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: !!title, text: title }, legend: { display: true } } }
    });
    return () => chartRef.current && chartRef.current.destroy();
  }, [type, labels, datasets, title]);
  return <div className="chart-wrap"><canvas ref={canvasRef}></canvas></div>;
}

    let satTotal = 0, verySatTotal = 0, okTotal = 0, veryUnsatTotal = 0, satCount = 0, surTotal = 0, unansweredTotal = 0, surCount = 0, teamTotalCalls = 0;

        verySatTotal += a.overallVerySatAvg;
        okTotal += a.overallOkAvg;
        veryUnsatTotal += a.overallVeryUnsatAvg;
        satCount++;
      }
      if (a.totalCalls > 0) { surTotal += a.overallSurAvg; unansweredTotal += a.overallUnansweredAvg; surCount++; }
    });
    return {
      periodKey, periodLabel,
      overallSatAvg: satCount ? satTotal / satCount : 0,

      overallOkAvg: satCount ? okTotal / satCount : 0,

  const fetchRowsFromReportDoc = useCallback(async (itemOrDoc) => {

    if (!item) return [];
    if (Array.isArray(item.rows) && item.rows.length) return item.rows;
    if (item.rowStorage === 'chunks') {
      const chunksSnap = await db.collection('weekly_call_project_reports').doc(item.id).collection('rows_chunks').orderBy('chunkIndex').get();
      let rows = [];
      chunksSnap.forEach(doc => {
        const data = doc.data() || {};
        if (Array.isArray(data.rows)) rows = rows.concat(data.rows);
      });
      return rows;
    }
    if (Array.isArray(item.csvResult?.detailRows) && item.csvResult.detailRows.length) return convertDetailRowsToRows(item.csvResult.detailRows);
    return [];
  }, []);


  const loadCloudBundle = async (opts = { autoPreview: true }) => {
    if (!firebaseReady || !user || !db) return;
    const autoPreview = opts.autoPreview !== false;
    const activeShiftRules = opts.shiftRulesOverride || shiftRules;
    const getShiftForLoad = (agentName, monthKey, existingShift = "") => getShiftInfoFromRules(activeShiftRules, agentName, monthKey, existingShift);
    try {

      const rawItems = reportsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(item => !item.deleted);
      const reportRowsMap = new Map();
      const rowsResults = await Promise.all(rawItems.map(item => fetchRowsFromReportDoc(item)));
      let allRows = [];
      rawItems.forEach((item, index) => {
        const rows = rowsResults[index] || [];
        reportRowsMap.set(item.id, rows);
        allRows = allRows.concat(rows);

      const items = rawItems.map(item => ({ ...item, __contentSortValue: getReportContentSortValue(item, reportRowsMap.get(item.id) || []) }));
      items.sort((a, b) => {
        const av = a.__contentSortValue || 0;
        const bv = b.__contentSortValue || 0;
        if (av === bv) return (b.createdAtMillis || b.createdAt?.seconds || 0) - (a.createdAtMillis || a.createdAt?.seconds || 0);
        return bv > av ? 1 : -1;
      });
      setCloudIndex(items);
      allRows = dedupeRows(allRows.map(r => { const n = normalizeStoredRow(r); const si = getShiftForLoad(n.agent, n.monthKey, n.shift); return { ...n, shift: n.shift || si.shift, shiftSource: n.shiftSource || si.source }; }));
      allRows.sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
      const weeks = {}, months = {}, years = {}, detailByWeek = {};
      const weekGroups = {}, monthGroups = {}, yearGroups = {};
      allRows.forEach(row => {
        if (!row.weekKey || !row.monthKey || !row.yearKey) return;
        if (!weekGroups[row.weekKey]) weekGroups[row.weekKey] = [];
        if (!monthGroups[row.monthKey]) monthGroups[row.monthKey] = [];
        if (!yearGroups[row.yearKey]) yearGroups[row.yearKey] = [];
        weekGroups[row.weekKey].push(row);
        monthGroups[row.monthKey].push(row);
        yearGroups[row.yearKey].push(row);
      });
      Object.entries(weekGroups).forEach(([key, rows]) => {
        const first = rows[0];
        weeks[key] = buildPeriodSummary(rows, key, first.weekLabel, { year: first.yearKey, month: first.monthKey, weekStart: first.weekStart, weekEnd: first.weekEnd }, activeShiftRules);
        detailByWeek[key] = { weekKey: key, weekLabel: first.weekLabel, rows: rows.map(r => ({ ...r })) };
      });
      Object.entries(monthGroups).forEach(([key, rows]) => { const first = rows[0]; months[key] = buildPeriodSummary(rows, key, key, { year: first.yearKey, month: key }, activeShiftRules); });
      Object.entries(yearGroups).forEach(([key, rows]) => { years[key] = buildPeriodSummary(rows, key, key, { year: key }, activeShiftRules); });
      const newStore = { rows: allRows, weeks, months, years, detailByWeek };
      setCloudMasterStore(newStore);

      try {
        localStorage.removeItem("weekly_call_project_cloud_master_store");
        localStorage.setItem(
          "weekly_call_project_cloud_master_summary",
          JSON.stringify({
            updatedAt: Date.now(),
            rowCount: allRows.length,
            yearCount: Object.keys(years).length,
            monthCount: Object.keys(months).length,
            weekCount: Object.keys(weeks).length
          })
        );
      } catch (e) {
        console.warn("local summary cache skipped", e);
      }
      if (autoPreview && items.length > 0) {
        const latest = items[0];
        const latestRows = reportRowsMap.get(latest.id) || [];
        const preview = dedupeRows(latestRows.map(r => { const n = normalizeStoredRow(r); const si = getShiftForLoad(n.agent, n.monthKey, n.shift); return { ...n, shift: n.shift || si.shift, shiftSource: n.shiftSource || si.source }; })).sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
        setPreviewRows(preview);
        setCsvFileName(latest.fileName || "雲端資料");
        setCsvResult(makeCsvResultFromPreviewRows(preview, latest.rawCount || latestRows.length));
        setPreviewMeta({

          monthKeys: Array.from(new Set(preview.map(r => r.monthKey).filter(Boolean))).sort(),
          yearKeys: Array.from(new Set(preview.map(r => r.yearKey).filter(Boolean))).sort(),
          sourceCount: 1,

          recordCountAfterDedupe: preview.length
        });
        if (preview.length) setUploadMessage(`已自動載入最新資料檔：${latest.fileName || latest.id}，以檔案內容中的最新日期判定，共 ${preview.length} 筆。`);

  const buildCsvResult = (rawRows) => {
    const detailRows = [];
    const handleMap = new Map();
    const speakMap = new Map();
    const agentSet = new Set();
    const accumulateSummary = (map, agent, shift, line, sec) => {
      if (!map.has(agent)) {
        map.set(agent, { "客服名稱": agent, "班別": shift, "GT專線": 0, "儲值專線": 0, "GT+儲值專線": 0, "滿貫專線": 0, "金好運專線": 0, "總計": 0 });
      }
      const row = map.get(agent);
      row["班別"] = row["班別"] || shift;
      if (line === "GT專線") { row["GT專線"] += sec; row["GT+儲值專線"] += sec; }
      else if (line === "儲值專線") { row["儲值專線"] += sec; row["GT+儲值專線"] += sec; }
      else if (line === "滿貫專線") row["滿貫專線"] += sec;
      else if (line === "金好運專線") row["金好運專線"] += sec;
      row["總計"] += sec;
    };
    for (const row of rawRows) {
      const data = getRowValueByAliases(row);
      const direction = String(data.direction || "").trim();
      const agent = String(data.agent || "").trim();
      if (direction !== "傳入" || !agent) continue;
      const { date, time } = parseDateTimeValue(data.datetime);
      const weekInfo = getWeekInfo(date, time || "00:00:00");
      const monthKey = getCalendarMonthKey(date);
      const shiftInfo = getShiftInfoByMonth(agent, monthKey);
      const shift = shiftInfo.shift;
      const line = normalizeLineName(data.line);
      const sat = extractSatisfaction(data.tags);
      const dialogId = String(data.dialogId || "").trim();
      const handleSec = parseDuration(data.handleTime);
      const speakSec = parseDuration(data.speakTime);
      detailRows.push({
        "客服名稱": agent,
        "班別": shift,
        "班別來源": shiftInfo.source,
        "來電日期": date,
        "來電時間": time,
        "遊戲專線": line,
        "滿意度問題1": sat.q1,
        "滿意度問題2": sat.q2,
        "對話ID": dialogId,
        "總處理秒數": handleSec,
        "總發話秒數": speakSec
      });
      accumulateSummary(handleMap, agent, shift, line, handleSec);
      accumulateSummary(speakMap, agent, shift, line, speakSec);
      agentSet.add(agent);
    }
    detailRows.sort((a, b) => `${a["來電日期"]} ${a["來電時間"]}`.localeCompare(`${b["來電日期"]} ${b["來電時間"]}`));
    return { rawCount: rawRows.length, validCount: detailRows.length, agentCount: agentSet.size, detailRows, handleRows: Array.from(handleMap.values()).sort((a, b) => a["客服名稱"].localeCompare(b["客服名稱"], "zh-Hant")), speakRows: Array.from(speakMap.values()).sort((a, b) => a["客服名稱"].localeCompare(b["客服名稱"], "zh-Hant")) };
  };

  const convertCsvResultToWeeklyRows = (result) => (result.detailRows || []).map(row => {
    const date = row["來電日期"];
    const time = row["來電時間"];
    const weekInfo = getWeekInfo(date, time || "00:00:00");
    const monthKey = getCalendarMonthKey(date);
    const handleDuration = Number(row["總處理秒數"] || 0);
    const speakDuration = Number(row["總發話秒數"] || 0);
    return {
      agent: row["客服名稱"],
      shift: row["班別"] || getShiftByMonth(row["客服名稱"], monthKey),
      shiftSource: row["班別來源"] || getShiftInfoByMonth(row["客服名稱"], monthKey, row["班別"] || "").source,

      weekLabel: weekInfo?.weekLabel || "",
      weekStart: weekInfo?.monday || "",
      weekEnd: weekInfo?.sunday || "",
      line: row["遊戲專線"],

      q2: normalizeSurveyAnswer(row["滿意度問題2"]),

      speakDuration,

    };

  const handleDataUpload = async (file) => {
    if (!file) return;
    try {
      const rows = await readSpreadsheetRows(file);
      const result = buildCsvResult(rows);
      const weeklyRows = convertCsvResultToWeeklyRows(result);
      const weekKeys = Array.from(new Set(weeklyRows.map(r => r.weekKey).filter(Boolean))).sort();
      const monthKeysAll = Array.from(new Set(weeklyRows.map(r => r.monthKey).filter(Boolean))).sort();
      const yearKeysAll = Array.from(new Set(weeklyRows.map(r => r.yearKey).filter(Boolean))).sort();
      const weekCounter = {};
      weeklyRows.forEach(r => { if (r.weekKey) weekCounter[r.weekKey] = (weekCounter[r.weekKey] || 0) + 1; });
      const sortedWeekKeys = Object.keys(weekCounter).sort((a, b) => (weekCounter[b] - weekCounter[a]) || a.localeCompare(b));
      const targetWeekKey = sortedWeekKeys[0] || "";

      let keptRowsRaw = [];
      let mode = uploadMode;
      if (mode === "auto") mode = weekKeys.length <= 1 ? "single_week" : "multi_week";

      if (mode === "single_week") {
        keptRowsRaw = weeklyRows.filter(r => r.weekKey === targetWeekKey);
      } else {
        keptRowsRaw = weeklyRows;
      }

      const fileDuplicateCount = getDuplicateCount(keptRowsRaw);
      const keptRows = dedupeRows(keptRowsRaw).sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
      const keptWeekKeys = Array.from(new Set(keptRows.map(r => r.weekKey).filter(Boolean))).sort();
      const keptMonthKeys = Array.from(new Set(keptRows.map(r => r.monthKey).filter(Boolean))).sort();
      const keptYearKeys = Array.from(new Set(keptRows.map(r => r.yearKey).filter(Boolean))).sort();
      const excludedCount = weeklyRows.length - keptRowsRaw.length;
      const targetWeekLabel = keptRows[0]?.weekLabel || "";
      const modeTitle = mode === "single_week"
        ? `本次上傳單週資料：${formatWeekKeyZh(targetWeekKey || "-")}`
        : `本次上傳整批資料：${keptMonthKeys.join("、") || "多週整合"}`;
      const message = mode === "single_week"
        ? `檔案「${file.name}」上傳完成。${uploadMode === "auto" ? "系統自動判斷為單週資料，" : "目前使用單週模式，"}本次採用 ${formatWeekKeyZh(targetWeekKey || "-")}${targetWeekLabel ? `（${targetWeekLabel.replace(/\s*~\s*/g, "～")}）` : ""}，共保留 ${keptRows.length} 筆，排除 ${excludedCount} 筆非當周資料，檔內重複去除 ${fileDuplicateCount} 筆。`
        : `檔案「${file.name}」上傳完成。${uploadMode === "auto" ? `系統自動判斷為多週/整月資料，偵測到 ${weekKeys.length} 週、${monthKeysAll.length} 個月份，已全部保留。` : `目前使用整批模式，已保留全部 ${weekKeys.length} 週資料。`} 共 ${keptRows.length} 筆，檔內重複去除 ${fileDuplicateCount} 筆。`;

      setCsvFileName(file.name || "");
      setCsvResult(makeCsvResultFromPreviewRows(keptRows, result.rawCount));
      setPreviewRows(keptRows);
      setPreviewMeta({
        mode,
        title: modeTitle,
        weekKeys: keptWeekKeys,
        monthKeys: keptMonthKeys,
        yearKeys: keptYearKeys,
        sourceCount: 1,
        recordCountBeforeDedupe: keptRowsRaw.length,
        recordCountAfterDedupe: keptRows.length
      });
      setUploadMessage(message);
      setActiveTab("weekly");
    } catch (e) {
      console.error(e);
      alert("檔案讀取失敗，請確認格式是否為 csv / xlsx / xls。");
    }
  };

  const saveCurrentUploadToCloud = async () => {
    if (!firebaseReady || !user || !db) return alert("目前未登入，無法同步到雲端。");
    if (!previewRows.length) return alert("目前沒有可同步的資料。");
    if (!window.confirm("是否要將目前資料同步到雲端？")) return;

      const rowChunks = chunkArray(newRows, 300);

      createFormattedSheet("三、總發話時間", SUMMARY_HEADERS, sheet3Data);

      const analysisHeaders = ["客服名稱", "班別", "總通話數", "Q1非常滿意", "Q1尚可", "Q1非常不滿意", "人員調查率(Q1)", "Q1未回答率", "Q1非常滿意率", "Q1尚可率", "Q1非常不滿意率", "Q2非常滿意", "Q2尚可", "Q2非常不滿意", "問題調查率(Q2)", "Q2未回答率", "Q2非常滿意率", "Q2尚可率", "Q2非常不滿意率", "整體調查率平均", "整體未回答率平均", "整體非常滿意率", "整體尚可率", "整體非常不滿意率"];
      const analysisData = analysisRows.map(r => analysisHeaders.map(h => {
        const value = r[h];

        return value;
      }));
      createFormattedSheet("滿意度分析", analysisHeaders, analysisData);

      const rankSheet = workbook.addWorksheet("滿意度排名");

        ["人員非常滿意度(Q1)", ranking.q1Sat],

      const maxLen = Math.max(...rankGroups.map(([, rows]) => rows.length));
      for (let i = 0; i < maxLen; i++) {
        rankSheet.addRow(rankGroups.flatMap(([, rows]) => {
          const r = rows[i] || {};

            r.排名 || "",
            r.客服名稱 || "",

        }));

      for (let r = 3; r <= rankSheet.rowCount; r++) {

          <div className="bg-white rounded-[40px] shadow-sm border p-8 space-y-6">
            <div className="flex flex-wrap gap-4 items-center justify-between">
              <h3 className="text-xl font-black text-slate-800 underline decoration-purple-500 decoration-4 underline-offset-8">趨勢分析（雲端主資料）</h3>
              <div className="flex gap-2 flex-wrap">
                <button onClick={()=>setViewType("years")} className={`px-4 py-2 rounded-2xl font-black ${viewType==="years" ? "bg-purple-600 text-white" : "bg-slate-100 text-slate-600"}`}>年</button>
                <button onClick={()=>setViewType("months")} className={`px-4 py-2 rounded-2xl font-black ${viewType==="months" ? "bg-purple-600 text-white" : "bg-slate-100 text-slate-600"}`}>月</button>
                <button onClick={()=>setViewType("weeks")} className={`px-4 py-2 rounded-2xl font-black ${viewType==="weeks" ? "bg-purple-600 text-white" : "bg-slate-100 text-slate-600"}`}>周</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
              <div className="bg-slate-50 rounded-3xl p-5 border"><div className="font-black text-slate-700 mb-3">比對模式</div><div className="flex gap-2"><button onClick={()=>setTrendCompareMode("single")} className={`px-4 py-2 rounded-2xl font-black ${trendCompareMode==="single" ? "bg-purple-600 text-white" : "bg-white text-slate-600 border"}`}>單人</button><button onClick={()=>setTrendCompareMode("multi")} className={`px-4 py-2 rounded-2xl font-black ${trendCompareMode==="multi" ? "bg-purple-600 text-white" : "bg-white text-slate-600 border"}`}>多人</button></div></div>
              <div className="bg-slate-50 rounded-3xl p-5 border">
                <div className="font-black text-slate-700 mb-3">客服人員</div>
                {trendCompareMode === "single" ? (
                  <select value={selectedAgent} onChange={(e)=>setSelectedAgent(e.target.value)} className="w-full border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-600 bg-white">
                    {availableAgents.map(agent => <option key={agent} value={agent}>{agent}</option>)}
                  </select>
                ) : (
                  <div className="space-y-3">
                    <div className="flex items-center justify-between gap-2 flex-wrap">
                      <div className="text-xs font-black text-slate-400">已選 {selectedTrendAgents.length} / {availableAgents.length} 人</div>
                      <div className="flex gap-2">
                        <button type="button" onClick={()=>setSelectedTrendAgents([...availableAgents])} className="text-xs bg-purple-600 text-white rounded-lg px-3 py-1.5 font-black hover:bg-purple-700">全選</button>
                        <button type="button" onClick={()=>setSelectedTrendAgents([])} className="text-xs bg-white border border-slate-300 text-slate-600 rounded-lg px-3 py-1.5 font-black hover:bg-slate-100">清空</button>
                      </div>
                    </div>
                    <div className="space-y-2 max-h-40 overflow-y-auto custom-scrollbar">
                      {availableAgents.map(agent => (
                        <label key={agent} className="flex items-center gap-2 text-sm font-bold text-slate-600">
                          <input type="checkbox" checked={selectedTrendAgents.includes(agent)} onChange={()=>setSelectedTrendAgents(prev=>prev.includes(agent)?prev.filter(x=>x!==agent):[...prev,agent])} />{agent}
                        </label>
                      ))}
                    </div>
                  </div>
                )}
              </div>
              <div className="bg-slate-50 rounded-3xl p-5 border"><div className="font-black text-slate-700 mb-3">觀察指標</div><select value={selectedMetric} onChange={(e)=>setSelectedMetric(e.target.value)} className="w-full border border-slate-300 rounded-xl px-4 py-3 font-bold text-slate-600 bg-white">{HISTORY_METRICS.map(metric => <option key={metric.key} value={metric.key}>{metric.label}</option>)}</select></div>
              <div className="bg-slate-50 rounded-3xl p-5 border"><div className="font-black text-slate-700 mb-3">目前模式</div><div className="text-2xl font-black text-purple-700">{viewType==="years" ? "年度趨勢" : viewType==="months" ? "月度趨勢" : "週趨勢"}</div><div className="text-xs text-slate-400 font-bold mt-2">目前比對：{trendAgents.length ? trendAgents.join("、") : "尚未選擇"}</div></div>
            </div>
            <div className="bg-slate-50 rounded-[28px] border p-6">{trendData && trendData.labels.length > 0 ? <HistoryChart type={trendData.labels.length <= 1 ? "bar" : "line"} labels={trendData.labels} datasets={trendData.datasets} title={`${trendCompareMode === "multi" ? "多人" : (selectedAgent || "單人")}｜${selectedMetricConfig.label}`} /> : <div className="text-center py-16 text-slate-400 font-bold">目前沒有可顯示的雲端趨勢資料</div>}</div>
            <div className="overflow-x-auto custom-scrollbar rounded-3xl border">
              <table className="w-full text-center text-sm whitespace-nowrap">
                <thead className="bg-slate-900 text-white font-black"><tr><th className="px-6 py-4">客服名稱</th><th className="px-4 py-4">班別</th>{periodList.map(item => <th key={item.periodKey} className="px-6 py-4">{formatPeriodKeyForDisplay(item)}</th>)}</tr></thead>
                <tbody className="divide-y divide-slate-100 font-bold text-slate-700">
                  {summaryRows.map((row, i) => <tr key={row.name} className={`hover:bg-sky-100 ${i % 2 === 1 ? "bg-sky-50" : "bg-white"}`}><td className="px-6 py-4 text-left font-black">{row.name}</td><td className="px-4 py-4">{row.shift || "-"}</td>{periodList.map(item => <td key={item.periodKey} className="px-6 py-4 font-mono">{formatMetricValue(row[item.periodKey])}</td>)}</tr>)}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {activeTab === "detail" && (
          <div className="bg-white rounded-[40px] shadow-sm border p-8 space-y-6">
            <div className="flex flex-wrap gap-4 items-center justify-between">
              <h3 className="text-xl font-black text-slate-800 underline decoration-blue-500 decoration-4 underline-offset-8">明細查詢</h3>
              <div className="flex gap-2 flex-wrap items-center">
                <button onClick={()=>setSelectedDetailMode("weeks")} className={`px-4 py-2 rounded-2xl font-black ${selectedDetailMode==="weeks" ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-600"}`}>週</button>
                <button onClick={()=>setSelectedDetailMode("months")} className={`px-4 py-2 rounded-2xl font-black ${selectedDetailMode==="months" ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-600"}`}>月</button>
                <button onClick={()=>setSelectedDetailMode("years")} className={`px-4 py-2 rounded-2xl font-black ${selectedDetailMode==="years" ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-600"}`}>年</button>
                {selectedDetailMode === "weeks" && <select value={selectedDetailWeek} onChange={(e)=>setSelectedDetailWeek(e.target.value)} className="border border-slate-300 rounded-xl px-4 py-2 font-bold text-slate-600 bg-white"><option value="">請選擇週次</option>{allWeeks.map(week => <option key={week} value={week}>{formatWeekDisplay(week, cloudMasterStore.weeks?.[week]?.periodLabel || "")}</option>)}</select>}
                {selectedDetailMode === "months" && <select value={selectedDetailMonth} onChange={(e)=>setSelectedDetailMonth(e.target.value)} className="border border-slate-300 rounded-xl px-4 py-2 font-bold text-slate-600 bg-white"><option value="">請選擇月份</option>{allMonths.map(month => <option key={month} value={month}>{formatMonthDisplay(month)}</option>)}</select>}
                {selectedDetailMode === "years" && <select value={selectedDetailYear} onChange={(e)=>setSelectedDetailYear(e.target.value)} className="border border-slate-300 rounded-xl px-4 py-2 font-bold text-slate-600 bg-white"><option value="">請選擇年份</option>{allYears.map(year => <option key={year} value={year}>{formatYearDisplay(year)}</option>)}</select>}
                <button onClick={exportDetailExcel} className="bg-emerald-600 text-white px-4 py-2 rounded-2xl font-bold hover:bg-emerald-700 flex items-center gap-2"><Icon name="download" size={16} />匯出明細</button>
              </div>
            </div>
            <div className="text-sm font-bold text-slate-500">目前顯示：{detailTitle}，共 {detailRows.length} 筆</div>
            <div className="overflow-x-auto max-h-[760px] custom-scrollbar rounded-3xl border">
              <table className="w-full text-left text-[11px] border-collapse font-bold">
                <thead className="bg-slate-900 text-white sticky top-0 z-20 shadow-lg font-black uppercase"><tr><th className="px-6 py-5">客服名稱</th><th className="px-4 py-5">班別</th><th className="px-4 py-5">日期</th><th className="px-4 py-5">時間</th><th className="px-4 py-5">遊戲專線</th><th className="px-4 py-5">滿意度問題1</th><th className="px-4 py-5">滿意度問題2</th><th className="px-4 py-5">對話ID</th></tr></thead>
                <tbody className="divide-y divide-slate-100 font-medium">
                  {detailRows.length === 0 ? <tr><td colSpan="8" className="px-6 py-12 text-center text-slate-400 font-bold">目前沒有雲端明細資料</td></tr> : detailPaging.rows.map((d, i) => {
                    const rowIndex = detailPaging.start + i;
                    return <tr key={`${d.id || rowIndex}-${rowIndex}`} className={`hover:bg-sky-100 ${rowIndex % 2 === 1 ? "bg-sky-50" : "bg-white"}`}><td className="px-6 py-4 font-black">{d.agent}</td><td className="px-4 py-4">{d.shift || "-"}</td><td className="px-4 py-4">{formatCustomDate(d.date)}</td><td className="px-4 py-4">{d.time}</td><td className="px-4 py-4">{d.line}</td><td className="px-4 py-4">{d.q1}</td><td className="px-4 py-4">{d.q2}</td><td className="px-4 py-4">{d.id}</td></tr>
                  })}
                </tbody>
              </table>
            </div>
            <PaginationControls total={detailRows.length} page={detailPage} pageSize={detailPageSize} onPageChange={setDetailPage} onPageSizeChange={setDetailPageSize} />
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
